<!DOCTYPE html>																				
<html lang="en">																				
<head>																				
    <meta charset="UTF-8">																				
    <meta name="viewport" content="width=device-width, initial-scale=1.0">																				
    <title>Made By SHASHI - Pikachu Ultimate Nexus ⚡</title>																				
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap">																				
    <style>																				
        /* --- DYNAMIC BRIGHT CINEMATIC GRAPHICS CSS --- */																				
        :root {
            --lamp-color: #f1c40f;
            --lamp-glow: rgba(241, 196, 15, 0.8);
            --lamp-shadow: rgba(241, 196, 15, 0.3);
        }

        * {																				
            margin: 0;																				
            padding: 0;																				
            box-sizing: border-box;																				
        }																				
																				
        body {																				
            background: #020408;																				
            height: 100vh;																				
            display: flex;																				
            justify-content: center;																				
            align-items: center;																				
            overflow: hidden;																				
            font-family: 'Rajdhani', sans-serif;																				
            user-select: none;																				
            transition: background 0.3s;																				
        }																				
																				
        /* --- SIDE COLORFUL SMOKE EFFECT --- */
        .smoke-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .smoke-cloud {
            position: absolute;
            top: -50%;
            width: 50vw;
            height: 200vh;
            filter: blur(140px);
            opacity: 0.18;
            border-radius: 50%;
            animation: smokeDrift 15s infinite alternate ease-in-out;
        }

        .smoke-left {
            left: -20vw;
            background: radial-gradient(circle, #ff007f 0%, #7f00ff 50%, transparent 100%);
        }

        .smoke-right {
            right: -20vw;
            background: radial-gradient(circle, #00f2fe 0%, #4facfe 50%, transparent 100%);
            animation-delay: -7.5s;
        }

        @keyframes smokeDrift {
            0% { transform: translateY(-5%) scale(1) rotate(0deg); }
            100% { transform: translateY(5%) scale(1.1) rotate(15deg); }
        }

        .cinema-stage {																				
            position: relative;																				
            width: 100vw;																				
            height: 100vh;																				
            display: flex;																				
            justify-content: center;																				
            align-items: center;																				
            transition: all 1.4s cubic-bezier(0.19, 1, 0.22, 1);																				
            z-index: 2;
        }																				
																				
        /* --- MULTI-COLOR LAMP CYCLE TIMING ANIMATION (3 Seconds) --- */
        @keyframes dynamicColorCycle {
            0%, 100% { --lamp-color: #f1c40f; --lamp-glow: rgba(241, 196, 15, 0.8); --lamp-shadow: rgba(241, 196, 15, 0.3); }
            20% { --lamp-color: #00f2fe; --lamp-glow: rgba(0, 242, 254, 0.8); --lamp-shadow: rgba(0, 242, 254, 0.3); }
            40% { --lamp-color: #e74c3c; --lamp-glow: rgba(231, 76, 60, 0.8); --lamp-shadow: rgba(231, 76, 60, 0.3); }
            60% { --lamp-color: #2ecc71; --lamp-glow: rgba(46, 204, 113, 0.8); --lamp-shadow: rgba(46, 204, 113, 0.3); }
            80% { --lamp-color: #9b59b6; --lamp-glow: rgba(155, 89, 182, 0.8); --lamp-shadow: rgba(155, 89, 182, 0.3); }
        }

        .cinema-stage.activated {
            animation: dynamicColorCycle 3s infinite linear;
        }

        /* --- THE SHUTTER ROBOTIC LAMP --- */																				
        .cyber-lamp-core {																				
            position: relative;																				
            display: flex;																				
            flex-direction: column;																				
            align-items: center;																				
            z-index: 10;																				
            transform: translateX(0) scale(1.05);																				
            transition: transform 1.4s cubic-bezier(0.19, 1, 0.22, 1);																				
        }																				
																				
        .cinema-stage.activated .cyber-lamp-core {																				
            transform: translateX(380px) scale(0.95);																				
        }																				
																				
        .glowing-hologram-brand {																				
            font-family: 'Orbitron', sans-serif;																				
            color: rgba(255, 255, 255, 0.15);																				
            font-size: 2.2rem;																				
            font-weight: 900;																				
            margin-bottom: 25px;																				
            letter-spacing: 5px;																				
            transition: all 0.6s ease;																				
        }																				
																				
        .cinema-stage.activated .glowing-hologram-brand {																				
            color: var(--lamp-color);																				
            text-shadow: 0 0 20px var(--lamp-glow), 0 0 40px rgba(255,255,255,0.2);																				
        }																				
																				
        .metallic-shutter-head {																				
            width: 240px;																				
            height: 150px;																				
            background: linear-gradient(145deg, #141a24, #080b10);																				
            border-radius: 100px 100px 40px 40px;																				
            position: relative;																				
            border: 3px solid #243147;																				
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 4px 15px rgba(255,255,255,0.05);																				
            z-index: 5;																				
            overflow: hidden;																				
        }																				
																				
        .cinema-stage.activated .metallic-shutter-head {																				
            border-color: var(--lamp-color);																				
            box-shadow: 0 0 50px var(--lamp-shadow), inset 0 0 20px rgba(255,255,255,0.1);																				
        }																				
																				
        .mechanical-gate {																				
            position: absolute;																				
            top: 25px;																				
            width: 60px;																				
            height: 90px;																				
            background: linear-gradient(90deg, #0f141d, #1a2333);																				
            border: 2px solid #2c3b54;																				
            transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s;																				
            z-index: 6;																				
            display: flex;																				
            justify-content: center;																				
            align-items: center;																				
        }																				
																				
        .gate-left { left: 45px; border-radius: 12px 0 0 12px; }																				
        .gate-right { right: 45px; border-radius: 0 12px 12px 0; }																				
																				
        .cinema-stage.activated .gate-left { transform: translateX(-45px); opacity: 0.1; }																				
        .cinema-stage.activated .gate-right { transform: translateX(45px); opacity: 0.1; }																				
																				
        .blinding-core-light {																				
            position: absolute;																				
            width: 70px;																				
            height: 70px;																				
            background: #ffffff;																				
            border-radius: 50%;																				
            left: 50%;																				
            top: 35px;																				
            transform: translateX(-50%);																				
            filter: blur(12px);																				
            opacity: 0;																				
            transition: opacity 0.4s ease;																				
        }																				
        .cinema-stage.activated .blinding-core-light { opacity: 1; }																				
																				
        .hydraulic-stem {																				
            width: 16px;																				
            height: 240px;																				
            background: linear-gradient(90deg, #182232, #0b0f17, #2d3d56);																				
            z-index: 3;																				
            position: relative;																				
        }																				
																				
        .laser-conduit {																				
            position: absolute;																				
            width: 4px;																				
            height: 100%;																				
            background: #18202c;																				
            left: 50%;																				
            transform: translateX(-50%);																				
            transition: background 0.5s;																				
        }																				
																				
        .cinema-stage.activated .laser-conduit {																				
            background: var(--lamp-color);																				
            box-shadow: 0 0 15px var(--lamp-color);																				
        }																				
																				
        .brushed-heavy-base {																				
            width: 200px;																				
            height: 28px;																				
            background: linear-gradient(180deg, #1e293b, #06090f);																				
            border-radius: 50% / 25%;																				
            border: 2px solid #334155;																				
            z-index: 4;																				
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);																				
        }																				
																				
        .volumetric-beam {																				
            position: absolute;																				
            top: 120px;																				
            width: 100px;																				
            height: 0;																				
            background: linear-gradient(to bottom, var(--lamp-color) 0%, rgba(255, 255, 255, 0.15) 45%, transparent 100%);																				
            clip-path: polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%);																				
            z-index: 2;																				
            pointer-events: none;																				
            opacity: 0;																				
            transition: height 0.9s ease, width 0.9s ease, opacity 0.3s;																				
        }																				
																				
        .cinema-stage.activated .volumetric-beam {																				
            opacity: 0.25;																				
            height: 420px;																				
            width: 650px;																				
            filter: drop-shadow(0 0 40px var(--lamp-glow));																				
        }																				
																				
        .quantum-cord {																				
            position: absolute;																				
            top: 140px;																				
            left: 195px;																				
            z-index: 8;																				
            cursor: pointer;																				
            transition: transform 0.15s linear;																				
        }																				
																				
        .beaded-wire {																				
            width: 3px;																				
            height: 150px;																				
            background: repeating-linear-gradient(to bottom, #475569, #475569 3px, #0f172a 3px, #0f172a 6px);																				
        }																				
																				
        .luminescent-node {																				
            width: 18px;																				
            height: 18px;																				
            background: radial-gradient(circle, #64748b, #1e293b);																				
            border-radius: 50%;																				
            margin-left: -7px;																				
            box-shadow: 0 5px 10px rgba(0,0,0,0.6);																				
        }																				
																				
        .cinema-stage.activated .luminescent-node {																				
            background: var(--lamp-color);																				
            box-shadow: 0 0 15px var(--lamp-color), 0 0 30px var(--lamp-glow);																				
        }																				
																				
        /* --- AUDIO ACCESSIBILITY INTERFACE CAPABILITIES --- */
        .audio-toggle-switch {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 9999;
            background: rgba(3, 7, 14, 0.85);
            border: 1px solid rgba(241, 196, 15, 0.3);
            border-radius: 12px;
            padding: 10px 18px;
            color: #f1c40f;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.1);
            transition: all 0.3s ease;
        }
        .audio-toggle-switch.audio-disabled {
            color: #64748b;
            border-color: rgba(255,255,255,0.08);
            box-shadow: none;
        }

        /* --- HUD GLASS TERMINAL BOX --- */																				
        .hud-glass-terminal {																				
            position: absolute;																				
            left: 8%;																				
            width: 480px;																				
            background: rgba(3, 7, 14, 0.75);																				
            border: 1px solid rgba(255, 255, 255, 0.12);																				
            border-left: 5px solid #f1c40f;																				
            padding: 45px 35px;																				
            border-radius: 24px;																				
            backdrop-filter: blur(40px);																				
            box-shadow: 0 40px 80px rgba(0,0,0,0.85);																				
            transform: translateX(-150px) scale(0.9);																				
            opacity: 0;																				
            transition: transform 1.3s cubic-bezier(0.19, 1, 0.22, 1), opacity 1s ease;																				
            z-index: 20;																				
        }																				
																				
        .cinema-stage.activated .hud-glass-terminal {																				
            transform: translateX(0) scale(1);																				
            opacity: 1;																				
        }																				
																				
        .hud-top-bar { display: flex; justify-content: space-between; margin-bottom: 30px; }																				
        .hud-status-chip { font-family: 'Orbitron', sans-serif; font-size: 0.65rem; color: #f1c40f; background: rgba(241,196,15,0.06); padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(241,196,15,0.25); letter-spacing: 1px; }																				
        .hud-status-chip.cyan-pulse { color: #00f2fe; background: rgba(0,242,254,0.06); border-color: rgba(0,242,254,0.25); }																				
																				
        .hud-logo { font-family: 'Orbitron', sans-serif; color: #fff; font-size: 2.6rem; text-align: center; margin-bottom: 35px; font-weight: 900; }																				
																				
        .portal-matrix-tabs { display: flex; background: rgba(0,0,0,0.5); padding: 6px; border-radius: 12px; margin-bottom: 35px; }																				
        .hud-tab { flex: 1; padding: 15px; background: transparent; border: none; color: #475569; font-size: 1rem; font-weight: 700; cursor: pointer; border-radius: 8px; transition: 0.3s; }																				
        .hud-tab.active { background: rgba(241,196,15,0.1); color: #f1c40f; border: 1px solid rgba(241,196,15,0.25); font-family: 'Orbitron', sans-serif; font-size: 0.85rem; }																				
																				
        .hud-input-cluster { position: relative; margin-bottom: 25px; width: 100%; }																				
        .hud-input-cluster input, .hud-input-cluster textarea, .hud-input-cluster select { width: 100%; padding: 18px 16px; background: rgba(1,3,7,0.5); border: 1px solid rgba(255,255,255,0.03); border-radius: 10px; color: white; font-size: 1.05rem; outline: none; transition: 0.3s; }																				
        .hud-input-cluster textarea { height: 110px; resize: none; }																				
        .hud-input-cluster select { color: #f1c40f; font-weight: bold; background: #050914; border: 1px solid rgba(241,196,15,0.2); cursor: pointer; }																				
																				
        .hud-input-cluster label { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #475569; pointer-events: none; transition: 0.3s; font-size: 0.95rem; }																				
        .hud-input-cluster textarea ~ label { top: 25px; transform: none; }																				
																				
        .hud-input-cluster input:focus ~ label, .hud-input-cluster input:not(:placeholder-shown) ~ label,																				
        .hud-input-cluster textarea:focus ~ label, .hud-input-cluster textarea:not(:placeholder-shown) ~ label { top: -12px; left: 12px; background: #020408; padding: 0 8px; font-size: 0.8rem; color: #f1c40f; font-family: 'Orbitron', sans-serif; }																				
																				
        .neon-glow-underline { position: absolute; bottom: 0; left: 50%; width: 0; height: 2px; background: #f1c40f; transition: 0.4s ease; transform: translateX(-50%); }																				
        .hud-input-cluster input:focus ~ .neon-glow-underline { width: 100%; box-shadow: 0 0 12px #f1c40f; }																				
																				
        .hud-engage-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #f1c40f, #d4ac0d); color: #000; border: none; border-radius: 10px; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1rem; cursor: pointer; letter-spacing: 2px; transition: 0.3s; }																				
        .hud-engage-btn:hover { box-shadow: 0 0 35px rgba(241,196,15,0.7); transform: translateY(-2px); }																				
																				
        /* Ambient weapon overlays */																				
        .muzzle-flash-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0; transition: opacity 0.05s ease; }																				
        .flash-gun { background: rgba(231, 76, 60, 0.5); box-shadow: inset 0 0 80px red; }																				
        .flash-top { background: rgba(243, 156, 18, 0.65); box-shadow: inset 0 0 120px rgba(231,76,60,1); }																				
																				
        .screen-shake { animation: heavyShake 0.4s infinite; }																				
        @keyframes heavyShake {																				
            0% { transform: translate(3px, 2px) rotate(0deg); }																				
            20% { transform: translate(-2px, -3px) rotate(-1deg); }																				
            40% { transform: translate(-4px, 0px) rotate(1deg); }																				
            60% { transform: translate(0px, 3px) rotate(0deg); }																				
            80% { transform: translate(2px, -2px) rotate(1deg); }																				
            100% { transform: translate(1px, -3px) rotate(-1deg); }																				
        }																				
																				
        /* --- DASHBOARDS --- */																				
        .dashboard-panel-core {																				
            position: fixed;																				
            inset: 0;																				
            display: flex;																				
            justify-content: center;																				
            align-items: center;																				
            background: rgba(1, 3, 8, 0.98);																				
            z-index: 100;																				
            padding: 20px;																				
            overflow-y: auto;																				
        }																				
																				
        .hud-container-panel {																				
            background: rgba(5, 11, 22, 0.85);																				
            border: 1px solid rgba(0, 242, 254, 0.2);																				
            border-top: 4px solid #00f2fe;																				
            padding: 40px;																				
            border-radius: 24px;																				
            width: 100%;																				
            max-width: 1000px;																				
            box-shadow: 0 40px 100px rgba(0, 242, 254, 0.08);																				
            backdrop-filter: blur(40px);																				
            max-height: 95vh;																				
            overflow-y: auto;																				
        }																				
																				
        .panel-header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }																				
        .neon-cyan-text { font-family: 'Orbitron'; color: #00f2fe; font-size: 1.6rem; text-shadow: 0 0 15px rgba(0,242,254,0.4); }																				
        .neon-green-text { font-family: 'Orbitron'; color: #2ecc71; font-size: 1.6rem; text-shadow: 0 0 15px rgba(46,204,113,0.4); }																				
																				
        /* --- MODULE SHIFT CONTROLLER TABS --- */
        .workspace-channel-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.4);
            padding: 8px;
            border-radius: 14px;
            border: 1px solid rgba(0, 242, 254, 0.1);
        }
        .channel-tab-btn {
            flex: 1;
            padding: 16px;
            background: transparent;
            border: none;
            color: #64748b;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .channel-tab-btn.active {
            background: rgba(0, 242, 254, 0.12);
            color: #00f2fe;
            border: 1px solid rgba(0, 242, 254, 0.25);
            text-shadow: 0 0 10px rgba(0,242,254,0.3);
        }

        .form-grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }																				
        .full-width-field { grid-column: span 2; }																				
																				
        .abort-btn { padding: 12px 26px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; font-size: 0.85rem; box-shadow: 0 0 15px rgba(231,76,60,0.3); transition: 0.3s; }																				
        .abort-btn:hover { background: #ff4c3c; transform: scale(1.05); }

        .ai-helper-banner { padding: 16px; margin-top: 20px; border-radius: 12px; background: rgba(0,242,254,0.04); border: 1px solid rgba(0,242,254,0.15); color: #00f2fe; text-align: center; font-size: 1rem; letter-spacing: 0.5px; }																				
        .helpline-trigger-btn { width: 100%; padding: 16px; background: #0b1528; border: 1px solid rgba(0,242,254,0.3); border-radius: 10px; color: #00f2fe; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 1.05rem; font-family: 'Orbitron'; text-shadow: 0 0 10px rgba(0,242,254,0.5); }																				
																				
        .search-terminal-input { width: 100%; padding: 18px; background: #050914; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; color: #fff; font-size: 1rem; font-family: 'Orbitron'; outline: none; transition: 0.3s; }																				
        .search-terminal-input:focus { border-color: #f1c40f; box-shadow: 0 0 15px rgba(241,196,15,0.2); }																				
																				
        .database-cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }																				
        @media (max-width: 768px) { .form-grid-layout, .database-cards-grid, .chat-io-grid-matrix { grid-template-columns: 1fr !important; } .full-width-field { grid-column: span 1; } }																				
																				
        .hud-data-card { background: rgba(255,255,255,0.01); border: 1px solid rgba(241,196,15,0.15); border-left: 5px solid #f1c40f; padding: 22px; border-radius: 14px; display: flex; flex-direction: column; gap: 10px; text-align: left; }																				
        .hud-data-card p { color: #94a3b8; font-size: 0.95rem; }																				
        .hud-data-card b { color: white; display: inline-block; width: 120px; }																				
        .hud-data-card span { color: #f1c40f; background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 6px; font-family: monospace; font-size: 0.9rem; user-select: text; }																				
																				
        .status-badge { font-family: 'Orbitron'; font-size: 0.75rem; padding: 4px 10px; border-radius: 6px; font-weight: bold; display: inline-block; }																				
        .status-pending { background: rgba(243, 156, 18, 0.1); color: #f39c12; border: 1px solid rgba(243, 156, 18, 0.3); }																				
        .status-uploaded { background: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }																				
        .status-error { background: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.3); }																				
        .status-closed { background: rgba(149, 165, 166, 0.1); color: #95a5a6; border: 1px solid rgba(149, 165, 166, 0.3); }																				
        .status-waiting { background: rgba(155, 89, 182, 0.1); color: #9b59b6; border: 1px solid rgba(155, 89, 182, 0.3); }																				
																				
        .wipe-card-btn { width: 100%; padding: 11px; background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; font-family: 'Orbitron'; font-weight: bold; font-size: 0.8rem; border-radius: 6px; cursor: pointer; margin-top: 5px; transition: 0.3s; }																				
        .wipe-card-btn:hover { background: #e74c3c; color: white; }																				
																				
        .hidden { display: none !important; }																				
        .text-left { text-align: left; }

        function speakNaturalHuman(textMessage) {																				
            if (!isSystemAudioEnabled) return;
            if ('speechSynthesis' in window) {																				
                window.speechSynthesis.cancel(); 																				
                const syntax = new SpeechSynthesisUtterance(textMessage);																				
                const voiceCluster = window.speechSynthesis.getVoices();																				
                const idealVoice = voiceCluster.find(v => v.name.includes('Natural') || v.name.includes('Google US English') || v.lang === 'en-US');																				
                if(idealVoice) syntax.voice = idealVoice;																				
                syntax.pitch = 1.05; 																				
                syntax.rate = 0.95; 																				
                window.speechSynthesis.speak(syntax);																				
            }

        function playSynthesizedSound(frequency, type, duration) {																				
            if (!isSystemAudioEnabled) return;
            try {																				
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();																				
                const oscillator = audioCtx.createOscillator();																				
                const gainNode = audioCtx.createGain();																				
                oscillator.type = type; oscillator.frequency.value = frequency;																				
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);																				
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);																				
                oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);																				
                oscillator.start(); oscillator.stop(audioCtx.currentTime + duration);

        function setOperationalChatTargetId(userId) {
            activeSelectedChatTargetUserId = userId;

            }

            const targetContainer = document.getElementById('chatTargetContainerView');
            if(targetContainer) {

                        node.classList.add('active-chat-target');

        function renderActiveChatConversationLogs() {
            const wrapper = document.getElementById('chatMessagesScrollWrapper');
            if(!wrapper) return;
            
            if(!activeSelectedChatTargetUserId) {
                wrapper.innerHTML = "";
                return;
            }
            
            const masterLogs = getMatrixChatCache();
            // Extract messages matching the user's secure token
            const contextConvos = masterLogs.filter(msg => 
                (msg.sender === loggedInCustomerID && msg.receiver === activeSelectedChatTargetUserId) ||
                (msg.sender === activeSelectedChatTargetUserId && msg.receiver === loggedInCustomerID)
            );
            
            if(contextConvos.length === 0) {
                wrapper.innerHTML = `<div style="color:#475569; font-size:0.9rem; margin:auto; font-family:'Orbitron';">Pipeline clear. Dispatch first terminal payload packet.</div>`;
                return;
            }
            
            wrapper.innerHTML = contextConvos.map(msg => {
                const isMyMessage = (msg.sender === loggedInCustomerID);
                const directionalCss = isMyMessage ? 'bubble-outgoing' : 'bubble-incoming';
                
                let mediaElementHTML = "";
                if(msg.mediaPayload) {
                    if(msg.mediaPayload.startsWith("data:image")) {
                        mediaElementHTML = `<img src="${msg.mediaPayload}" class="chat-media-attachment-box" onclick="window.open(this.src)">`;
                    } else {
                        mediaElementHTML = `<div style="margin-top:8px;"><a href="${msg.mediaPayload}" download="MatrixSharedAsset" class="file-preview-anchor" style="color:${isMyMessage?'#000':'#00f2fe'}; text-decoration:underline;">📥 Download Binary Payload</a></div>`;
                    }
                }
                
                return `
                    <div class="bubble-msg-wrapper ${directionalCss}">
                        <div style="font-size:0.7rem; opacity:0.6; margin-bottom:4px; font-family:monospace;">[${msg.timestamp}] ${isMyMessage ? 'YOU' : 'REMOTE NODE'}</div>
                        <div>${msg.textBody}</div>
                        ${mediaElementHTML}
                    </div>
                `;
            }).join('');
            
            // Snap container pane view to bottom row matrix position
            wrapper.scrollTop = wrapper.scrollHeight;
        }

            let logs = getMatrixChatCache();

                receiver: activeSelectedChatTargetUserId,
                textBody: textBody || "Sent file payload data packets safely.",
                mediaPayload: globalLiveChatBinaryStreamBase64,
                timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            
            saveMatrixChatCache(logs);
            inputField.value = "";
            globalLiveChatBinaryStreamBase64 = "";
            
            const statusBox = document.getElementById('chatAttachmentStatusFeedback');
            if(statusBox) statusBox.innerText = "";
            if(document.getElementById('chatMediaFileInput')) document.getElementById('chatMediaFileInput').value = "";
            
            playSynthesizedSound(880, 'sine', 0.08);
            renderActiveChatConversationLogs();
        }

                                    ${live ? 'DEACTIVATE' : 'ACTIVATE'}																				
                                </button>																				
                                <button onclick="wipeUserPermanently(${index})" style="background: transparent; border: none; color: #475569; text-decoration: underline; cursor: pointer; font-size: 0.85rem;">Wipe</button>																				
                            </div>																				
                        </div>																				
                        <div style="display:flex; align-items:center; gap:15px; background:rgba(0,0,0,0.2); padding:10px; border-radius:6px; width:100%; flex-wrap:wrap;">																				
                            <span style="color: #94a3b8; font-size: 0.85rem;">SECURE PASSKEY:</span>																				
                            <input type="text" id="userPasswordInputInline_${index}" value="${user.pass}" style="background:#020408; border:1px solid #334155; color:#00f2fe; padding:6px 12px; border-radius:4px; font-family:monospace; font-size:0.9rem; outline:none; width:180px;">																				
                            <button onclick="updateClientPasswordDirect(${index})" style="padding:6px 12px; background:rgba(241,196,15,0.15); border:1px solid #f1c40f; color:#f1c40f; border-radius:4px; font-size:0.75rem; font-family:'Orbitron'; cursor:pointer; font-weight:bold;">SAVE NEW PASSWORD</button>																				
                        </div>																				
                    </div>																				
                `;																				
            }).join('');																				
        }																				
																				
        if(!document.getElementById('dynamicBlinkStyle')) {																				
            const style = document.createElement('style'); style.id = 'dynamicBlinkStyle';																				
            style.innerHTML = `@keyframes blinkNotification { 0%, 100% { opacity: 0.3; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } }`;																				
            document.head.appendChild(style);																				
        }																				
																				
        function renderPolicyCardsBlock() {																				
            const targetStack = document.getElementById('policyCardsStack');																				
            if(!targetStack) return;																				
            																				
            let DB = getPolicyDB();																				
            if(DB.length === 0) {																				
                targetStack.innerHTML = "<p style='text-align:center; grid-column: span 2; color:#475569; padding: 40px 0;'>No active directory submission packages mapped.</p>";																				
                return;																				
            }																				
																				
            targetStack.innerHTML = DB.map((d, i) => {
                let docPreviewHTML = `<span>None Attached</span>`;
                if(d.attachment) {
                    if(d.attachment.startsWith("data:image")) {
                        docPreviewHTML = `<br><img src="${d.attachment}" style="max-width:180px; max-height:120px; border:2px solid #f1c40f; border-radius:6px; margin-top:6px; display:block;">`;
                    } else {
                        docPreviewHTML = `<a href="${d.attachment}" download="AttachedDocument_${d.ownerNodeID}" class="file-preview-anchor">📥 Download Vault File</a>`;
                    }
                }

                let clientNotesArray = d.customerComments || [];
                let clientNotesHTML = clientNotesArray.map(c => `<div style="font-size:0.8rem; color:#00f2fe; background:#020408; padding:3px 6px; margin-top:2px; border-radius:4px;"><b>[${c.timestamp}]:</b> ${c.text}</div>`).join('');

                return `																				
                    <div class="hud-data-card" style="border-top: 3px solid #f1c40f;">																				
                      <div style="display:flex; justify-content:space-between; align-items:center;">																				
                         <p><b>User ID:</b> <span style="font-family:'Orbitron'; font-size:0.8rem; color:#00f2fe; background:rgba(0,242,254,0.05);">${d.ownerNodeID}</span></p>																				
                         <span class="status-badge ${d.status === 'uploaded' ? 'status-uploaded' : d.status === 'error' ? 'status-error' : d.status === 'closed' ? 'status-closed' : d.status === 'waiting' ? 'status-waiting' : 'status-pending'}">${d.status ? d.status.toUpperCase() : 'PENDING'}</span>																				
                      </div>																				
                      <p><b>Time Vector:</b> <span>${d.time}</span></p>																				
                      <p><b>Reg Array:</b> <span>${d.reg || "Empty"}</span></p>																				
                      <p><b>Insurer:</b> <span>${d.insure}</span></p>																				
                      <p><b>Policy Segment:</b> <span>${d.pol || "Empty"}</span></p>																				
                      <p><b>Contact Node:</b> <span>${d.phone}</span></p>																				
                      <p><b>Email Target:</b> <span>${d.email || "Empty"}</span></p>																				
                      <p><b>System Notes:</b> <span>${d.notes || "Empty"}</span></p>																				
                       
                      <p><b>Attached File:</b> ${docPreviewHTML}</p>

                      <div style="background:rgba(0,0,0,0.3); padding:8px; border-radius:6px; margin-top:4px;">
                         <label style="font-size:0.75rem; color:#94a3b8; font-family:'Orbitron'; display:block;">📥 CLIENT REACTION MATRIX NOTES:</label>
                         ${clientNotesHTML ? clientNotesHTML : '<div style="font-size:0.8rem; color:#475569;">No client notes posted yet.</div>'}
                      </div>

                      <div style="margin-top: 15px; padding: 12px; background: rgba(0,0,0,0.4); border-radius: 8px; border: 1px dashed rgba(241,196,15,0.25);">																				
                         <label style="color:#00f2fe; font-family:'Orbitron'; font-size:0.75rem; display:block; margin-bottom:6px;">⚡ CORE STATUS ACTION RESPONSE:</label>																				
                         <div class="hud-input-cluster" style="margin-bottom:10px;">																				
                            <select id="updateStatusSelect_${i}" onchange="transmitAdminResponse(${i})" style="padding:10px; font-size:0.85rem;">																				
                               <option value="pending" ${d.status === 'pending' ? 'selected' : ''}>⏳ Case Status: Pending</option>																				
                               <option value="uploaded" ${d.status === 'uploaded' ? 'selected' : ''}>✅ Case Status: Policy Uploaded</option>																				
                               <option value="error" ${d.status === 'error' ? 'selected' : ''}>❌ Case Status: Error Found</option>																				
                               <option value="closed" ${d.status === 'closed' ? 'selected' : ''}>🔒 Case Status: Closed Vector</option>																				
                               <option value="waiting" ${d.status === 'waiting' ? 'selected' : ''}>⏸ Case Status: Waiting Hold</option>																				
                            </select>																				
                         </div>																				
                         <div class="hud-input-cluster" style="margin-bottom:10px;"><input type="text" id="adminCommentInput_${i}" value="${d.adminComment || ''}" placeholder="Type secure feedback comment here..." style="padding:10px; font-size:0.9rem; background:#020408;"></div>																				
                         <button onclick="transmitAdminResponse(${i})" style="padding:10px; background:#f1c40f; color:black; border:none; font-family:'Orbitron'; font-size:0.8rem; border-radius:6px; cursor:pointer; width:100%; font-weight:bold; letter-spacing:0.5px;">TRANSMIT FEEDBACK COMMENT</button>																				
                      </div>																				
                      <button class="wipe-card-btn" onclick="purgeRegistryLog(${i})">🗑 PURGE ENTRY</button>																				
                    </div>																				
                `;
            }).join("");																				
        }																				
																				
        function transmitAdminResponse(index) {																				
            const statusSelect = document.getElementById(`updateStatusSelect_${index}`); const commentInput = document.getElementById(`adminCommentInput_${index}`);																				
            if(!statusSelect || !commentInput) return;																				
            let DB = getPolicyDB(); DB[index].status = statusSelect.value; DB[index].adminComment = commentInput.value.trim() || "Status compiled by Shashi Admin operations.";																				
            savePolicyDB(DB); speakNaturalHuman("Response configuration logged successfully."); alert("⚡ Status & Feedback Transmitted into Customer Matrix Tracker Panel!"); loadAdminSubmissions();																				
        }																				
																				
        function toggleUserNodeSwitch(index) {																				
            let allUsers = getCreatedUsers();																				
            if(allUsers[index].status === 'active') { allUsers[index].status = 'deactivated'; speakNaturalHuman("Account parameter configuration blocked."); } 																				
            else { allUsers[index].status = 'active'; allUsers[index].adminAlert = false; speakNaturalHuman("Account configurations fully restored."); }																				
            saveCreatedUsers(allUsers); renderUserControlPanel();																				
        }																				
																				
        function wipeUserPermanently(index) {																				
            if(confirm("Completely delete this account log component parameter from database storage?")) { let allUsers = getCreatedUsers(); allUsers.splice(index, 1); saveCreatedUsers(allUsers); speakNaturalHuman("Profile wiped successfully."); renderUserControlPanel(); }																				
        }																				
        function purgeRegistryLog(i){ if(confirm("Wipe this policy structure data node completely?")){ let DB = getPolicyDB(); DB.splice(i, 1); savePolicyDB(DB); speakNaturalHuman("Log vector purged."); loadAdminSubmissions(); } }																				
        function filterCardsEngine(){ const searchInputNode = document.getElementById('searchInput'); if(!searchInputNode) return; let q = searchInputNode.value.toLowerCase(); document.querySelectorAll('.hud-data-card').forEach(c => { c.style.display = c.innerText.toLowerCase().includes(q) ? "" : "none"; }); }																				
																				
        function logoutEngine() {																				
            if(document.getElementById('accessNodeUser')) document.getElementById('accessNodeUser').value = ""; 																				
            if(document.getElementById('accessNodePass')) document.getElementById('accessNodePass').value = "";																				
            document.getElementById('customerDashboard').classList.add('hidden'); document.getElementById('adminDashboard').classList.add('hidden');																				
            loggedInCustomerID = ""; 																				
            failedAttemptsCount = 0;																				
            currentTrackingUserAttempt = "";																				
            activeSelectedChatTargetUserId = "";
            globalLiveChatBinaryStreamBase64 = "";
            
            const stage = document.getElementById('mainStage'); if(stage) { stage.style.display = 'flex'; stage.classList.remove('activated'); }																				
            if(document.getElementById('loginTerminal')) document.getElementById('loginTerminal').classList.add('hidden');																				
        }																				
    </script>																				
</body>																				
</html>
