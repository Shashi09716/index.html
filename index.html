<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Made By SHASHI TIWARI - Pikachu Ultimate Nexus Matrix ⚡</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap">
    <style>
        /* --- HIGH-VISIBILITY ULTRA-CONTRAST CYBERPUNK ENGINE --- */
        :root {
            --lamp-color: #f1c40f;
            --lamp-glow: #f1c40f;
            --lamp-shadow: rgba(241, 196, 15, 0.9);
            --neon-cyan: #00f2fe;
            --whatsapp-green: #2ecc71;
            --admin-purple: #af7ac5;
            --bg-prime: #02050e;
            --panel-glass: rgba(6, 17, 38, 0.99);
            --border-glass: rgba(0, 242, 254, 0.7);
            --text-main: #ffffff;
            --text-sub: #e2e8f0;
            --chat-bg: #090f14;
            --input-bg: #010610;
            --accent-yellow: #f1c40f;
            --cyber-glow: 0 0 20px rgba(0, 242, 254, 0.6);
            --card-bg: rgba(4, 14, 33, 0.9);
        }

        body.light-theme-active {
            --bg-prime: #f1f5f9;
            --panel-glass: #ffffff;
            --border-glass: #0f172a;
            --text-main: #0f172a;
            --text-sub: #334155;
            --chat-bg: #efeae2;
            --input-bg: #f8fafc;
            --accent-yellow: #b45309;
            --cyber-glow: 0 4px 12px rgba(0, 0, 0, 0.15);
            --card-bg: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-prime);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            user-select: none;
            position: relative;
            width: 100vw;
            color: var(--text-main);
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* --- FIXED BRANDING HEADER VECTOR --- */
        .shashi-header-brand-block {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            pointer-events: none;
            width: auto;
            transition: opacity 0.5s cubic-bezier(0.19, 1, 0.22, 1), transform 0.5s ease;
        }
        
        .brand-main-title {
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: 5px;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(241, 196, 15, 1), 0 0 10px rgba(241, 196, 15, 0.6);
            transition: color 0.3s;
        }
        
        body.light-theme-active .brand-main-title {
            color: #0f172a;
            text-shadow: 0 2px 4px rgba(0,0,0,0.15);
        }

        .cosmic-theme-toggle-switch, .audio-toggle-switch {
            position: fixed;
            top: 20px;
            z-index: 9999;
            background: rgba(6, 17, 38, 0.95);
            border: 2px solid rgba(241, 196, 15, 0.6);
            border-radius: 12px;
            padding: 12px 18px;
            color: #f1c40f;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(241, 196, 15, 0.3);
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            width: 145px;
            text-align: center;
        }
        .cosmic-theme-toggle-switch { right: 20px; }
        .audio-toggle-switch { left: 20px; }
        
        body.light-theme-active .cosmic-theme-toggle-switch,
        body.light-theme-active .audio-toggle-switch {
            background: #ffffff;
            color: #0f172a;
            border-color: #0f172a;
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        .smoke-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .smoke-cloud {
            position: absolute;
            top: -50%;
            width: 50vw;
            height: 200vh;
            filter: blur(140px);
            opacity: 0.14;
            border-radius: 50%;
            animation: smokeDrift 22s infinite alternate ease-in-out;
        }

        .smoke-left { left: -20vw; background: radial-gradient(circle, #ff007f 0%, #7f00ff 50%, transparent 100%); }
        .smoke-right { right: -20vw; background: radial-gradient(circle, #00f2fe 0%, #4facfe 50%, transparent 100%); animation-delay: -11s; }

        @keyframes smokeDrift {
            0% { transform: translateY(-2%) scale(1) rotate(0deg); }
            100% { transform: translateY(2%) scale(1.06) rotate(8deg); }
        }

        .cinema-stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 2;
            overflow: hidden;
        }

        @keyframes dynamicColorCycle {
            0%, 100% { --lamp-color: #f1c40f; --lamp-shadow: rgba(241, 196, 15, 0.85); }
            33% { --lamp-color: #00f2fe; --lamp-shadow: rgba(0, 242, 254, 0.85); }
            66% { --lamp-color: #2ecc71; --lamp-shadow: rgba(46, 204, 113, 0.85); }
        }

        .cinema-stage.activated {
            animation: dynamicColorCycle 5s infinite linear;
            background: radial-gradient(circle at center, rgba(241, 196, 15, 0.25) 0%, rgba(2, 5, 14, 1) 80%);
            box-shadow: inset 0 0 120px rgba(0, 242, 254, 0.2);
        }

        .cyber-lamp-core {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            transform: translateX(0) scale(1.05);
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .cinema-stage.activated .cyber-lamp-core { transform: translateX(380px) scale(0.85); }

        .metallic-shutter-head {
            width: 240px;
            height: 150px;
            background: linear-gradient(145deg, #182232, #05070a);
            border-radius: 100px 100px 40px 40px;
            position: relative;
            border: 3px solid #00f2fe;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.5);
            z-index: 5;
            overflow: hidden;
        }

        .cinema-stage.activated .metallic-shutter-head { border-color: var(--lamp-color); box-shadow: 0 0 75px var(--lamp-shadow); }

        .mechanical-gate {
            position: absolute;
            top: 25px;
            width: 60px;
            height: 90px;
            background: linear-gradient(145deg, #0f141d, #1a2333);
            border: 2px solid #2c3b54;
            transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s;
            z-index: 6;
        }

        .gate-left { left: 45px; border-radius: 12px 0 0 12px; }
        .gate-right { right: 45px; border-radius: 0 12px 12px 0; }
        .cinema-stage.activated .gate-left { transform: translateX(-55px); opacity: 0.1; }
        .cinema-stage.activated .gate-right { transform: translateX(55px); opacity: 0.1; }

        .blinding-core-light {
            position: absolute;
            width: 80px;
            height: 80px;
            background: #ffffff;
            border-radius: 50%;
            left: 50%;
            top: 30px;
            transform: translateX(-50%);
            filter: blur(6px);
            opacity: 0;
            transition: opacity 0.4s ease;
            box-shadow: 0 0 50px #ffffff;
        }
        .cinema-stage.activated .blinding-core-light { opacity: 1; }

        .hydraulic-stem { width: 16px; height: 240px; background: linear-gradient(90deg, #182232, #0b0f17, #2d3d56); z-index: 3; position: relative; }
        .laser-conduit { position: absolute; width: 4px; height: 100%; background: #18202c; left: 50%; transform: translateX(-50%); transition: background 0.5s; }
        .cinema-stage.activated .laser-conduit { background: var(--lamp-color); box-shadow: 0 0 30px var(--lamp-color); }

        .brushed-heavy-base { width: 200px; height: 28px; background: linear-gradient(180deg, #1e293b, #06090f); border-radius: 50% / 25%; border: 2px solid #334155; z-index: 4; }

        .volumetric-beam {
            position: absolute;
            top: 120px;
            width: 100px;
            height: 0;
            background: linear-gradient(to bottom, var(--lamp-color) 0%, rgba(255, 255, 255, 0.35) 25%, transparent 100%);
            clip-path: polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%);
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            transition: height 0.9s ease, width 0.9s ease, opacity 0.3s;
        }
        .cinema-stage.activated .volumetric-beam { opacity: 0.5; height: 490px; width: 760px; }

        .quantum-cord { position: absolute; top: 140px; left: 195px; z-index: 99; cursor: pointer; transition: transform 0.15s linear; padding: 20px; margin-left: -20px; }
        .beaded-wire { width: 4px; height: 160px; background: repeating-linear-gradient(to bottom, #f1c40f, #f1c40f 4px, #0f172a 4px, #0f172a 8px); }
        .luminescent-node { width: 24px; height: 24px; background: radial-gradient(circle, #fff, #f1c40f); border-radius: 50%; margin-left: -10px; box-shadow: 0 0 30px #f1c40f; }

        /* --- HUD TERMINAL CORE OVERHAUL --- */
        .hud-glass-terminal {
            position: absolute;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            width: 95%;
            max-width: 460px;
            background: var(--panel-glass);
            border: 3px solid var(--border-glass);
            border-left: 6px solid #f1c40f;
            padding: 35px 25px;
            border-radius: 24px;
            backdrop-filter: blur(40px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            opacity: 0;
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 20;
        }

        .cinema-stage.activated .hud-glass-terminal { transform: translateX(-50%) scale(1); opacity: 1; }

        .hud-top-bar { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .hud-status-chip { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: #f1c40f; background: rgba(241,196,15,0.15); padding: 6px 14px; border-radius: 6px; border: 2px solid rgba(241,196,15,0.4); letter-spacing: 1px; font-weight: bold; }
        .hud-status-chip.cyan-pulse { color: #00f2fe; background: rgba(0,242,254,0.15); border-color: rgba(0,242,254,0.5); }

        .hud-logo { font-family: 'Orbitron', sans-serif; color: var(--text-main); font-size: 2.6rem; text-align: center; margin-bottom: 25px; font-weight: 900; letter-spacing: 2px; }

        .portal-matrix-tabs { display: flex; background: rgba(0,0,0,0.5); padding: 6px; border-radius: 12px; margin-bottom: 25px; gap: 4px; }
        .hud-tab { flex: 1; padding: 14px; background: transparent; border: none; color: var(--text-sub); font-size: 1rem; font-weight: 700; cursor: pointer; border-radius: 8px; transition: 0.3s; white-space: nowrap; }
        .hud-tab.active { background: rgba(241,196,15,0.25); color: #f1c40f; border: 2px solid rgba(241,196,15,0.5); font-family: 'Orbitron', sans-serif; font-size: 0.9rem; }

        .hud-input-cluster { position: relative; margin-bottom: 28px; width: 100%; }
        .hud-input-cluster input, .hud-input-cluster textarea, .hud-input-cluster select { width: 100%; padding: 18px 16px; background: var(--input-bg); border: 2px solid var(--border-glass); border-radius: 10px; color: var(--text-main); font-size: 1.1rem; outline: none; transition: 0.3s; font-weight: 700; }
        .hud-input-cluster textarea { height: 100px; resize: none; }
        .hud-input-cluster select { color: #f1c40f; font-weight: bold; background: var(--input-bg); }

        .hud-input-cluster label { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-sub); pointer-events: none; transition: 0.3s; font-size: 1rem; font-weight: 700; }
        .hud-input-cluster textarea ~ label { top: -14px; left: 10px; }

        .hud-input-cluster input:focus ~ label, .hud-input-cluster input:not(:placeholder-shown) ~ label,
        .hud-input-cluster textarea:focus ~ label, .hud-input-cluster textarea:not(:placeholder-shown) ~ label { top: -14px; left: 10px; background: var(--bg-prime); padding: 2px 8px; font-size: 0.85rem; color: #f1c40f; font-family: 'Orbitron', sans-serif; font-weight: 900; }

        .neon-glow-underline { position: absolute; bottom: 0; left: 50%; width: 0; height: 3px; background: #f1c40f; transition: 0.4s ease; transform: translateX(-50%); }
        .hud-input-cluster input:focus ~ .neon-glow-underline { width: 100%; box-shadow: 0 0 15px #f1c40f; }

        .hud-engage-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #f1c40f, #d4ac0d); color: #000000; border: none; border-radius: 10px; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.1rem; cursor: pointer; letter-spacing: 2px; transition: 0.3s; box-shadow: 0 4px 15px rgba(241,196,15,0.3); }
        .hud-engage-btn:hover { box-shadow: 0 0 40px rgba(241, 196, 15, 0.8); transform: translateY(-2px); }

        /* --- DASHBOARD CORE STYLING MATRIX --- */
        .dashboard-panel-core {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: var(--bg-prime);
            z-index: 100;
            padding: 20px;
            overflow-y: auto;
            overflow-x: hidden;
            transition: background 0.4s ease;
            padding-bottom: 40px;
            padding-top: 100px;
        }

        .hud-container-panel {
            background: var(--panel-glass);
            border: 3px solid var(--border-glass);
            border-top: 6px solid var(--neon-cyan);
            padding: 35px 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 1280px;
            box-shadow: 0 20px 80px rgba(0, 242, 254, 0.15), inset 0 0 30px rgba(0, 242, 254, 0.05);
            backdrop-filter: blur(40px);
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .panel-header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 3px solid var(--border-glass); padding-bottom: 18px; gap: 10px; }
        .neon-cyan-text { font-family: 'Orbitron'; color: #00f2fe; font-size: 2.2rem; text-shadow: var(--cyber-glow); font-weight: 900; letter-spacing: 1px; }
        .neon-cyan-text span { font-size: 1.6rem; color: var(--text-main); font-family: 'Rajdhani'; opacity: 0.85; margin-left: 10px; font-weight: 600; }
        .neon-green-text { font-family: 'Orbitron'; color: #2ecc71; font-size: 2rem; text-shadow: 0 0 20px rgba(46,204,113,0.6); font-weight: 900; }

        .workspace-channel-selector { display: flex; gap: 14px; margin-bottom: 25px; background: rgba(0,0,0,0.5); padding: 6px; border-radius: 12px; border: 2px solid var(--border-glass); box-shadow: inset 0 0 15px rgba(0, 242, 254, 0.1); }
        .channel-tab-btn { flex: 1; padding: 16px 12px; background: transparent; border: none; color: var(--text-sub); font-family: 'Orbitron', sans-serif; font-size: 0.95rem; font-weight: bold; cursor: pointer; border-radius: 8px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .channel-tab-btn.active { background: rgba(0, 242, 254, 0.25); color: #00f2fe; border: 2px solid rgba(0, 242, 254, 0.5); box-shadow: var(--cyber-glow); }

        .form-grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .full-width-field { grid-column: span 2; }

        .abort-btn { padding: 12px 24px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; font-size: 0.9rem; transition: 0.3s; box-shadow: 0 4px 10px rgba(231,76,60,0.3); letter-spacing: 1px; }
        .abort-btn:hover { background: #c0392b; box-shadow: 0 0 20px rgba(231,76,60,0.6); transform: scale(1.02); }
          
        .ai-helper-banner { padding: 16px; margin-top: 25px; border-radius: 12px; background: rgba(0,242,254,0.08); border: 2px solid rgba(0,242,254,0.3); color: #00f2fe; text-align: center; font-size: 1.05rem; font-weight: 700; box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.1); }
        
        .search-terminal-input { width: 100%; padding: 18px; background: rgba(0,0,0,0.4); border: 2px solid var(--border-glass); border-radius: 12px; color: var(--text-main); font-size: 1.1rem; font-family: 'Orbitron'; outline: none; font-weight: bold; }

        #policyCardsStack { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; width: 100%; }
         
        .hud-data-card { background: var(--card-bg); border: 2px solid var(--border-glass); border-left: 6px solid #f1c40f; padding: 25px; border-radius: 14px; display: flex; flex-direction: column; gap: 14px; word-break: break-all; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .hud-data-card p { color: var(--text-sub); font-size: 1.05rem; display: flex; flex-flow: row wrap; gap: 8px; font-weight: 600; line-height: 1.5; }
        .hud-data-card b { color: var(--text-main); display: inline-block; width: 110px; flex-shrink: 0; font-family: 'Orbitron', sans-serif; font-size: 0.85rem; letter-spacing: 0.5px; }
        
        .admin-clickable-badge { color: #f1c40f; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 6px; font-family: monospace; font-size: 1rem; font-weight: bold; border: 1px solid rgba(241,196,15,0.3); cursor: pointer; transition: all 0.2s ease; position: relative; }
        .admin-clickable-badge:hover { background: #f1c40f; color: #000; transform: scale(1.03); box-shadow: 0 0 10px #f1c40f; }
         
        .hud-data-card .owner-name-tag-right {
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: 'Orbitron', sans-serif;
            color: #00f2fe;
            font-size: 0.9rem;
            font-weight: 900;
            background: rgba(0, 242, 254, 0.2);
            padding: 6px 14px;
            border-radius: 6px;
            border: 2px solid rgba(0, 242, 254, 0.5);
        }

        .status-badge { font-family: 'Orbitron'; font-size: 0.85rem; padding: 6px 12px; border-radius: 6px; font-weight: 900; display: inline-block; text-align: center; }
        .status-pending { background: rgba(241,196,15,0.2); color: #f1c40f; border: 1px solid #f1c40f; }
        .status-uploaded { background: rgba(46,204,113,0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .status-error { background: rgba(231,76,60,0.2); color: #e74c3c; border: 1px solid #e74c3c; }
        .status-closed { background: rgba(149,165,166,0.2); color: #95a5a6; border: 1px solid #95a5a6; }

        .wipe-card-btn { width: 100%; padding: 12px; background: rgba(231,76,60,0.15); border: 2px solid rgba(231,76,60,0.5); color: #e74c3c; font-family: 'Orbitron'; font-weight: 900; font-size: 0.9rem; border-radius: 8px; cursor: pointer; margin-top: 5px; transition: 0.3s; }
        .wipe-card-btn:hover { background: rgba(231,76,60,0.3); color: #fff; box-shadow: 0 0 15px rgba(231,76,60,0.4); }

        .hidden { display: none !important; }
        .text-left { text-align: left; }

        .admin-category-navbar { display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 6px; border-radius: 12px; margin-bottom: 25px; border: 2px solid var(--border-glass); }
        .admin-nav-tab { flex: 1; padding: 16px 6px; background: transparent; border: none; color: var(--text-sub); font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; text-align: center; }
        .admin-nav-tab.active { background: rgba(241,196,15,0.25); color: #f1c40f; border: 2px solid rgba(241,196,15,0.5); box-shadow: 0 0 15px rgba(241,196,15,0.2); }

        .cyber-upload-node { border: 2px dashed rgba(0, 242, 254, 0.6); border-radius: 14px; padding: 25px; background: rgba(0,0,0,0.3); text-align: center; cursor: pointer; transition: 0.3s; }
        .cyber-upload-node:hover { border-color: #00f2fe; background: rgba(0,242,254,0.05); }

        .cred-sync-card { background: rgba(4, 12, 30, 0.85); border: 2px solid var(--border-glass); border-left: 6px solid #2ecc71; padding: 25px; border-radius: 14px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .cred-sync-card h4 { font-family: 'Orbitron', sans-serif; color: #2ecc71; font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 1px; }

        /* --- QUANTUM NOTE STYLING CORE --- */
        .quantum-notes-matrix { display: grid; grid-template-columns: 320px 1fr; gap: 20px; height: 500px; }
        .notes-sidebar-shelf { background: rgba(0,0,0,0.3); border: 2px solid var(--border-glass); border-radius: 14px; padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .notes-content-editor { background: var(--input-bg); border: 2px solid var(--border-glass); border-radius: 14px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .note-shelf-item { padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); border-radius: 8px; cursor: pointer; transition: 0.2s; text-align: left;}
        .note-shelf-item:hover, .note-shelf-item.active-note { background: rgba(0,242,254,0.15); border-color: #00f2fe; }
        .note-shelf-item h5 { color: #00f2fe; font-family: 'Orbitron'; font-size: 0.95rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .note-shelf-item p { font-size: 0.8rem; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- THE ARCADE NEON GAMING SYSTEM --- */
        .arcade-game-canvas-wrapper { background: #000; border: 4px solid #f1c40f; border-radius: 16px; padding: 10px; box-shadow: 0 0 30px rgba(241,196,15,0.3); position: relative; text-align: center; }
        .arcade-hud-scorecard { font-family: 'Orbitron'; color: #00f2fe; font-size: 1.2rem; display: flex; justify-content: space-between; margin-bottom: 10px; padding: 0 10px; font-weight: 900; }

        window.closeCustomInlinePopupEngine = function() {
            const wrapper = document.getElementById('nexusCustomInlineModalWrapper');
            if(wrapper) wrapper.classList.add('hidden');
        };

        window.executeCosmicThemeToggle = function() {
            const bodyNode = document.body;
            const toggleLabel = document.getElementById('themeToggleBtnLabel');
            bodyNode.classList.toggle('light-theme-active');
            
            if(bodyNode.classList.contains('light-theme-active')) {
                toggleLabel.innerText = "🌑 DARK MODE";
            } else {
                toggleLabel.innerText = "🌓 LIGHT MODE";
            }
        };

        window.switchCustomerChannel = function(channelId) {
            activeCustomerWorkspaceChannel = channelId;
            localStorage.setItem('nexus_active_chan_route', channelId);
            
            document.getElementById('btnChannelUpload').classList.remove('active');
            document.getElementById('btnChannelChat').classList.remove('active');
            document.getElementById('btnChannelNotes').classList.remove('active');
            document.getElementById('btnChannelGame').classList.remove('active');
            
            document.getElementById('customerUploadInterfaceBlock').classList.add('hidden');
            document.getElementById('customerChatInterfaceBlock').classList.add('hidden');
            document.getElementById('customerNotesInterfaceBlock').classList.add('hidden');
            document.getElementById('customerGameInterfaceBlock').classList.add('hidden');

            if(channelId === 'upload') {
                document.getElementById('btnChannelUpload').classList.add('active');
                document.getElementById('customerUploadInterfaceBlock').classList.remove('hidden');
                renderCustomerLiveTracker();
            } else if(channelId === 'chat') {
                document.getElementById('btnChannelChat').classList.add('active');
                document.getElementById('customerChatInterfaceBlock').classList.remove('hidden');
                initializeCrossLinkChatPanel();
            } else if(channelId === 'notes') {
                document.getElementById('btnChannelNotes').classList.add('active');
                document.getElementById('customerNotesInterfaceBlock').classList.remove('hidden');
                loadQuantumNotesFromDatabaseEngine();
            } else if(channelId === 'game') {
                document.getElementById('btnChannelGame').classList.add('active');
                document.getElementById('customerGameInterfaceBlock').classList.remove('hidden');
                setTimeout(() => { triggerArcadeGameEngineInit(); }, 200);
            }
        };

        // --- QUANTUM NOTES CORE SYSTEM LOGIC ---
        window.loadQuantumNotesFromDatabaseEngine = function() {
            if(!loggedInCustomerID) return;
            onValue(ref(db, `notes/${loggedInCustomerID}`), (snapshot) => {
                const data = snapshot.val();
                userNotesTrackerObj = data || {};
                renderQuantumNotesSidebarShelf();
            });
        };

        function renderQuantumNotesSidebarShelf() {
            const wrapper = document.getElementById('notesListCollectionWrapper');
            if(!wrapper) return;
            const keys = Object.keys(userNotesTrackerObj);
            if(keys.length === 0) {
                wrapper.innerHTML = `<p style="color:var(--text-sub); font-size:0.9rem; text-align:center; padding:10px;">Shelf Vacant</p>`;
                return;
            }
            wrapper.innerHTML = keys.map(key => {
                const note = userNotesTrackerObj[key];
                const activeClass = (key === systemActiveNoteIdKey) ? 'active-note' : '';
                return `
                    <div class="note-shelf-item ${activeClass}" onclick="mountTargetQuantumNoteInstance('${key}')">
                        <h5>${note.title || 'Untitled Vector'}</h5>
                        <p>${note.body || 'Empty string node...'}</p>
                    </div>
                `;
            }).join('');
        }

        window.createNewQuantumNoteNode = function() {
            systemActiveNoteIdKey = "NOTE_" + Date.now();
            document.getElementById('quantumNoteTitleInput').value = "New Quantum Note Record";
            document.getElementById('quantumNoteBodyTextarea').value = "";
            document.getElementById('quantumNoteTitleInput').focus();
        };

        window.mountTargetQuantumNoteInstance = function(key) {
            systemActiveNoteIdKey = key;
            const targetNote = userNotesTrackerObj[key];
            if(targetNote) {
                document.getElementById('quantumNoteTitleInput').value = targetNote.title || "";
                document.getElementById('quantumNoteBodyTextarea').value = targetNote.body || "";
                renderQuantumNotesSidebarShelf();
            }
        };

        window.commitSaveActiveQuantumNote = function() {
            if(!loggedInCustomerID) return;
            if(!systemActiveNoteIdKey) systemActiveNoteIdKey = "NOTE_" + Date.now();
            const t = document.getElementById('quantumNoteTitleInput').value.trim() || "Untitled Note";
            const b = document.getElementById('quantumNoteBodyTextarea').value.trim() || "";
            
            set(ref(db, `notes/${loggedInCustomerID}/${systemActiveNoteIdKey}`), {
                id: systemActiveNoteIdKey, title: t, body: b, lastModified: Date.now()
            }).then(() => {
                playSynthesizedSound(880, 'sine', 0.1);
            });
        };

        // --- ARCADE RETRO CORE GAME CONTROLLER ---
        window.triggerArcadeGameEngineInit = function() {
            const canvas = document.getElementById('nexusArcadeCanvas');
            if(!canvas) return;
            arcadeCanvasContext = canvas.getContext('2d');
            
            // Cleanup previous loop instance
            if(gamingEngineAnimationFrameRef) cancelAnimationFrame(gamingEngineAnimationFrameRef);
            
            playerSpaceShipObj.x = canvas.width / 2 - 15;
            activeLaserProjectilesArr = [];
            hostilesInvadersClusterArr = [];
            aggregateArcadeGameScore = 0;
            document.getElementById('arcadeLiveScoreLabel').innerText = "0000";
            
            // Build Invader Arrays
            for(let row=0; row<3; row++) {
                for(let col=0; col<9; col++) {
                    hostilesInvadersClusterArr.push({
                        x: 50 + col * 65, y: 40 + row * 40, w: 40, h: 25, alive: true, points: (3 - row) * 10
                    });
                }
            }
            
            isArcadeLoopRunning = true;
            document.getElementById('arcadeSystemStatus').innerText = "LIVE MATRIX";
            document.getElementById('arcadeSystemStatus').style.color = "#00f2fe";
            
            // Keyboard Controls Mapping Context
            window.removeEventListener('keydown', handleArcadeControlInputs);
            window.addEventListener('keydown', handleArcadeControlInputs);
            
            executeArcadeFrameEngineLoop();
        };

        function handleArcadeControlInputs(e) {
            if(!isArcadeLoopRunning) return;
            const canvas = document.getElementById('nexusArcadeCanvas');
            if(e.key === "ArrowLeft" || e.key === "a") {
                playerSpaceShipObj.x = Math.max(0, playerSpaceShipObj.x - playerSpaceShipObj.speed);
            } else if(e.key === "ArrowRight" || e.key === "d") {
                playerSpaceShipObj.x = Math.min(canvas.width - playerSpaceShipObj.w, playerSpaceShipObj.x + playerSpaceShipObj.speed);
            } else if(e.key === " " || e.key === "ArrowUp") {
                e.preventDefault();
                activeLaserProjectilesArr.push({
                    x: playerSpaceShipObj.x + playerSpaceShipObj.w/2 - 2, y: playerSpaceShipObj.y, w: 4, h: 12, speed: 9
                });
                playSynthesizedSound(1200, 'square', 0.05);
            }
        }

        function executeArcadeFrameEngineLoop() {
            if(!isArcadeLoopRunning) return;
            
            // Clear Canvas Frame
            arcadeCanvasContext.fillStyle = "#050b14";
            arcadeCanvasContext.fillRect(0, 0, 700, 400);
            
            // Render Player Signature
            arcadeCanvasContext.fillStyle = "#00f2fe";
            arcadeCanvasContext.fillRect(playerSpaceShipObj.x, playerSpaceShipObj.y, playerSpaceShipObj.w, playerSpaceShipObj.h);
            arcadeCanvasContext.fillStyle = "#ffffff";
            arcadeCanvasContext.fillRect(playerSpaceShipObj.x + 12, playerSpaceShipObj.y - 6, 6, 6);
            
            // Process lasers array loop
            arcadeCanvasContext.fillStyle = "#ff0055";
            for(let i = activeLaserProjectilesArr.length - 1; i >= 0; i--) {
                let l = activeLaserProjectilesArr[i];
                l.y -= l.speed;
                arcadeCanvasContext.fillRect(l.x, l.y, l.w, l.h);
                if(l.y < 0) { activeLaserProjectilesArr.splice(i, 1); continue; }
                
                // Collision check execution
                for(let j=0; j<hostilesInvadersClusterArr.length; j++) {
                    let inv = hostilesInvadersClusterArr[j];
                    if(inv.alive && l.x > inv.x && l.x < inv.x + inv.w && l.y > inv.y && l.y < inv.y + inv.h) {
                        inv.alive = false;
                        activeLaserProjectilesArr.splice(i, 1);
                        aggregateArcadeGameScore += inv.points;
                        document.getElementById('arcadeLiveScoreLabel').innerText = String(aggregateArcadeGameScore).padStart(4, '0');
                        playSynthesizedSound(400, 'sawtooth', 0.08);
                        break;
                    }
                }
            }
            
            // Render Hostiles Block
            let activeInvadersLeft = 0;
            for(let i=0; i<hostilesInvadersClusterArr.length; i++) {
                let inv = hostilesInvadersClusterArr[i];
                if(inv.alive) {
                    activeInvadersLeft++;
                    arcadeCanvasContext.fillStyle = inv.points === 30 ? "#f1c40f" : inv.points === 20 ? "#af7ac5" : "#2ecc71";
                    arcadeCanvasContext.fillRect(inv.x, inv.y, inv.w, inv.h);
                    
                    // Box graphics
                    arcadeCanvasContext.fillStyle = "rgba(0,0,0,0.3)";
                    arcadeCanvasContext.fillRect(inv.x + 6, inv.y + 6, inv.w - 12, inv.h - 12);
                }
            }
            
            if(activeInvadersLeft === 0) {
                isArcadeLoopRunning = false;
                document.getElementById('arcadeSystemStatus').innerText = "VICTORY ACHIEVED";
                document.getElementById('arcadeSystemStatus').style.color = "#2ecc71";
                return;
            }
            
            gamingEngineAnimationFrameRef = requestAnimationFrame(executeArcadeFrameEngineLoop);
        }

        window.switchAdminSubSection = function(sectionId) {
            activeAdminSubSection = sectionId;
            document.querySelectorAll('.admin-nav-tab').forEach(btn => btn.classList.remove('active'));
            const actBtn = document.getElementById(`tabBtn${sectionId.charAt(0).toUpperCase() + sectionId.slice(1)}`); if(actBtn) actBtn.classList.add('active');
            
            if(sectionId === 'admingame') {
                document.getElementById('customerCardsContainer').innerHTML = `
                    <div class="arcade-game-canvas-wrapper">
                        <div class="arcade-hud-scorecard">
                            <div>SCORE: <span id="arcadeLiveScoreLabel">0000</span></div>
                            <div>ADMIN ROOT ARENA CONTROLLER</div>
                            <div>STATUS: <span id="arcadeSystemStatus" style="color:#2ecc71">READY</span></div>
                        </div>
                        <canvas id="nexusArcadeCanvas" width="700" height="400"></canvas>
                        <button id="adminGameLauncherBtn" class="hud-engage-btn" style="margin-top:15px; max-width:250px;">INITIALIZE MAINFRAME GAME</button>
                    </div>
                `;
                document.getElementById('adminGameLauncherBtn').onclick = function() { triggerArcadeGameEngineInit(); };
                return;
            }
            
            document.getElementById('customerCardsContainer').innerHTML = `
                <div id="idCreationBlock" class="hidden"></div>
                <div id="credentialsBlock" class="hidden"></div>
                <div id="policyWorkspaceBlock" class="hidden"></div>
                <div id="adminSpyChatBlock" class="hidden"></div>
            `;
            loadAdminSubmissions();
        };

        // Standard logic wrappers retention
        window.changeWorkspaceMode = function(mode) {
            currentMode = mode;
            document.getElementById('tabModeUser').classList.remove('active');
            document.getElementById('tabModeAdmin').classList.remove('active');
            if (mode === 'admin') {
                document.getElementById('tabModeAdmin').classList.add('active');
                document.getElementById('hudInputLabel').innerText = "Confirm Admin Vector";
            } else {
                document.getElementById('tabModeUser').classList.add('active');
                document.getElementById('hudInputLabel').innerText = "System ID / Customer ID";
            }
        };

        window.triggerLampActivationOverride = function() {
            const mainStage = document.getElementById('mainStage'); 
            const loginTerminal = document.getElementById('loginTerminal');
            if(mainStage && loginTerminal && !mainStage.classList.contains('activated')) {
                mainStage.classList.add('activated'); 
                loginTerminal.classList.remove('hidden');
            }
        };

        window.toggleGlobalSystemAudio = function() {
            isSystemAudioEnabled = !isSystemAudioEnabled;
            document.getElementById('systemAudioToggleBtn').innerHTML = isSystemAudioEnabled ? `<span>🔊 SOUND: ON</span>` : `<span>🔇 SOUND: OFF</span>`;
        };

        window.playSynthesizedSound = function(frequency, type, duration) {
            if (!isSystemAudioEnabled) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type; oscillator.frequency.value = frequency;
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        };

        window.executeClusterLogin = function(event) {
            if(event) event.preventDefault();
            const u = document.getElementById('accessNodeUser').value.trim(); 
            const p = document.getElementById('accessNodePass').value.trim();
            
            if (currentMode === 'admin') {
                if (u.toLowerCase() === cachedAdminMainframeRoute.masterId.toLowerCase() && p === cachedAdminMainframeRoute.masterPass) {
                    document.getElementById('mainStage').style.display = 'none'; 
                    document.getElementById('adminDashboard').classList.remove('hidden');
                    switchAdminSubSection('creation');
                } else {
                    alert("Access Rejected.");
                }
            } else {
                let userMatch = cachedGlobalUsersArr.find(user => user.id.toLowerCase() === u.toLowerCase());
                if (userMatch && String(userMatch.pass) === String(p)) {
                    loggedInCustomerID = userMatch.id; 
                    document.getElementById('mainStage').style.display = 'none'; 
                    document.getElementById('customerDashboard').classList.remove('hidden');
                    switchCustomerChannel('upload');
                } else {
                    alert("Invalid Signatures.");
                }
            }
        };

        window.logoutEngine = function() {
            if(gamingEngineAnimationFrameRef) cancelAnimationFrame(gamingEngineAnimationFrameRef);
            isArcadeLoopRunning = false;
            localStorage.clear();
            location.reload();
        };

        // System configuration array dynamic listeners initialization
        onValue(ref(db, 'users'), (snapshot) => {
            const data = snapshot.val();
            cachedGlobalUsersArr = data ? Object.values(data) : [];
        });
        onValue(ref(db, 'policies'), (snapshot) => {
            cachedGlobalPolicyArr = snapshot.val() ? Object.values(snapshot.val()) : [];
        });

        window.loadAdminSubmissions = function() {
            const container = document.getElementById('customerCardsContainer');
            if(!container) return;
            container.innerHTML = `
                <div id="idCreationBlock" style="padding:10px;">
                    <div class="giant-compiler-layout">
                        <h3>⚡ IDENTITY COMPILER UNIT</h3>
                        <div class="giant-compiler-grid">
                            <input type="text" id="newClientName" class="giant-compiler-input" placeholder="Client Name *">
                            <input type="text" id="newClientContact" class="giant-compiler-input" maxlength="10" placeholder="Contact No *">
                            <input type="text" id="newUserPass" class="giant-compiler-input" placeholder="Set Secure Password *">
                        </div>
                        <button onclick="createNewCustomerNode()" class="hud-engage-btn">COMPILE IDENTITY NODE</button>
                    </div>
                </div>
            `;
        };

        window.createNewCustomerNode = function() {
            const clientName = document.getElementById('newClientName').value.trim();
            const contact = document.getElementById('newClientContact').value.trim();
            const userPass = document.getElementById('newUserPass').value.trim();
            if(!clientName || !contact || !userPass) return;
            const userId = clientName.replace(/\s+/g, '') + contact.slice(-4);
            set(ref(db, 'users/' + userId), { id: userId, pass: userPass, status: 'active', clientName, contact, avatar: "", isOnlineNode: false }).then(() => { alert('Compiled ID: ' + userId); loadAdminSubmissions(); });
        };
    </script>
