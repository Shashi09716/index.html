<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Made By SHASHI TIWARI - Pikachu Ultimate Nexus Matrix ⚡</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap">
    <style>
        /* --- HIGH-VISIBILITY CYBERPUNK GRAPHICS CORE --- */
        :root {
            --lamp-color: #f1c40f;
            --lamp-glow: #f1c40f;
            --lamp-shadow: rgba(241, 196, 15, 0.85);
            --neon-cyan: #00f2fe;
            --whatsapp-green: #2ecc71;
            --admin-purple: #af7ac5;
            --bg-prime: #02050e;
            --panel-glass: rgba(6, 15, 33, 0.98);
            --border-glass: rgba(0, 242, 254, 0.6);
            --text-main: #ffffff;
            --text-sub: #e2e8f0;
            --chat-bg: #0b141a;
            --input-bg: rgba(1, 4, 12, 0.9);
            --accent-yellow: #f1c40f;
        }

        body.light-theme-active {
            --bg-prime: #f1f5f9;
            --panel-glass: #ffffff;
            --border-glass: #0f172a;
            --text-main: #0f172a;
            --text-sub: #334155;
            --chat-bg: #e2e8f0;
            --input-bg: #ffffff;
            --accent-yellow: #d97706;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-prime);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            user-select: none;
            position: relative;
            width: 100vw;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .shashi-header-brand-block {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            pointer-events: none;
            width: auto;
        }
        
        .brand-main-title {
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 0 0 25px rgba(241, 196, 15, 1);
            transition: color 0.3s;
        }
        
        body.light-theme-active .brand-main-title {
            color: #0f172a;
            text-shadow: 0 0 8px rgba(0,0,0,0.2);
        }

        .live-session-user-identity-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            color: #00f2fe;
            background: rgba(2, 5, 14, 0.95);
            padding: 10px 20px;
            border-radius: 20px;
            border: 2px solid rgba(0, 242, 254, 0.95);
            text-shadow: 0 0 10px rgba(0, 242, 254, 1);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
            margin-top: 8px;
            display: inline-block;
        }

        .cosmic-theme-toggle-switch {
            position: fixed;
            top: 58px;
            right: 15px;
            z-index: 9999;
            background: rgba(6, 15, 33, 0.95);
            border: 2px solid rgba(241, 196, 15, 0.5);
            border-radius: 12px;
            padding: 10px 16px;
            color: #f1c40f;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            width: 140px;
            text-align: center;
        }
        
        body.light-theme-active .cosmic-theme-toggle-switch {
            background: #ffffff;
            color: #0f172a;
            border-color: #0f172a;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .smoke-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .smoke-cloud {
            position: absolute;
            top: -50%;
            width: 50vw;
            height: 200vh;
            filter: blur(140px);
            opacity: 0.14;
            border-radius: 50%;
            animation: smokeDrift 22s infinite alternate ease-in-out;
        }

        .smoke-left { left: -20vw; background: radial-gradient(circle, #ff007f 0%, #7f00ff 50%, transparent 100%); }
        .smoke-right { right: -20vw; background: radial-gradient(circle, #00f2fe 0%, #4facfe 50%, transparent 100%); animation-delay: -11s; }

        @keyframes smokeDrift {
            0% { transform: translateY(-2%) scale(1) rotate(0deg); }
            100% { transform: translateY(2%) scale(1.06) rotate(8deg); }
        }

        .cinema-stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 2;
            overflow: hidden;
        }

        @keyframes dynamicColorCycle {
            0%, 100% { --lamp-color: #f1c40f; --lamp-shadow: rgba(241, 196, 15, 0.8); }
            33% { --lamp-color: #00f2fe; --lamp-shadow: rgba(0, 242, 254, 0.8); }
            66% { --lamp-color: #2ecc71; --lamp-shadow: rgba(46, 204, 113, 0.8); }
        }

        .cinema-stage.activated {
            animation: dynamicColorCycle 5s infinite linear;
            background: radial-gradient(circle at center, rgba(241, 196, 15, 0.25) 0%, rgba(2, 5, 14, 1) 80%);
            box-shadow: inset 0 0 120px rgba(0, 242, 254, 0.2);
        }

        .cyber-lamp-core {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            transform: translateX(0) scale(1.05);
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .cinema-stage.activated .cyber-lamp-core { transform: translateX(380px) scale(0.85); }

        .metallic-shutter-head {
            width: 240px;
            height: 150px;
            background: linear-gradient(145deg, #182232, #05070a);
            border-radius: 100px 100px 40px 40px;
            position: relative;
            border: 3px solid #00f2fe;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.5);
            z-index: 5;
            overflow: hidden;
        }

        .cinema-stage.activated .metallic-shutter-head { border-color: var(--lamp-color); box-shadow: 0 0 75px var(--lamp-shadow); }

        .mechanical-gate {
            position: absolute;
            top: 25px;
            width: 60px;
            height: 90px;
            background: linear-gradient(145deg, #0f141d, #1a2333);
            border: 2px solid #2c3b54;
            transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s;
            z-index: 6;
        }

        .gate-left { left: 45px; border-radius: 12px 0 0 12px; }
        .gate-right { right: 45px; border-radius: 0 12px 12px 0; }
        .cinema-stage.activated .gate-left { transform: translateX(-55px); opacity: 0.1; }
        .cinema-stage.activated .gate-right { transform: translateX(55px); opacity: 0.1; }

        .blinding-core-light {
            position: absolute;
            width: 80px;
            height: 80px;
            background: #ffffff;
            border-radius: 50%;
            left: 50%;
            top: 30px;
            transform: translateX(-50%);
            filter: blur(6px);
            opacity: 0;
            transition: opacity 0.4s ease;
            box-shadow: 0 0 50px #ffffff;
        }
        .cinema-stage.activated .blinding-core-light { opacity: 1; }

        .hydraulic-stem { width: 16px; height: 240px; background: linear-gradient(90deg, #182232, #0b0f17, #2d3d56); z-index: 3; position: relative; }
        .laser-conduit { position: absolute; width: 4px; height: 100%; background: #18202c; left: 50%; transform: translateX(-50%); transition: background 0.5s; }
        .cinema-stage.activated .laser-conduit { background: var(--lamp-color); box-shadow: 0 0 30px var(--lamp-color); }

        .brushed-heavy-base { width: 200px; height: 28px; background: linear-gradient(180deg, #1e293b, #06090f); border-radius: 50% / 25%; border: 2px solid #334155; z-index: 4; }

        .volumetric-beam {
            position: absolute;
            top: 120px;
            width: 100px;
            height: 0;
            background: linear-gradient(to bottom, var(--lamp-color) 0%, rgba(255, 255, 255, 0.35) 25%, transparent 100%);
            clip-path: polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%);
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            transition: height 0.9s ease, width 0.9s ease, opacity 0.3s;
        }
        .cinema-stage.activated .volumetric-beam { opacity: 0.5; height: 490px; width: 760px; }

        .quantum-cord { position: absolute; top: 140px; left: 195px; z-index: 99; cursor: pointer; transition: transform 0.15s linear; padding: 20px; margin-left: -20px; }
        .beaded-wire { width: 4px; height: 160px; background: repeating-linear-gradient(to bottom, #f1c40f, #f1c40f 4px, #0f172a 4px, #0f172a 8px); }
        .luminescent-node { width: 24px; height: 24px; background: radial-gradient(circle, #fff, #f1c40f); border-radius: 50%; margin-left: -10px; box-shadow: 0 0 30px #f1c40f; }

        .audio-toggle-switch {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 9999;
            background: rgba(6, 15, 33, 0.95);
            border: 2px solid rgba(241, 196, 15, 0.5);
            border-radius: 12px;
            padding: 10px 16px;
            color: #f1c40f;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
            transition: all 0.3s ease;
            font-weight: bold;
            width: 140px;
            text-align: center;
        }
        body.light-theme-active .audio-toggle-switch { background: #ffffff; color: #0f172a; border-color: #0f172a; }

        /* --- HUD TERMINAL CORE OVERHAUL --- */
        .hud-glass-terminal {
            position: absolute;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            width: 95%;
            max-width: 460px;
            background: var(--panel-glass);
            border: 3px solid var(--border-glass);
            border-left: 6px solid #f1c40f;
            padding: 35px 25px;
            border-radius: 24px;
            backdrop-filter: blur(40px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            opacity: 0;
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 20;
        }

        .cinema-stage.activated .hud-glass-terminal { transform: translateX(-50%) scale(1); opacity: 1; }

        .hud-top-bar { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .hud-status-chip { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: #f1c40f; background: rgba(241,196,15,0.15); padding: 6px 14px; border-radius: 6px; border: 2px solid rgba(241,196,15,0.4); letter-spacing: 1px; font-weight: bold; }
        .hud-status-chip.cyan-pulse { color: #00f2fe; background: rgba(0,242,254,0.15); border-color: rgba(0,242,254,0.5); }

        .hud-logo { font-family: 'Orbitron', sans-serif; color: var(--text-main); font-size: 2.6rem; text-align: center; margin-bottom: 25px; font-weight: 900; letter-spacing: 2px; }

        .portal-matrix-tabs { display: flex; background: rgba(0,0,0,0.5); padding: 6px; border-radius: 12px; margin-bottom: 25px; gap: 4px; }
        .hud-tab { flex: 1; padding: 14px; background: transparent; border: none; color: var(--text-sub); font-size: 1rem; font-weight: 700; cursor: pointer; border-radius: 8px; transition: 0.3s; white-space: nowrap; }
        .hud-tab.active { background: rgba(241,196,15,0.25); color: #f1c40f; border: 2px solid rgba(241,196,15,0.5); font-family: 'Orbitron', sans-serif; font-size: 0.9rem; }

        .hud-input-cluster { position: relative; margin-bottom: 28px; width: 100%; }
        .hud-input-cluster input, .hud-input-cluster textarea, .hud-input-cluster select { width: 100%; padding: 18px 16px; background: var(--input-bg); border: 2px solid var(--border-glass); border-radius: 10px; color: var(--text-main); font-size: 1.1rem; outline: none; transition: 0.3s; font-weight: 700; }
        .hud-input-cluster textarea { height: 100px; resize: none; }
        .hud-input-cluster select { color: #f1c40f; font-weight: bold; background: var(--input-bg); }

        .hud-input-cluster label { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-sub); pointer-events: none; transition: 0.3s; font-size: 1rem; font-weight: 700; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        .hud-input-cluster textarea ~ label { top: -14px; left: 10px; }

        .hud-input-cluster input:focus ~ label, .hud-input-cluster input:not(:placeholder-shown) ~ label,
        .hud-input-cluster textarea:focus ~ label, .hud-input-cluster textarea:not(:placeholder-shown) ~ label { top: -14px; left: 10px; background: var(--bg-prime); padding: 2px 8px; font-size: 0.85rem; color: #f1c40f; font-family: 'Orbitron', sans-serif; font-weight: 900; }

        .neon-glow-underline { position: absolute; bottom: 0; left: 50%; width: 0; height: 3px; background: #f1c40f; transition: 0.4s ease; transform: translateX(-50%); }
        .hud-input-cluster input:focus ~ .neon-glow-underline { width: 100%; box-shadow: 0 0 15px #f1c40f; }

        .hud-engage-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #f1c40f, #d4ac0d); color: #000000; border: none; border-radius: 10px; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.1rem; cursor: pointer; letter-spacing: 2px; transition: 0.3s; box-shadow: 0 4px 15px rgba(241,196,15,0.3); }
        .hud-engage-btn:hover { box-shadow: 0 0 40px rgba(241, 196, 15, 0.8); transform: translateY(-2px); }

        /* --- DASHBOARD CORE OVERHAUL --- */
        .dashboard-panel-core {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: var(--bg-prime);
            z-index: 100;
            padding: 20px;
            overflow-y: auto;
            overflow-x: hidden;
            transition: background 0.4s ease;
            padding-bottom: 40px;
            padding-top: 100px;
        }

        .hud-container-panel {
            background: var(--panel-glass);
            border: 3px solid var(--border-glass);
            border-top: 6px solid #00f2fe;
            padding: 35px 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 1280px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(40px);
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .panel-header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 3px solid var(--border-glass); padding-bottom: 18px; gap: 10px; }
        .neon-cyan-text { font-family: 'Orbitron'; color: #00f2fe; font-size: 2rem; text-shadow: 0 0 20px rgba(0,242,254,0.6); font-weight: 900; }
        .neon-green-text { font-family: 'Orbitron'; color: #2ecc71; font-size: 2rem; text-shadow: 0 0 20px rgba(46,204,113,0.6); font-weight: 900; }

        .workspace-channel-selector { display: flex; gap: 14px; margin-bottom: 25px; background: rgba(0,0,0,0.5); padding: 6px; border-radius: 12px; border: 2px solid var(--border-glass); }
        .channel-tab-btn { flex: 1; padding: 16px 12px; background: transparent; border: none; color: var(--text-sub); font-family: 'Orbitron', sans-serif; font-size: 0.95rem; font-weight: bold; cursor: pointer; border-radius: 8px; transition: all 0.3s ease; display: flex; center; align-items: center; justify-content: center; gap: 8px; }
        .channel-tab-btn.active { background: rgba(0, 242, 254, 0.25); color: #00f2fe; border: 2px solid rgba(0, 242, 254, 0.5); box-shadow: 0 0 20px rgba(0, 242, 254, 0.3); }

        .form-grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .full-width-field { grid-column: span 2; }

        .abort-btn { padding: 12px 24px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; font-size: 0.9rem; transition: 0.3s; box-shadow: 0 4px 10px rgba(231,76,60,0.3); letter-spacing: 1px; }
        .abort-btn:hover { background: #c0392b; box-shadow: 0 0 20px rgba(231,76,60,0.6); }
         
        .ai-helper-banner { padding: 16px; margin-top: 25px; border-radius: 12px; background: rgba(0,242,254,0.08); border: 2px solid rgba(0,242,254,0.3); color: #00f2fe; text-align: center; font-size: 1.05rem; font-weight: 700; }
        
        .search-terminal-input { width: 100%; padding: 18px; background: rgba(0,0,0,0.4); border: 2px solid var(--border-glass); border-radius: 12px; color: var(--text-main); font-size: 1.1rem; font-family: 'Orbitron'; outline: none; font-weight: bold; }

        #policyCardsStack { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; width: 100%; }
         
        .hud-data-card { background: rgba(4, 14, 33, 0.7); border: 2px solid var(--border-glass); border-left: 6px solid #f1c40f; padding: 25px; border-radius: 14px; display: flex; flex-direction: column; gap: 14px; word-break: break-all; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .hud-data-card p { color: var(--text-sub); font-size: 1.05rem; display: flex; flex-flow: row wrap; gap: 8px; font-weight: 600; line-height: 1.5; }
        .hud-data-card b { color: #ffffff; display: inline-block; width: 110px; flex-shrink: 0; font-family: 'Orbitron', sans-serif; font-size: 0.85rem; letter-spacing: 0.5px; }
        
        /* --- ADMIN INTERACTIVE COPY SYSTEM ELEMENTS --- */
        .admin-clickable-badge { color: #f1c40f; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 6px; font-family: monospace; font-size: 1rem; font-weight: bold; border: 1px solid rgba(241,196,15,0.3); cursor: pointer; transition: all 0.2s ease; position: relative; }
        .admin-clickable-badge:hover { background: #f1c40f; color: #000; transform: scale(1.03); box-shadow: 0 0 10px #f1c40f; }
        .admin-clickable-badge::after { content: 'Click to Copy'; position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); background: #000; color: #fff; font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; opacity: 0; pointer-events: none; transition: opacity 0.2s; white-space: nowrap; font-family: 'Orbitron', sans-serif; border: 1px solid #00f2fe; }
        .admin-clickable-badge:hover::after { opacity: 1; }
         
        .hud-data-card .owner-name-tag-right {
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: 'Orbitron', sans-serif;
            color: #00f2fe;
            font-size: 0.9rem;
            font-weight: 900;
            background: rgba(0, 242, 254, 0.2);
            padding: 6px 14px;
            border-radius: 6px;
            border: 2px solid rgba(0, 242, 254, 0.5);
            text-shadow: 0 0 5px rgba(0,242,254,0.5);
        }

        .status-badge { font-family: 'Orbitron'; font-size: 0.85rem; padding: 6px 12px; border-radius: 6px; font-weight: 900; display: inline-block; text-align: center; }
        .status-pending { background: rgba(241,196,15,0.2); color: #f1c40f; border: 1px solid #f1c40f; }
        .status-uploaded { background: rgba(46,204,113,0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .status-error { background: rgba(231,76,60,0.2); color: #e74c3c; border: 1px solid #e74c3c; }
        .status-closed { background: rgba(149,165,166,0.2); color: #95a5a6; border: 1px solid #95a5a6; }

        .wipe-card-btn { width: 100%; padding: 12px; background: rgba(231,76,60,0.15); border: 2px solid rgba(231,76,60,0.5); color: #e74c3c; font-family: 'Orbitron'; font-weight: 900; font-size: 0.9rem; border-radius: 8px; cursor: pointer; margin-top: 5px; transition: 0.3s; }
        .wipe-card-btn:hover { background: rgba(231,76,60,0.3); color: #fff; box-shadow: 0 0 15px rgba(231,76,60,0.4); }

        .hidden { display: none !important; }
        .text-left { text-align: left; }

        .admin-category-navbar { display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 6px; border-radius: 12px; margin-bottom: 25px; border: 2px solid var(--border-glass); }
        .admin-nav-tab { flex: 1; padding: 16px 6px; background: transparent; border: none; color: var(--text-sub); font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; text-align: center; }
        .admin-nav-tab.active { background: rgba(241,196,15,0.25); color: #f1c40f; border: 2px solid rgba(241,196,15,0.5); box-shadow: 0 0 15px rgba(241,196,15,0.2); }

        .cyber-upload-node { border: 2px dashed rgba(0, 242, 254, 0.6); border-radius: 14px; padding: 25px; background: rgba(0,0,0,0.3); text-align: center; cursor: pointer; transition: 0.3s; }
        .cyber-upload-node:hover { border-color: #00f2fe; background: rgba(0,242,254,0.05); }

        .cred-sync-card { background: rgba(4, 12, 30, 0.85); border: 2px solid var(--border-glass); border-left: 6px solid #2ecc71; padding: 25px; border-radius: 14px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .cred-sync-card h4 { font-family: 'Orbitron', sans-serif; color: #2ecc71; font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 1px; text-shadow: 0 0 10px rgba(46,204,113,0.3); }

        /* --- WHATSAPP UTILITY LAYOUT WITH EXPANDED PLUGINS --- */
        .chat-io-grid-matrix { display: grid; grid-template-columns: 310px 1fr; gap: 0; height: 600px; background: var(--chat-bg); border-radius: 16px; border: 3px solid var(--border-glass); overflow: hidden; backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        .chat-target-userlist-pane { background: rgba(17, 27, 33, 0.7); border-right: 2px solid var(--border-glass); display: flex; flex-direction: column; overflow-y: auto; }

        function executeAutoPurgeEightDaysOldChats(chatsSnapshotObj) {
            if(!chatsSnapshotObj) return;
            const thresholdLifespanLimit = 8 * 24 * 60 * 60 * 1000; 
            const rightNowTimeEpoch = Date.now();
            Object.keys(chatsSnapshotObj).forEach(key => {
                const packet = chatsSnapshotObj[key];
                if(packet.epochTimeNode && (rightNowTimeEpoch - packet.epochTimeNode) > thresholdLifespanLimit) {
                    remove(ref(db, `chats/${key}`));
                }
            });
        }

                sender: loggedInCustomerID, receiver: activeSelectedChatTargetUserId,
                textBody: finalMessageText || "📎 Asset Node", mediaPayload: globalLiveChatBinaryStreamBase64,
                read: false, epochTimeNode: Date.now(),

        window.toggleVoiceAudioRecordingEngine = function() {
            const recBtn = document.getElementById('voiceRecordingCoreTriggerBtn');
            if (!nativeAudioMediaRecorderInstance || nativeAudioMediaRecorderInstance.state === "inactive") {
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    nativeAudioMediaRecorderInstance = new MediaRecorder(stream);
                    compiledAudioChunksCollectorArr = [];
                    
                    nativeAudioMediaRecorderInstance.ondataavailable = e => {
                        if (e.data.size > 0) compiledAudioChunksCollectorArr.push(e.data);
                    };

                    nativeAudioMediaRecorderInstance.onstop = () => {
                        const blob = new Blob(compiledAudioChunksCollectorArr, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            globalLiveChatBinaryStreamBase64 = e.target.result;
                            dispatchMatrixChatMessage();
                        };
                        reader.readAsDataURL(blob);
                        stream.getTracks().forEach(track => track.stop());
                    };

                    nativeAudioMediaRecorderInstance.start();
                    recBtn.classList.add('recording-active-pulse');
                    document.getElementById('chatAttachmentStatusFeedback').innerText = "🎙️ Recording live stream audio...";
                }).catch(() => {
                    alert("Audio device signature rejected.");
                });
            } else {
                nativeAudioMediaRecorderInstance.stop();
                recBtn.classList.remove('recording-active-pulse');
                document.getElementById('chatAttachmentStatusFeedback').innerText = "";
            }
        };

        window.playSynthesizedSound = function(frequency, type, duration) {
            if (!isSystemAudioEnabled) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type; oscillator.frequency.value = frequency;
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        };

        window.setAdminSpyTargetConversationTrack = function(userId) {
            spyActiveTargetUserContext = userId;
            document.getElementById('spyActiveHeaderTitle').innerText = `Console Pipeline: @${userId}`;
            renderAdminSpyChatConsoleLogs();
            renderAdminSpyUserList();
        };

        window.renderAdminSpyChatConsoleLogs = function() {
            const stack = document.getElementById('adminSpyChatLogsStack'); if(!stack || !spyActiveTargetUserContext) return;
            get(ref(db, 'chats')).then((snapshot) => {
                const data = snapshot.val();
                if(!data) { stack.innerHTML = `<div style="color:var(--text-sub); font-size:1rem; margin:auto; font-weight:bold;">🔒 Chat string stack clear.</div>`; return; }
                let htmlCollector = "";
                Object.keys(data).forEach(key => {
                    const m = data[key];
                    if((m.sender === spyActiveTargetUserContext && m.receiver === cachedAdminMainframeRoute.masterId) ||
                       (m.sender === cachedAdminMainframeRoute.masterId && m.receiver === spyActiveTargetUserContext)) {
                        const isMyResponse = (m.sender === cachedAdminMainframeRoute.masterId);
                        
                        let assetHTML = "";
                        if(m.mediaPayload) {
                            if(m.mediaPayload.startsWith("data:audio")) {
                                assetHTML = `<br><audio src="${m.mediaPayload}" controls style="max-width:240px; margin-top:6px; display:block;"></audio>`;
                            } else {
                                assetHTML = `<br><img src="${m.mediaPayload}" style="max-width:160px; border-radius:8px; margin-top:5px; display:block;">`;
                            }
                        }
                        
                        htmlCollector += `
                            <div class="bubble-msg-wrapper" style="${isMyResponse ? 'background:#005c4b; color:#fff; align-self:flex-end;' : 'background:#202c33; color:#fff; align-self:flex-start;'}" onclick="spawnContextDropdownMenuOverlay(event, '${key}', '${m.textBody}', '${m.mediaPayload || ''}', ${m.epochTimeNode || 0})">
                                ${m.textBody}${assetHTML}<div class="whatsapp-time">${m.timestamp}</div>
                            </div>`;
                    }
                });
                stack.innerHTML = htmlCollector || `<div style="color:var(--text-sub); font-size:1rem; margin:auto; font-weight:bold;">🔒 Encryption verified.</div>`;
                stack.scrollTop = stack.scrollHeight;
            });
        };

        window.dispatchAdminSpyInterceptionMsg = function() {
            const input = document.getElementById('adminSpyResponseInput'); if(!input || !input.value.trim() || !spyActiveTargetUserContext) return;
            const newChatRef = push(ref(db, 'chats'));
            set(newChatRef, {
                sender: cachedAdminMainframeRoute.masterId, receiver: spyActiveTargetUserContext,
                textBody: input.value.trim(), mediaPayload: "", read: false, epochTimeNode: Date.now(),
                timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            }).then(() => { input.value = ""; renderAdminSpyChatConsoleLogs(); });
        };

        window.spawnContextDropdownMenuOverlay = function(event, messageKey, textPayload, mediaUrl, epochTimeNodeVal) {
            event.stopPropagation(); removeContextDropdownMenuNode();
            const menu = document.createElement('div');
            menu.className = "msg-interactive-dropdown-menu"; menu.id = "dynamicMsgContextNodeOverlay";
            let downloadBtnHTML = mediaUrl ? `<button class="dropdown-action-row-btn" onclick="executePhysicalAssetDownloadEngine('${mediaUrl}')">💾 Save Asset</button>` : `<button class="dropdown-action-row-btn" onclick="executePhysicalAssetDownloadEngine('${textPayload}', true)">💾 Save Text</button>`;
            menu.innerHTML = `${downloadBtnHTML}<button class="dropdown-action-row-btn delete-color" onclick="executeStructuralDeletionSelectionMatrix('${messageKey}', ${epochTimeNodeVal})">❌ Delete</button>`;
            document.body.appendChild(menu); menu.style.left = `${event.clientX}px`; menu.style.top = `${event.clientY}px`;
        };

        function removeContextDropdownMenuNode() { const overlay = document.getElementById('dynamicMsgContextNodeOverlay'); if(overlay) overlay.remove(); }
        window.executePhysicalAssetDownloadEngine = function(data, isTxt=false) {
            const a = document.createElement('a');
            a.href = isTxt ? "data:text/plain;charset=utf-8," + encodeURIComponent(data) : data;
            a.download = isTxt ? `Nexus_Data_${Date.now()}.txt` : `Nexus_Asset_${Date.now()}.webm`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); removeContextDropdownMenuNode();
        };

        window.executeStructuralDeletionSelectionMatrix = function(messagePacketKey, epochTimeNodeVal) {
            removeContextDropdownMenuNode();
            const wrapper = document.getElementById('nexusCustomInlineModalWrapper'); if(!wrapper) return;
            wrapper.innerHTML = `
                <div class="nexus-popup-card-box" onclick="event.stopPropagation()">
                    <h4>Delete Message String</h4>
                    <div class="nexus-popup-flex-btns" style="flex-direction:column; gap:8px;">
                        <button onclick="commitMessageErasureExecution('${messagePacketKey}', 'everyone')" class="nexus-popup-btn primary-btn" style="width:100%; padding:12px;">Delete for Everyone</button>
                        <button onclick="commitMessageErasureExecution('${messagePacketKey}', 'me', ${epochTimeNodeVal})" class="nexus-popup-btn primary-btn" style="width:100%; padding:12px; background:#f1c40f;">Delete for Me</button>
                        <button onclick="closeCustomInlinePopupEngine()" class="nexus-popup-btn cancel-btn" style="width:100%; padding:12px;">Cancel</button>
                    </div>
                </div>
            `;
            wrapper.classList.remove('hidden');
        };

        window.commitMessageErasureExecution = function(packetKey, purgeMode, epochTimeNodeVal = 0) {
            closeCustomInlinePopupEngine();
            if(packetKey && purgeMode === 'everyone') {
                remove(ref(db, `chats/${packetKey}`)).then(() => {
                    if(currentMode === 'admin') renderAdminSpyChatConsoleLogs(); else renderActiveChatConversationLogs();
                });
            } else {
                localStorage.setItem(`deleted_chat_node_${loggedInCustomerID}_${epochTimeNodeVal}`, "purged");
                if(currentMode === 'admin') renderAdminSpyChatConsoleLogs(); else renderActiveChatConversationLogs();
            }
        };
    </script>
</body>
</html>
