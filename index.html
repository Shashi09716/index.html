<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Made By SHASHI TIWARI - Pikachu Ultimate Nexus Matrix ⚡</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap">
    <style>
        /* --- HIGH-VISIBILITY ULTRA-CONTRAST CYBERPUNK ENGINE --- */
        :root {
            --lamp-color: #f1c40f;
            --lamp-glow: #f1c40f;
            --lamp-shadow: rgba(241, 196, 15, 0.9);
            --neon-cyan: #00f2fe;
            --neon-pink: #ff007f;
            --whatsapp-green: #2ecc71;
            --admin-purple: #af7ac5;
            --bg-prime: #02050e;
            --panel-glass: rgba(6, 17, 38, 0.99);
            --border-glass: rgba(0, 242, 254, 0.7);
            --text-main: #ffffff;
            --text-sub: #f8fafc;
            --chat-bg: #090f14;
            --input-bg: #010610;
            --accent-yellow: #f1c40f;
            --cyber-glow: 0 0 35px rgba(0, 242, 254, 0.8), 0 0 15px rgba(255, 0, 127, 0.5);
            --card-surface: rgba(4, 14, 33, 0.85);
        }

        body.light-theme-active {
            --bg-prime: #f8fafc;
            --panel-glass: #ffffff;
            --border-glass: #0f172a;
            --text-main: #0f172a;
            --text-sub: #1e293b;
            --chat-bg: #cbd5e1;
            --input-bg: #ffffff;
            --accent-yellow: #b45309;
            --cyber-glow: 0 6px 24px rgba(15, 23, 42, 0.2);
            --card-surface: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-prime);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            user-select: none;
            position: relative;
            width: 100vw;
            transition: background 0.4s ease, color 0.4s ease;
            color: var(--text-main);
        }

        /* --- FIXED BRANDING HEADER VECTOR --- */
        .shashi-header-brand-block {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            pointer-events: none;
            width: auto;
        }
        
        .brand-main-title {
            font-weight: 900;
            font-size: 2.2rem;
            letter-spacing: 6px;
            color: #ffffff;
            text-shadow: 0 0 35px var(--lamp-color), 0 0 15px rgba(241, 196, 15, 0.6);
        }
        
        body.light-theme-active .brand-main-title {
            color: #0f172a;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .cosmic-theme-toggle-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            background: rgba(6, 17, 38, 0.95);
            border: 2px solid rgba(241, 196, 15, 0.6);
            border-radius: 12px;
            padding: 12px 18px;
            color: #f1c40f;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(241, 196, 15, 0.3);
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            width: 145px;
            text-align: center;
        }
        body.light-theme-active .cosmic-theme-toggle-switch { background: #ffffff; color: #0f172a; border-color: #0f172a; box-shadow: 0 6px 14px rgba(0,0,0,0.15); }

        .system-instant-refresher-btn {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            color: #000000;
            padding: 12px 20px;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            transition: 0.2s ease;
        }
        .system-instant-refresher-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(0, 242, 254, 0.8); }

        .smoke-container { position: fixed; inset: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1; overflow: hidden; }
        .smoke-cloud { position: absolute; top: -50%; width: 50vw; height: 200vh; filter: blur(140px); opacity: 0.2; border-radius: 50%; animation: smokeDrift 22s infinite alternate ease-in-out; }
        .smoke-left { left: -20vw; background: radial-gradient(circle, #ff007f 0%, #7f00ff 50%, transparent 100%); }
        .smoke-right { right: -20vw; background: radial-gradient(circle, #00f2fe 0%, #4facfe 50%, transparent 100%); animation-delay: -11s; }

        @keyframes smokeDrift { 0% { transform: translateY(-2%) scale(1) rotate(0deg); } 100% { transform: translateY(2%) scale(1.06) rotate(8deg); } }

        /* --- THE LUXURY STAGE & CYBER LAMP --- */
        .cinema-stage { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1); z-index: 2; overflow: hidden; }
        .cinema-stage.activated { animation: dynamicColorCycle 5s infinite linear; background: radial-gradient(circle at center, rgba(241, 196, 15, 0.35) 0%, rgba(2, 5, 14, 1) 75%); box-shadow: inset 0 0 150px rgba(0, 242, 254, 0.4); }

        .cyber-lamp-core { position: relative; display: flex; flex-direction: column; align-items: center; z-index: 10; transform: scale(1.15); transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1); filter: drop-shadow(0 0 30px rgba(0, 242, 254, 0.3)); }
        .cinema-stage.activated .cyber-lamp-core { transform: translateX(380px) scale(0.85); }

        .metallic-shutter-head { width: 250px; height: 155px; background: linear-gradient(145deg, #1c2a39, #05070a); border-radius: 110px 100px 45px 40px; position: relative; border: 3px solid #00f2fe; box-shadow: 0 0 50px rgba(0, 242, 254, 0.7); z-index: 5; overflow: hidden; }
        .cinema-stage.activated .metallic-shutter-head { border-color: var(--lamp-color); box-shadow: 0 0 90px var(--lamp-shadow); }

        .mechanical-gate { position: absolute; top: 25px; width: 65px; height: 95px; background: linear-gradient(145deg, #0f141d, #1a2333); border: 2px solid #2c3b54; transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s; z-index: 6; }
        .gate-left { left: 45px; border-radius: 12px 0 0 12px; }
        .gate-right { right: 45px; border-radius: 0 12px 12px 0; }
        .cinema-stage.activated .gate-left { transform: translateX(-60px); opacity: 0.05; }
        .cinema-stage.activated .gate-right { transform: translateX(60px); opacity: 0.05; }

        .blinding-core-light { position: absolute; width: 90px; height: 90px; background: #ffffff; border-radius: 50%; left: 50%; top: 25px; transform: translateX(-50%); filter: blur(4px); opacity: 0; transition: opacity 0.4s ease; box-shadow: 0 0 60px #ffffff, 0 0 30px var(--neon-cyan); }
        .cinema-stage.activated .blinding-core-light { opacity: 1; }

        .hydraulic-stem { width: 18px; height: 240px; background: linear-gradient(90deg, #1c2a39, #0b0f17, #2d3d56); z-index: 3; position: relative; }
        .laser-conduit { position: absolute; width: 6px; height: 100%; background: #18202c; left: 50%; transform: translateX(-50%); transition: background 0.5s; }
        .cinema-stage.activated .laser-conduit { background: var(--lamp-color); box-shadow: 0 0 40px var(--lamp-color); }
        .brushed-heavy-base { width: 210px; height: 32px; background: linear-gradient(180deg, #1e293b, #06090f); border-radius: 50% / 25%; border: 2px solid #334155; z-index: 4; }

        .volumetric-beam { position: absolute; top: 120px; width: 120px; height: 0; background: linear-gradient(to bottom, var(--lamp-color) 0%, rgba(255, 255, 255, 0.45) 20%, transparent 100%); clip-path: polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%); z-index: 2; pointer-events: none; opacity: 0; transition: height 0.9s ease, width 0.9s ease, opacity 0.3s; mix-blend-mode: screen; }
        .cinema-stage.activated .volumetric-beam { opacity: 0.7; height: 600px; width: 900px; filter: blur(2px); }

        /* --- ADVANCED ADVANCED LOGIN WINDOW --- */
        .hud-glass-terminal { position: absolute; left: 50%; transform: translateX(-50%) scale(0.9); width: 95%; max-width: 470px; background: var(--panel-glass); border: 3px solid var(--border-glass); border-left: 8px solid var(--neon-cyan); padding: 40px 30px; border-radius: 24px; backdrop-filter: blur(50px); box-shadow: 0 50px 120px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,242,254,0.1); opacity: 0; transition: all 1s cubic-bezier(0.19, 1, 0.22, 1); z-index: 20; }

        /* --- DATA STRUCTURE CARDS --- */
        .workspace-channel-selector { display: flex; gap: 12px; margin-bottom: 25px; background: rgba(0,0,0,0.6); padding: 6px; border-radius: 12px; border: 2px solid var(--border-glass); flex-wrap: wrap; }
        .channel-tab-btn { flex: 1; min-width: 120px; padding: 15px 10px; background: transparent; border: none; color: var(--text-sub); font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.2s ease; display: flex; justify-content: center; align-items: center; gap: 6px; }
        .channel-tab-btn.active { background: rgba(0, 242, 254, 0.25); color: #00f2fe; border: 2px solid rgba(0, 242, 254, 0.5); box-shadow: var(--cyber-glow); }

        .hud-data-card { background: var(--card-surface); border: 2px solid var(--border-glass); border-left: 6px solid #f1c40f; padding: 25px; border-radius: 14px; display: flex; flex-direction: column; gap: 14px; word-break: break-all; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .hud-data-card p { color: var(--text-sub); font-size: 1.05rem; display: flex; flex-flow: row wrap; gap: 8px; font-weight: 600; }
        .hud-data-card b { color: var(--text-main); display: inline-block; width: 110px; flex-shrink: 0; font-family: 'Orbitron'; font-size: 0.85rem; letter-spacing: 0.5px; }

        /* --- RICH INTEGRATED NOTES SYSTEM --- */
        .notes-matrix-shell-card { background: var(--card-surface); border: 3px solid var(--border-glass); border-radius: 16px; padding: 25px; margin-bottom: 25px; box-shadow: var(--cyber-glow); }
        .notes-writing-pad-container { position: relative; margin-top: 15px; background: var(--input-bg); border-radius: 10px; border: 2px solid var(--border-glass); overflow: hidden; }
        .notes-input-rich-pad { width: 100%; min-height: 190px; padding: 18px; color: var(--text-main); background: transparent; font-size: 1.1rem; border: none; outline: none; font-family: 'Rajdhani', sans-serif; font-weight: 600; line-height: 1.6; overflow-y: auto; text-align: left; }
        .notes-ribbon-toolbar { background: rgba(0,0,0,0.4); padding: 10px 15px; border-bottom: 2px solid var(--border-glass); display: flex; gap: 10px; align-items: center; flex-flow: row wrap; }
        .note-utility-btn { background: rgba(4,15,36,0.1); border: 2px solid var(--border-glass); color: var(--text-main); padding: 8px 14px; border-radius: 6px; font-family: 'Orbitron'; font-size: 0.85rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .note-utility-btn:hover { background: #00f2fe; color: #000; box-shadow: 0 0 10px #00f2fe; }

        .note-timeline-logs-stack { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 25px; max-height: 350px; overflow-y: auto; }
        .note-cloud-row-card { background: var(--input-bg); padding: 18px; border-radius: 10px; border: 1px solid var(--border-glass); border-left: 6px solid var(--neon-pink); position: relative; text-align: left; }
        .note-cloud-meta-row { display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 0.8rem; color: var(--neon-pink); margin-bottom: 10px; font-weight: bold; }

        /* --- THE LUXURY WHATSAPP GRID --- */
        .chat-io-grid-matrix { display: grid; grid-template-columns: 310px 1fr; gap: 0; height: 600px; background: var(--chat-bg); border-radius: 16px; border: 3px solid var(--border-glass); overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.6); position: relative; }
        .chat-target-userlist-pane { background: rgba(17, 27, 33, 0.8); border-right: 2px solid var(--border-glass); display: flex; flex-direction: column; overflow-y: auto; }
        body.light-theme-active .chat-target-userlist-pane { background: #cbd5e1; }
        
        .chat-user-item-node { padding: 14px 16px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border-glass); color: var(--text-main); cursor: pointer; transition: background 0.2s; }
        .chat-user-item-node.active-chat-target { background: rgba(0, 242, 254, 0.25) !important; border-left: 6px solid #00f2fe; }
        
        .whatsapp-avatar { width: 44px; height: 44px; border-radius: 50%; background: #64748b; object-fit: cover; border: 2px solid var(--border-glass); z-index: 5; }
        .chat-stream-message-container { display: flex; flex-direction: column; background: var(--chat-bg); position: relative; height: 100%; overflow: hidden; }
        .chat-stream-header-bar { background: rgba(32, 44, 51, 0.98); padding: 14px 20px; border-bottom: 2px solid var(--border-glass); color: #fff; display: flex; align-items: center; justify-content: space-between; gap: 12px; z-index: 2; }

        .chat-messages-scroll-stack { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; z-index: 2; }
        .bubble-msg-wrapper { max-width: 65%; padding: 12px 16px; border-radius: 12px; font-size: 1rem; line-height: 1.4; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.4); font-weight: 600; word-wrap: break-word; }
        .bubble-outgoing { background: #005c4b; color: #ffffff; align-self: flex-end; border-top-right-radius: 0; border: 1px solid rgba(0,242,254,0.2); }
        .bubble-incoming { background: #202c33; color: #ffffff; align-self: flex-start; border-top-left-radius: 0; border: 1px solid rgba(255,255,255,0.1); }
        body.light-theme-active .bubble-incoming { background: #ffffff; color: #0f172a; }
        body.light-theme-active .bubble-outgoing { background: #d9fdd3; color: #0f172a; }
        .whatsapp-time { font-size: 0.75rem; color: #a6bcdc; text-align: right; margin-top: 6px; display: block; }

        .emoji-matrix-drawer { background: #182229; border-top: 2px solid var(--border-glass); padding: 14px; display: grid; grid-template-columns: repeat(10, 1fr); gap: 12px; max-height: 180px; overflow-y: auto; z-index: 5; }
        .emoji-item-node { font-size: 1.75rem; text-align: center; cursor: pointer; }
        .mainframe-gif-drawer { background: #182229; border-top: 2px solid var(--border-glass); padding: 14px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-height: 190px; overflow-y: auto; z-index: 5; }
        .gif-thumb-item { width: 100%; height: 80px; object-fit: cover; border-radius: 6px; cursor: pointer; }

        .chat-interface-footer-inputs { padding: 14px 20px; background: rgba(32, 44, 51, 0.98); border-top: 2px solid var(--border-glass); display: flex; gap: 14px; align-items: center; z-index: 10; margin-top: auto; }
        .whatsapp-input-field { flex: 1; padding: 14px 20px; background: rgba(42, 57, 66, 0.9); border: 2px solid var(--border-glass); border-radius: 10px; color: #fff; outline: none; font-size: 1.05rem; font-family: 'Rajdhani', sans-serif; font-weight: 700; }
        body.light-theme-active .whatsapp-input-field { background: #ffffff; color: #000; }
        .whatsapp-circle-btn { width: 44px; height: 44px; background: transparent; border: none; color: #00f2fe; font-size: 1.5rem; cursor: pointer; display: flex; justify-content: center; align-items: center; }

        /* --- SANDBOX FUTURE GAMING --- */
        .gaming-bar-nexus-wrapper { background: linear-gradient(145deg, rgba(6, 17, 38, 0.95), rgba(2, 5, 14, 0.99)); border: 3px dashed var(--neon-pink); border-radius: 16px; padding: 40px 25px; text-align: center; margin-bottom: 25px; position: relative; overflow: hidden; }
        .gaming-empty-sandbox-container { border: 2px solid rgba(255,0,127,0.3); background: rgba(0,0,0,0.4); border-radius: 12px; padding: 60px 20px; font-family: 'Orbitron'; color: var(--text-main); font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-pink); margin-top: 20px; }
        .gaming-pulse-node-core { width: 12px; height: 12px; background: var(--neon-pink); border-radius: 50%; display: inline-block; margin-right: 10px; animation: recPulse 0.8s infinite alternate; }

        .admin-category-navbar { display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 6px; border-radius: 12px; margin-bottom: 25px; border: 2px solid var(--border-glass); }
        .admin-nav-tab { flex: 1; padding: 16px 6px; background: transparent; border: none; color: var(--text-sub); font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: bold; cursor: pointer; border-radius: 8px; text-align: center; }
        .admin-nav-tab.active { background: rgba(241,196,15,0.25); color: #f1c40f; border: 2px solid rgba(241,196,15,0.5); }

        .giant-compiler-layout { background: rgba(4, 12, 30, 0.8); padding: 35px 25px; border-radius: 16px; border: 3px solid rgba(26,188,156,0.5); margin-bottom: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        body.light-theme-active .giant-compiler-layout { background: #ffffff; border-color: #1abc9c; }
        .giant-compiler-layout h3 { color: #00f2fe; font-family: 'Orbitron'; margin-bottom: 22px; font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; }
        body.light-theme-active .giant-compiler-layout h3 { color: #16a085; }
        .giant-compiler-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 22px; }
        .giant-compiler-input { width: 100%; padding: 18px; background: rgba(5, 12, 28, 0.85); border: 2px solid var(--border-glass); color: var(--text-main); border-radius: 10px; font-family: 'Orbitron'; font-size: 1.1rem; outline: none; font-weight: 700; }
        body.light-theme-active .giant-compiler-input { background: #ffffff; }

        @media (max-width: 768px) {
            .giant-compiler-grid { grid-template-columns: 1fr !important; }
            .form-grid-layout { grid-template-columns: 1fr !important; }
            .full-width-field { grid-column: span 1; }
            #policyCardsStack { grid-template-columns: 1fr !important; }
            .chat-io-grid-matrix { grid-template-columns: 1fr !important; height: 600px; }
            .chat-target-userlist-pane { max-height: 140px; flex-direction: row; overflow-x: auto; }
            .cinema-stage.activated .cyber-lamp-core { transform: translateY(-160px) scale(0.7); }
        }
    </style>
</head>
<body>
    
    <div class="shashi-header-brand-block" id="shashiBrandingHeader">
        <div class="brand-main-title">Made By SHASHI TIWARI</div>
    </div>

    <button id="systemAudioToggleBtn" class="audio-toggle-switch" onclick="toggleGlobalSystemAudio()">
        <span>🔊 SOUND: ON</span>
    </button>
    <button class="cosmic-theme-toggle-switch" onclick="executeCosmicThemeToggle()">
        <span id="themeToggleBtnLabel">🌓 LIGHT MODE</span>
    </button>

    <div class="smoke-container">
        <div class="smoke-cloud smoke-left"></div>
        <div class="smoke-cloud smoke-right"></div>
    </div>
                                                                                                                                                                                
    <div class="cinema-stage" id="mainStage" onclick="triggerLampActivationOverride()">
        <div class="cyber-lamp-core" id="lampDevice" style="cursor: pointer;">
            <div class="metallic-shutter-head">
                <div class="blinding-core-light"></div>
                <div class="mechanical-gate gate-left"></div>
                <div class="mechanical-gate gate-right"></div>
            </div>
            
            <div class="hydraulic-stem"><div class="laser-conduit"></div></div>
            <div class="brushed-heavy-base"></div>
            <div class="volumetric-beam" id="lightBeam"></div>
                                                                                                                                                                                
            <div class="quantum-cord" id="triggerCord">
                <div class="beaded-wire"></div>
                <div class="luminescent-node"></div>
            </div>
        </div>
                                                                                                                                                                                
        <div class="hud-glass-terminal hidden" id="loginTerminal" onclick="event.stopPropagation()">
            <div class="hud-top-bar">
                <div class="hud-status-chip">AI SECURITY: ACTIVE</div>
                <div class="hud-status-chip cyan-pulse">FIREWALL: LAYER-7</div>
            </div>
                                                                                                                                                                                                                                                                                        
            <h1 class="hud-logo" style="font-size:2.8rem; text-shadow:0 0 20px var(--neon-cyan);">NEXUS</h1>
                                                                                                                                                                                
            <div class="portal-matrix-tabs">
                <button class="hud-tab active" id="tabModeUser" onclick="changeWorkspaceMode('user')">👤 User Space</button>
                <button class="hud-tab" id="tabModeAdmin" onclick="changeWorkspaceMode('admin')">👨‍💼 Admin Core</button>
            </div>
                                                                                                                                                                                                                                                                                        
            <form id="secureGatewayForm" onsubmit="executeClusterLogin(event)">
                <div class="hud-input-cluster">
                    <input type="text" id="accessNodeUser" required placeholder=" " oninput="verifyInputIdentityProgress()">
                    <label id="hudInputLabel">System ID / Customer ID</label>
                    <div class="neon-glow-underline"></div>
                </div>
                <div class="hud-input-cluster">
                    <input type="password" id="accessNodePass" required placeholder=" " oninput="checkAutoLogin()">
                    <label>Secure Access Password Key</label>
                    <div class="neon-glow-underline"></div>
                </div>
                <button type="submit" class="hud-engage-btn">ENGAGE MAINFRAME</button>
            </form>
        </div>
    </div>
                                                                                                                                                                                
    <div class="dashboard-panel-core hidden" id="customerDashboard">
        <div class="hud-container-panel text-left">
            <div class="panel-header-flex">
                <h2 class="neon-cyan-text" id="dashboardIdentityHeadingNode">Customer Terminal<span id="clientDisplayLabel"></span></h2>
                <div style="display:flex; gap:12px; align-items:center;">
                    <button class="system-instant-refresher-btn" onclick="triggerInternalSystemHotRefresh()">⚡ REFRESH MODULE</button>
                    <button onclick="logoutEngine()" class="abort-btn">LOGOUT</button>
                </div>
            </div>
                                                                                                    
            <div class="avatar-upload-mini-pane" style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
                <img id="customerLiveAvatarPreview" class="whatsapp-avatar" style="cursor:pointer;" onclick="triggerUserProfileAvatarDropdownEngine()" src="">
                <div>

        // --- RICH NOTES INTERFACE HANDLERS ---

        window.triggerEmbeddedNoteFontColor = function(colorHexCode) { document.execCommand('foreColor', false, colorHexCode); document.getElementById('richNoteWritingPadEditable').focus(); };

        window.toggleRichNotesVoiceStreamRecorder = function() {
            const recBtnNode = document.getElementById('noteAudioRecCoreBtn');
            const pulseNode = document.getElementById('noteRecPulseIndicator');
            const timerLogNode = document.getElementById('notesVoiceDurationLogNode');

            if (!notesMediaRecorderInstance || notesMediaRecorderInstance.state === "inactive") {
                navigator.mediaDevices.getUserMedia({ audio: true }).then(mediaStreamObj => {
                    notesMediaRecorderInstance = new MediaRecorder(mediaStreamObj);
                    notesAudioChunksCollectorArr = [];
                    notesRecordingStartEpoch = Date.now();

                    notesVoiceTimerIntervalTracker = setInterval(() => {
                        if (timerLogNode) timerLogNode.innerText = `⏱️ [ REC: ${Math.floor((Date.now() - notesRecordingStartEpoch) / 1000)}s ]`;
                    }, 1000);

                    notesMediaRecorderInstance.ondataavailable = packet => { if (packet.data.size > 0) notesAudioChunksCollectorArr.push(packet.data); };
                    notesMediaRecorderInstance.onstop = () => {
                        clearInterval(notesVoiceTimerIntervalTracker);
                        const computationDuration = Math.floor((Date.now() - notesRecordingStartEpoch) / 1000);
                        autoGeneratedVoiceDurationString = `${computationDuration}s`;
                        
                        const binaryAudioBlob = new Blob(notesAudioChunksCollectorArr, { type: 'audio/webm' });
                        const storageReader = new FileReader();
                        storageReader.onload = function(readerEvent) {
                            notesVoicePayloadBase64Node = readerEvent.target.result;
                            if (timerLogNode) timerLogNode.innerText = `✔ Embedded Recording`;
                        };
                        storageReader.readAsDataURL(binaryAudioBlob);
                        mediaStreamObj.getTracks().forEach(track => track.stop());
                    };
                    notesMediaRecorderInstance.start();
                    if (pulseNode) pulseNode.classList.remove('hidden');
                    if (recBtnNode) recBtnNode.style.background = "rgba(255,0,127,0.15)";
                }).catch(() => { alert("Mic hardware failed."); });
            } else {
                notesMediaRecorderInstance.stop();
                if (pulseNode) pulseNode.classList.add('hidden');
                if (recBtnNode) recBtnNode.style.background = "rgba(4,15,36,0.1)";
            }
        };

        window.dispatchCompiledNoteToCloudMatrix = function() {
            const parsedHtmlPayload = document.getElementById('richNoteWritingPadEditable').innerHTML.trim();
            const combinedDateTimeString = document.getElementById('noteManualDateTimeCollector').value;
            if(!parsedHtmlPayload && !notesVoicePayloadBase64Node) return;

            const cloudNoteReferenceNode = push(ref(db, `users_notes/${loggedInCustomerID}`));
            set(cloudNoteReferenceNode, {
                noteId: cloudNoteReferenceNode.key,
                ownerId: loggedInCustomerID,
                richTextHtml: parsedHtmlPayload || "[ Audio Data Stream Node ]",
                voicePayloadB64: notesVoicePayloadBase64Node,
                timestampValue: combinedDateTimeString.replace("T", " @ "),
                voiceDuration: autoGeneratedVoiceDurationString,
                epochStamp: Date.now()
            }).then(() => { wipeNoteInterfaceToBlankTrigger(); fetchRealtimeNotesCloudData(); });
        };

        function fetchRealtimeNotesCloudData() {
            const wrapper = document.getElementById('realtimeCloudNotesViewStack'); if(!wrapper || !loggedInCustomerID) return;
            get(ref(db, `users_notes/${loggedInCustomerID}`)).then((snapshotData) => {
                const logs = snapshotData.val(); if(!logs) { wrapper.innerHTML = `<div style="color:var(--text-sub); font-family:monospace; text-align:center; padding:15px; font-weight:bold;">No logs cached inside cluster framework.</div>`; return; }
                wrapper.innerHTML = Object.values(logs).reverse().map(noteItem => {
                    let voiceAttachmentMarkup = noteItem.voicePayloadB64 ? `<div style="margin-top:10px;"><audio src="${noteItem.voicePayloadB64}" controls style="height:38px;"></audio></div>` : "";
                    return `<div class="note-cloud-row-card">
                            <div class="note-cloud-meta-row"><span>📅 REGISTRY STAMP: ${noteItem.timestampValue}</span><span style="cursor:pointer;" onclick="executeCloudNotePurgeMatrix('${noteItem.noteId}')">⚠️ ERASE RECORD</span></div>
                            <div style="color:var(--text-main); font-size:1.05rem; font-weight:600;">${noteItem.richTextHtml}</div>
                            ${voiceAttachmentMarkup}
                        </div>`;
                }).join('');
            });
        }

        // --- BACKEND RETENTION SYNC CHANNELS MANAGER ---

            const newChatPacketRef = push(ref(db, 'chats'));
            set(newChatPacketRef, {
                sender: loggedInCustomerID, receiver: activeSelectedChatTargetUserId, textBody: finalMessageText, mediaPayload: globalLiveChatBinaryStreamBase64, read: false, epochTimeNode: Date.now(), timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})

                inputField.value = ""; globalLiveChatBinaryStreamBase64 = ""; document.getElementById('chatAttachmentStatusFeedback').innerText = "";
                document.getElementById('systemEmojiMatrixBoxNode').classList.add('hidden'); document.getElementById('mainframeGifContainerBox').classList.add('hidden'); renderActiveChatConversationLogs();
            });
        };

        window.toggleVoiceAudioRecordingEngine = function() {
            const recBtn = document.getElementById('voiceRecordingCoreTriggerBtn');
            if (!nativeAudioMediaRecorderInstance || nativeAudioMediaRecorderInstance.state === "inactive") {
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    nativeAudioMediaRecorderInstance = new MediaRecorder(stream); compiledAudioChunksCollectorArr = [];
                    nativeAudioMediaRecorderInstance.ondataavailable = e => { if (e.data.size > 0) compiledAudioChunksCollectorArr.push(e.data); };
                    nativeAudioMediaRecorderInstance.onstop = () => {
                        const blob = new Blob(compiledAudioChunksCollectorArr, { type: 'audio/webm' }); const reader = new FileReader();
                        reader.onload = function(e) { globalLiveChatBinaryStreamBase64 = e.target.result; dispatchMatrixChatMessage(); };
                        reader.readAsDataURL(blob); stream.getTracks().forEach(track => track.stop());
                    };
                    nativeAudioMediaRecorderInstance.start(); recBtn.style.color = '#e74c3c';
                }).catch(() => { alert("Mic hardware mapping configuration signature error."); });
            } else { nativeAudioMediaRecorderInstance.stop(); recBtn.style.color = '#00f2fe'; }
        };

        window.switchAdminSubSection = function(sectionId) {
            activeAdminSubSection = sectionId; document.querySelectorAll('.admin-nav-tab').forEach(btn => btn.classList.remove('active'));
            const actBtn = document.getElementById(`tabBtn${sectionId.charAt(0).toUpperCase() + sectionId.slice(1)}`); if(actBtn) actBtn.classList.add('active');
            document.getElementById('idCreationBlock').style.display = (sectionId === 'creation') ? 'block' : 'none';
            document.getElementById('credentialsBlock').style.display = (sectionId === 'credentials') ? 'block' : 'none';
            document.getElementById('policyWorkspaceBlock').style.display = (sectionId === 'workspace') ? 'block' : 'none';
            document.getElementById('adminSpyChatBlock').style.display = (sectionId === 'spychat' ? 'block' : 'none');
            if(sectionId === 'spychat') renderAdminSpyUserList();
        };

        window.loadAdminSubmissions = function(){
            let container = document.getElementById('customerCardsContainer'); if(!container) return;
            container.innerHTML = `
                <div id="idCreationBlock">
                    <div class="giant-compiler-layout">
                        <h3>⚡ ENLARGED ACCOUNT ENGINE COMPILER</h3>
                        <div class="giant-compiler-grid">
                            <input type="text" id="newClientName" class="giant-compiler-input" placeholder="Client Name *">
                            <input type="date" id="newClientDOB" class="giant-compiler-input">
                            <input type="text" id="newClientContact" class="giant-compiler-input" inputmode="tel" maxlength="10" placeholder="Contact No *" oninput="this.value=this.value.replace(/[^0-9]/g,'');">
                            <input type="text" id="newUserPass" class="giant-compiler-input" placeholder="Set Secure Password *">
                        </div>
                        <button onclick="createNewCustomerNode()" class="hud-engage-btn" style="background: linear-gradient(135deg, #1abc9c, #16a085); height:55px;">COMPILE IDENTITY NODE</button>
                    </div>
                </div>
                <div id="credentialsBlock" style="display:none;">
                    <div class="cred-sync-card">
                        <h4>⚙️ ALTER SELF MAIN SECURITY ENTRY CREDENTIALS</h4>
                        <div class="giant-compiler-grid" style="grid-template-columns: 1fr 1fr 1fr;">
                            <input type="text" id="mainframeAdminIdInput" class="giant-compiler-input">
                            <input type="text" id="mainframeAdminPassInput" class="giant-compiler-input">
                            <button onclick="executeMainframeAdminSyncRoute()" class="hud-engage-btn" style="height:58px;">SYNC MASTER ROUTE</button>
                        </div>
                    </div>
                    <div style="background:rgba(255,255,255,0.02); padding:25px; border-radius:14px; border:2px solid var(--border-glass); margin-bottom:20px;">
                        <h4 style="color:#00f2fe; font-size:1.2rem; margin-bottom:20px; font-family:'Orbitron'; font-weight: 900;">🛠 ALTER CUSTOMER CLIENT REGISTRY PARAMETERS:</h4>
                        <div id="adminUserControlList" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
                    </div>
                </div>
                <div id="policyWorkspaceBlock" style="display:none; width:100%;">
                    <div style="margin-bottom:20px;"><input type="text" id="searchInput" class="search-terminal-input" placeholder="Scan records..." oninput="filterCardsEngine()"></div>
                    <div id="policyCardsStack"></div>
                </div>
                <div id="adminSpyChatBlock" style="display:none; width:100%;">
                    <div class="chat-io-grid-matrix">
                        <div class="chat-target-userlist-pane">
                            <div class="whatsapp-search-box"><input type="text" id="adminWhatsAppUserSearchBar" placeholder="Search client contact pipeline..." oninput="filterAdminSpyUsersPaneEngine()"></div>
                            <div id="adminSpyUsersListWrapper"></div>
                        </div>
                        <div class="chat-stream-message-container">
                            <div class="chat-stream-header-bar" style="background:#202c33;"><div class="whatsapp-user-info"><div class="whatsapp-user-name" id="spyActiveHeaderTitle" style="color:#00f2fe; font-weight:900;">Select User Pipeline Chat...</div></div></div>
                            <div class="chat-messages-scroll-stack" id="adminSpyChatLogsStack"></div>
                            <div class="chat-interface-footer-inputs">
                                <input type="text" id="adminSpyResponseInput" class="whatsapp-input-field" placeholder="Type chat response message..." onkeydown="if(event.key==='Enter') dispatchAdminSpyInterceptionMsg()">
                                <button onclick="dispatchAdminSpyInterceptionMsg()" style="padding:12px 24px; background:#2ecc71; border:none; border-radius:8px; color:white; font-family:'Orbitron'; font-weight:bold; cursor:pointer;">SEND</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            document.getElementById('mainframeAdminIdInput').value = cachedAdminMainframeRoute.masterId || "";
            document.getElementById('mainframeAdminPassInput').value = cachedAdminMainframeRoute.masterPass || "";
            renderUserControlPanel(); renderPolicyCardsBlock(); switchAdminSubSection(activeAdminSubSection);
        };

        window.filterAdminSpyUsersPaneEngine = function() {
            const query = document.getElementById('adminWhatsAppUserSearchBar').value.toLowerCase();
            document.querySelectorAll('#adminSpyUsersListWrapper .chat-user-item-node').forEach(node => {
                node.style.display = node.innerText.toLowerCase().includes(query) ? "flex" : "none";
            });
        };

        window.createNewCustomerNode = function() {
            const clientName = document.getElementById('newClientName').value.trim(); const dob = document.getElementById('newClientDOB').value;
            const contact = document.getElementById('newClientContact').value.trim(); const userPass = document.getElementById('newUserPass').value.trim();
            if(!clientName || !contact || !userPass) return; const userId = clientName + contact.slice(-4);
            set(ref(db, 'users/' + userId), { id: userId, pass: userPass, status: 'active', clientName, dob, contact, avatar: "", isOnlineNode: false }).then(() => { loadAdminSubmissions(); });
        };

        window.renderUserControlPanel = function() {
            const listWrapper = document.getElementById('adminUserControlList'); if(!listWrapper) return;
            listWrapper.innerHTML = cachedGlobalUsersArr.map((user, index) => {
                const isDeactivated = user.status === 'deactivated';
                return `<div style="background:rgba(4,14,33,0.85); padding:18px; border-radius:10px; border:2px solid ${isDeactivated ? '#e74c3c' : 'var(--border-glass)'}; display:flex; flex-direction:column; gap:12px;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-weight:bold; font-size:1.05rem; color:#fff;">ID: <span style="color:#00f2fe;">${user.id}</span></span>
                            <div style="display:flex; gap:10px; align-items:center;">
                                <select class="admin-status-toggle-select ${isDeactivated ? 'state-deactivated' : ''}" onchange="toggleUserNodeActivationState('${user.id}', this.value)">
                                    <option value="active" ${!isDeactivated ? 'selected' : ''}>🟢 Active</option>
                                    <option value="deactivated" ${isDeactivated ? 'selected' : ''}>🔴 Deactive</option>
                                </select>
                                <button onclick="wipeUserPermanently('${user.id}')" style="color:#e74c3c; background:none; border:none; cursor:pointer; font-weight:900; font-family:'Orbitron';">Wipe</button>
                            </div>
                        </div>
                        <div><input type="text" id="userPasswordInputInline_${index}" value="${user.pass}" onchange="alterClientCredentialsOverrideData('${user.id}', ${index})" style="background:var(--bg-prime); border:2px solid var(--border-glass); color:#f1c40f; padding:8px 12px; border-radius:6px; width:100%; font-weight:bold;"></div>
                    </div>`;
            }).join('');
        };

        window.toggleUserNodeActivationState = function(uid, selectValue) { update(ref(db, `users/${uid}`), { status: selectValue }).then(() => { playSynthesizedSound(600, 'sine', 0.1); }); };
        window.executeAdminContextClipboardCopy = function(element, extractionValue) { if(!extractionValue) return; navigator.clipboard.writeText(extractionValue).then(() => { playSynthesizedSound(880, 'sine', 0.1); element.innerText = "COPIED ✔"; setTimeout(() => { location.reload(); }, 600); }); };
        window.wipeUserPermanently = function(uid) { remove(ref(db, 'users/' + uid)); };

        window.renderPolicyCardsBlock = function() {
            const targetStack = document.getElementById('policyCardsStack'); if(!targetStack) return;
            if(cachedGlobalPolicyArr.length === 0) { targetStack.innerHTML = "<p>No records available.</p>"; return; }
            targetStack.innerHTML = cachedGlobalPolicyArr.map((d, i) => {
                let docPreviewHTML = d.attachment ? `<br><img src="${d.attachment}" style="max-width:100%; max-height:130px; border-radius:6px; margin-top:6px; border:2px solid var(--border-glass);">` : "<span>None</span>";
                return `<div class="hud-data-card">
                      <div class="owner-name-tag-right">👤 Name: ${d.insure}</div>
                      <p><b>Owner ID:</b> <span class="admin-clickable-badge" onclick="executeAdminContextClipboardCopy(this, '${d.ownerNodeID}')">${d.ownerNodeID || 'N/A'}</span></p>
                      <p><b>Contact:</b> <span class="admin-clickable-badge">${d.phone || 'N/A'}</span></p>
                      <p><b>Notes:</b> <span>${d.notes || 'None'}</span></p>
                      <p><b>File Node:</b> ${docPreviewHTML}</p>
                      <div style="margin-top: 12px; padding: 12px; background: rgba(0,0,0,0.5); border-radius: 8px; border: 2px solid var(--border-glass);">
                         <select id="updateStatusSelect_${i}" style="padding:10px; font-size:0.95rem; width:100%; margin-bottom:8px; background:var(--bg-prime); color:#f1c40f; font-weight:bold;">
                               <option value="pending" ${d.status === 'pending' ? 'selected' : ''}>⏳ Pending Review</option>
                               <option value="uploaded" ${d.status === 'uploaded' ? 'selected' : ''}>✅ Uploaded Done</option>
                               <option value="error" ${d.status === 'error' ? 'selected' : ''}>❌ System Error</option>
                         </select>
                         <input type="text" id="adminCommentInput_${i}" value="${d.adminComment || ''}" class="giant-compiler-input" style="padding:10px; font-size:1rem; margin-bottom:8px;">
                         <button onclick="transmitAdminResponse(${i})" style="padding:12px; background:linear-gradient(135deg, #f1c40f, #d4ac0d); color:black; border:none; width:100%; font-weight:900; font-family:'Orbitron'; border-radius:6px; cursor:pointer;">TRANSMIT TRACKER PACKET</button>
                      </div>
                      <button class="wipe-card-btn" onclick="purgeRegistryLog(${i})">Purge Record</button>
                    </div>`;
            }).join("");
        };

        window.executeMainframeAdminSyncRoute = function() {
            const nextId = document.getElementById('mainframeAdminIdInput').value.trim(); const nextPass = document.getElementById('mainframeAdminPassInput').value.trim();
            if(!nextId || !nextPass) return; set(ref(db, 'mainframeAdmin'), { id: nextId, pass: nextPass }).then(() => { alert("Admin Route Synced."); });
        };

        window.alterClientCredentialsOverrideData = function(oldId, index) {
            const targetNewPass = document.getElementById(`userPasswordInputInline_${index}`).value.trim(); if(!targetNewPass) return;
            get(ref(db, `users/${oldId}`)).then((snapshot) => { let data = snapshot.val() || {}; data.pass = targetNewPass; set(ref(db, `users/${oldId}`), data); });
        };

        window.uploadUserProfileAvatarEngine = function(event) {
            const file = event.target.files[0]; const targetUid = event.target.getAttribute('data-target-uid') || loggedInCustomerID;
            if(file) {
                const reader = new FileReader(); reader.onload = function(e) {
                    set(ref(db, `users/${targetUid}/avatar`), e.target.result).then(() => { if(targetUid === loggedInCustomerID) { document.getElementById('customerLiveAvatarPreview').src = e.target.result; document.getElementById('chatActiveHeaderAvatarNode').src = e.target.result; } });
                };
                reader.readAsDataURL(file);
            }
        };

        window.verifyInputIdentityProgress = function() {
            const u = document.getElementById('accessNodeUser').value.trim(); if(!u) return;
            if(currentMode === 'admin') { if(u.toLowerCase() === cachedAdminMainframeRoute.masterId.toLowerCase()) document.getElementById('accessNodePass').focus(); }
            else { if(cachedGlobalUsersArr.find(user => user.id.toLowerCase() === u.toLowerCase())) document.getElementById('accessNodePass').focus(); }
        };

        window.checkAutoLogin = function() {
            const u = document.getElementById('accessNodeUser').value.trim(); const p = document.getElementById('accessNodePass').value.trim();
            if(!u || !p) return;
            if(currentMode === 'admin') {
                if(u.toLowerCase() === cachedAdminMainframeRoute.masterId.toLowerCase() && p === cachedAdminMainframeRoute.masterPass) executeClusterLogin(null);
            } else {
                let userMatch = cachedGlobalUsersArr.find(user => user.id.toLowerCase() === u.toLowerCase());
                if(userMatch && String(userMatch.pass) === String(p)) executeClusterLogin(null);
            }
        };

        window.processBinaryAttachment = function(event, type) {
            const fileInput = event.target;
            if(fileInput && fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    if (type === 'policy') loadedAttachmentB64 = e.target.result;
                    else if (type === 'chat') { globalLiveChatBinaryStreamBase64 = e.target.result; document.getElementById('chatAttachmentStatusFeedback').innerText = `📎 Attached asset stream`; }
                };
                reader.readAsDataURL(fileInput.files[0]);
            }
        };

        window.speakNaturalHuman = function(textMessage) {
            if (!isSystemAudioEnabled) return;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const syntax = new SpeechSynthesisUtterance(textMessage);
                syntax.volume = 1.0; syntax.pitch = 1.1; syntax.rate = 1.25; 
                window.speechSynthesis.speak(syntax);
            }
        };

        window.playSynthesizedSound = function(frequency, type, duration) {
            if (!isSystemAudioEnabled) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
                oscillator.type = type; oscillator.frequency.value = frequency;
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        };

        window.changeWorkspaceMode = function(mode) {
            currentMode = mode; const inputLabel = document.getElementById('hudInputLabel');
            document.getElementById('tabModeUser').classList.remove('active'); document.getElementById('tabModeAdmin').classList.remove('active');
            if (mode === 'admin') { document.getElementById('tabModeAdmin').classList.add('active'); if(inputLabel) inputLabel.innerText = "Confirm Admin Vector"; }
            else { document.getElementById('tabModeUser').classList.add('active'); if(inputLabel) inputLabel.innerText = "System ID / Customer ID"; }
            document.getElementById('accessNodeUser').value = ""; document.getElementById('accessNodePass').value = ""; 
        };

        window.triggerLampActivationOverride = function() {
            const mainStage = document.getElementById('mainStage'); const loginTerminal = document.getElementById('loginTerminal');
            if(mainStage && loginTerminal && !mainStage.classList.contains('activated')) {
                playSynthesizedSound(520, 'sine', 0.2); mainStage.classList.add('activated'); loginTerminal.classList.remove('hidden'); speakNaturalHuman("Mainframe active");
            }
        };

        window.toggleGlobalSystemAudio = function() {
            isSystemAudioEnabled = !isSystemAudioEnabled;
            document.getElementById('systemAudioToggleBtn').innerHTML = isSystemAudioEnabled ? `<span>🔊 SOUND: ON</span>` : `<span>🔇 SOUND: OFF</span>`;
        };

        window.executeClusterLogin = function(event) {
            if(event) event.preventDefault(); const u = document.getElementById('accessNodeUser').value.trim(); const p = document.getElementById('accessNodePass').value.trim();
            if (currentMode === 'admin') {
                if (u.toLowerCase() === cachedAdminMainframeRoute.masterId.toLowerCase() && p === cachedAdminMainframeRoute.masterPass) {
                    document.getElementById('mainStage').style.display = 'none'; document.getElementById('adminDashboard').classList.remove('hidden');
                    localStorage.setItem('nexus_logged_in_uid', u); localStorage.setItem('nexus_system_session_mode', 'admin'); loadAdminSubmissions();
                    speakNaturalHuman("Admin Authorized");
                } else { alert("Rejected."); }
            } else {
                const userMatch = cachedGlobalUsersArr.find(user => user.id.toLowerCase() === u.toLowerCase());
                if (userMatch && String(userMatch.pass) === String(p)) {
                    loggedInCustomerID = userMatch.id; update(ref(db, `users/${userMatch.id}`), { isOnlineNode: true });
                    localStorage.setItem('nexus_logged_in_uid', userMatch.id); localStorage.setItem('nexus_system_session_mode', 'user');
                    document.getElementById('clientDisplayLabel').innerHTML = ` // <span style='color:var(--text-main); font-weight:700;'>${userMatch.clientName}</span>`;
                    document.getElementById('mainStage').style.display = 'none'; document.getElementById('customerDashboard').classList.remove('hidden');
                    switchCustomerChannel('upload'); speakNaturalHuman("Welcome client");
                } else { alert("Invalid."); }
            }
        };

        window.submitPolicyForm = function(){
            let ins = document.getElementById('insurerName').value.trim(); let contact = document.getElementById('contactNo').value.trim();
            let noteVal = document.getElementById('notesReal').value.trim(); if(!ins || !contact) return;
            const generatedPolicyId = "POL_" + Date.now();
            set(ref(db, 'policies/' + generatedPolicyId), {
                id: generatedPolicyId, ownerNodeID: loggedInCustomerID, insure: ins, phone: contact, notes: noteVal, attachment: loadedAttachmentB64, status: 'pending', adminComment: "Pending confirmation.", time: new Date().toLocaleString()
            }).then(() => {
                document.getElementById('insurerName').value = ""; document.getElementById('contactNo').value = ""; document.getElementById('notesReal').value = "";
                loadedAttachmentB64 = ""; renderCustomerLiveTracker();
            });
        };

        window.renderCustomerLiveTracker = function() {
            const trackerBox = document.getElementById('customerLiveTrackerSection'); if(!trackerBox) return;
            let userCases = cachedGlobalPolicyArr.filter(item => item.ownerNodeID === loggedInCustomerID);
            if (userCases.length === 0) { trackerBox.innerHTML = `<p>No items dispatched.</p>`; return; }
            trackerBox.innerHTML = userCases.map((item) => {
                return `<div style="background: rgba(5,14,35,0.85); padding:15px; border-radius:12px; margin-bottom:10px; border:2px solid var(--border-glass);">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div><strong>Insurer: ${item.insure}</strong></div>
                            <div><span class="status-badge status-pending">${item.status.toUpperCase()}</span></div>
                        </div>
                        <div style="color: #fff; margin-top:5px;"><b>Feedback:</b> ${item.adminComment}</div>
                    </div>`;
            }).join('');
        };

        window.transmitAdminResponse = function(index) {
            const statusSelect = document.getElementById(`updateStatusSelect_${index}`); const commentInput = document.getElementById(`adminCommentInput_${index}`);
            let targetPol = cachedGlobalPolicyArr[index]; if(targetPol) update(ref(db, `policies/${targetPol.id}`), { status: statusSelect.value, adminComment: commentInput.value.trim() || "Saved." });
        };
        window.purgeRegistryLog = function(index){ let targetPol = cachedGlobalPolicyArr[index]; if(targetPol) remove(ref(db, 'policies/' + targetPol.id)); };
        window.filterCardsEngine = function(){ let q = document.getElementById('searchInput').value.toLowerCase(); document.querySelectorAll('.hud-data-card').forEach(c => { c.style.display = c.innerText.toLowerCase().includes(q) ? "" : "none"; }); };

        window.logoutEngine = function() {
            if(loggedInCustomerID) update(ref(db, `users/${loggedInCustomerID}`), { isOnlineNode: false });
            localStorage.clear(); location.reload();
        };

        window.renderAdminSpyUserList = function() {
            const listPane = document.getElementById('adminSpyUsersListWrapper'); if(!listPane) return;
            listPane.innerHTML = cachedGlobalUsersArr.map(user => {
                return `<div class="chat-user-item-node" onclick="setAdminSpyTargetConversationTrack('${user.id}')">
                        <img class="whatsapp-avatar" src="${user.avatar?user.avatar:defaultAvatarSvg}">
                        <div class="whatsapp-user-info"><div class="whatsapp-user-name">${user.clientName}</div><div class="whatsapp-user-id">@${user.id}</div></div>
                    </div>`;
            }).join('');
        };

        window.setAdminSpyTargetConversationTrack = function(userId) { spyActiveTargetUserContext = userId; document.getElementById('spyActiveHeaderTitle').innerText = `Console Pipeline: @${userId}`; renderAdminSpyChatConsoleLogs(); };
        window.renderAdminSpyChatConsoleLogs = function() {
            const stack = document.getElementById('adminSpyChatLogsStack'); if(!stack || !spyActiveTargetUserContext) return;
            get(ref(db, 'chats')).then((snapshot) => {
                const data = snapshot.val(); if(!data) return; let htmlCollector = "";
                Object.keys(data).forEach(key => {
                    const m = data[key]; if((m.sender === spyActiveTargetUserContext && m.receiver === cachedAdminMainframeRoute.masterId) || (m.sender === cachedAdminMainframeRoute.masterId && m.receiver === spyActiveTargetUserContext)) {
                        htmlCollector += `<div class="bubble-msg-wrapper" style="background:#202c33; color:#fff; margin-bottom:8px;">${m.textBody}</div>`;
                    }
                });
                stack.innerHTML = htmlCollector || `<div>🔒 Verified.</div>`;
            });
        };
        window.dispatchAdminSpyInterceptionMsg = function() {
            const input = document.getElementById('adminSpyResponseInput'); if(!input || !input.value.trim() || !spyActiveTargetUserContext) return;
            const newChatRef = push(ref(db, 'chats')); set(newChatRef, { sender: cachedAdminMainframeRoute.masterId, receiver: spyActiveTargetUserContext, textBody: input.value.trim(), mediaPayload: "", read: false, epochTimeNode: Date.now(), timestamp: new Date().toLocaleTimeString() }).then(() => { input.value = ""; renderAdminSpyChatConsoleLogs(); });
        };

        window.renderInteractiveDrawersContent = function() {
            const emojiBox = document.getElementById('systemEmojiMatrixBoxNode'); if(emojiBox) emojiBox.innerHTML = systemEmojisList.map(em => `<div class="emoji-item-node" onclick="injectEmojiToInputField('${em}')">${em}</div>`).join('');
            const gifBox = document.getElementById('mainframeGifContainerBox'); if(gifBox) gifBox.innerHTML = structuralGifMatrixList.map(gUrl => `<img class="gif-thumb-item" src="${gUrl}" onclick="transmitDirectGifMessage('${gUrl}')">`).join('');
        };
    </script>
</body>
</html>
