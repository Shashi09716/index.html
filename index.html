    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&display=swap');
        body { margin: 0; background: #02050e; color: white; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        
        #canvas3d { position: fixed; top: 0; left: 0; z-index: 0; }
        
        /* Dashboard Container */
        .wrapper { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-top: 50px; }
        
        /* Lamp */
        .lamp-3d { 
            width: 120px; height: 120px; background: radial-gradient(circle, #f1c40f, transparent);
            border-radius: 50%; cursor: pointer; box-shadow: 0 0 40px #f1c40f;
            transition: all 0.3s;
        }
        .lamp-3d.glow { box-shadow: 0 0 150px #f1c40f; transform: scale(1.1); }

        /* Lightning */
        #lightning { position: fixed; top:0; left:0; width:100%; height:100%; background: white; z-index: 999; opacity: 0; pointer-events: none; }
        .zap { animation: flash 0.2s; }
        @keyframes flash { 0% { opacity: 0; } 50% { opacity: 0.6; } 100% { opacity: 0; } }

        /* Panel Styling */
        .card { background: rgba(0,20,40,0.8); border: 2px solid #00f2fe; padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; margin-top: 20px; backdrop-filter: blur(10px); }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #051020; border: 1px solid #00f2fe; color: white; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #f1c40f; border: none; cursor: pointer; font-weight: 900; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="lightning"></div>
    <canvas id="canvas3d"></canvas>

    <div class="wrapper">
        <div class="lamp-3d" id="lamp" onclick="engage()"></div>
        
        <div id="panel" class="card">
            <h2 id="title">SYSTEM ACCESS</h2>
            <input id="userId" type="text" placeholder="USER ID">
            <input id="userPass" type="password" placeholder="PASSWORD">
            <button onclick="login()">LOGIN</button>
        </div>
    </div>

    <script>
        // 1. SOUND ENGINE
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playZap() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        // 2. LIGHTNING & SYNC
        function triggerZap() {
            const l = document.getElementById('lightning');
            l.classList.add('zap');
            playZap();
            setTimeout(() => l.classList.remove('zap'), 200);
        }

        function engage() {
            document.getElementById('lamp').classList.add('glow');
            setInterval(triggerZap, 2000);
        }

        // 3. 3D BACKGROUND
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const geom = new THREE.OctahedronGeometry(15, 0);
        const mat = new THREE.MeshBasicMaterial({ color: 0x00f2fe, wireframe: true });
        const mesh = new THREE.Mesh(geom, mat);
        scene.add(mesh);
        camera.position.z = 50;

        function render() {
            requestAnimationFrame(render);
            mesh.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        render();

        // 4. LOGIN LOGIC (Admin/User Check)
        async function login() {
            const id = document.getElementById('userId').value;
            const pass = document.getElementById('userPass').value;
            
            // Yahan wahi purani firebase get logic aayegi
            // Dashboard yahan display hoga...
            alert("Logging in to Shashi Mainframe...");
        }
    </script>
</body>
</html>
