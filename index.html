<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Nexus Matrix 3D PRO MAX ⚡</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700;900&display=swap">
    <style>
        /* --- ULTRA-REALISTIC CYBERPUNK MATRIX ENGINE --- */
        :root {
            --lamp-color: #f1c40f; --lamp-glow: #f1c40f; --lamp-shadow: rgba(241, 196, 15, 0.9);
            --neon-cyan: #00f2fe; --neon-pink: #ff007f; --whatsapp-green: #00a884;
            --bg-prime: #02050e; --panel-glass: rgba(6, 17, 38, 0.96);
            --border-glass: rgba(0, 242, 254, 0.6); --text-main: #ffffff; --text-sub: #f8fafc;
            --chat-bg: #0b141a; --input-bg: #2a3942;
            --cyber-glow: 0 15px 35px rgba(0, 242, 254, 0.4), inset 0 0 15px rgba(0, 242, 254, 0.2);
            --lamp-chamak: 0 0 50px #f1c40f, 0 0 100px rgba(241, 196, 15, 0.6);
            --chat-wallpaper: #0b141a url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png') center/cover;
        }
        body.light-theme-active {
            --bg-prime: #f0f2f5; --panel-glass: rgba(255, 255, 255, 0.98);
            --border-glass: #d1d7db; --text-main: #111b21; --text-sub: #3b4a54;
            --chat-bg: #efeae2; --input-bg: #ffffff;
            --cyber-glow: 0 10px 25px rgba(0, 0, 0, 0.1);
            --lamp-chamak: 0 6px 24px rgba(0,0,0,0.2);
            --chat-wallpaper: #efeae2 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png') center/cover;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; background-color: transparent; }
        body { background: var(--bg-prime); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Rajdhani', sans-serif; user-select: none; position: relative; width: 100vw; transition: background 0.4s ease, color 0.4s ease; color: var(--text-main); }
        
        .top-cyber-navbar { position: fixed; top: 0; left: 0; right: 0; height: 65px; background: rgba(2, 5, 14, 0.95); border-bottom: 2px solid var(--border-glass); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 99999; backdrop-filter: blur(15px); box-shadow: 0 4px 20px rgba(0, 242, 254, 0.2); transition: all 0.3s ease; }
        body.light-theme-active .top-cyber-navbar { background: rgba(255, 255, 255, 0.95); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); }
        .navbar-brand-glitch { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.4rem; color: #fff; position: relative; animation: glitchTextAnim 3s infinite; letter-spacing: 2px; text-transform: uppercase; }
        body.light-theme-active .navbar-brand-glitch { color: #111b21; text-shadow: none; animation: none; }
        @keyframes glitchTextAnim { 0% { text-shadow: 2px 0 #ff007f, -2px 0 #00f2fe; } 5% { text-shadow: -2px 0 #ff007f, 2px 0 #00f2fe; } 10% { text-shadow: 2px 0 #ff007f, -2px 0 #00f2fe; } 15%, 100% { text-shadow: 0 0 10px rgba(241, 196, 15, 0.8); } }
        
        .navbar-controls { display: flex; gap: 12px; align-items: center; z-index: 100000; }
        .nav-btn { background: rgba(6, 17, 38, 0.95); border: 2px solid var(--border-glass); border-radius: 8px; color: var(--neon-cyan); padding: 8px 16px; font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.85rem; box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5); pointer-events: all; }
        .nav-btn:hover { background: rgba(0, 242, 254, 0.15); box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); transform: translateY(-2px); }
        body.light-theme-active .nav-btn { background: #ffffff; color: #111b21; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .cinema-stage { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1); z-index: 2; overflow: hidden; }
        @keyframes dynamicColorCycle { 0%, 100% { --lamp-color: #f1c40f; --lamp-shadow: rgba(241, 196, 15, 0.95); } 33% { --lamp-color: #00f2fe; --lamp-shadow: rgba(0, 242, 254, 0.95); } 66% { --lamp-color: #2ecc71; --lamp-shadow: rgba(46, 204, 113, 0.95); } }
        .cinema-stage.activated { animation: dynamicColorCycle 5s infinite linear; background: radial-gradient(circle at center, rgba(241, 196, 15, 0.25) 0%, rgba(2, 5, 14, 1) 80%); box-shadow: inset 0 0 120px rgba(0, 242, 254, 0.2); }
        
        .cyber-lamp-core { position: relative; display: flex; flex-direction: column; align-items: center; z-index: 10; transform: scale(1.1); transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1); }
        .cinema-stage.activated .cyber-lamp-core { transform: translateX(380px) scale(0.85); }
        .metallic-shutter-head { width: 280px; height: 180px; background: radial-gradient(circle at center, #1a2536, #02050a); border-radius: 140px 140px 60px 60px; position: relative; border: 4px solid #00f2fe; box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(0, 242, 254, 0.5); z-index: 5; overflow: hidden; }
        .cinema-stage.activated .metallic-shutter-head { border-color: var(--lamp-color); box-shadow: var(--lamp-chamak); }
        .mechanical-gate { position: absolute; top: 30px; width: 50%; height: 120px; background: repeating-linear-gradient(90deg, #0a0d14, #0a0d14 10px, #1a2536 10px, #1a2536 20px); border: 2px solid #00f2fe; transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s; z-index: 6; }
        .gate-left { left: 0; border-radius: 14px 0 0 14px; }
        .gate-right { right: 0; border-radius: 0 14px 14px 0; }
        .cinema-stage.activated .gate-left { transform: translateX(-120px); opacity: 0.1; border-color:var(--lamp-color); }
        .cinema-stage.activated .gate-right { transform: translateX(120px); opacity: 0.1; border-color:var(--lamp-color); }
        .blinding-core-light { position: absolute; width: 110px; height: 110px; background: radial-gradient(circle, #ffffff 40%, var(--lamp-color) 80%); border-radius: 50%; left: 50%; top: 35px; transform: translateX(-50%); filter: blur(5px); opacity: 0; transition: 0.4s ease; box-shadow: 0 0 80px #ffffff, 0 0 150px var(--lamp-color); }
        .cinema-stage.activated .blinding-core-light { opacity: 1; }
        .hydraulic-stem { width: 28px; height: 260px; background: linear-gradient(90deg, #222e40, #080b12, #394b66); z-index: 3; position: relative; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
        .laser-conduit { position: absolute; width: 8px; height: 100%; background: #131a24; left: 50%; transform: translateX(-50%); transition: 0.5s; }
        .cinema-stage.activated .laser-conduit { background: var(--lamp-color); box-shadow: 0 0 45px var(--lamp-color); }
        .brushed-heavy-base { width: 240px; height: 40px; background: linear-gradient(180deg, #2d3d54, #03050a); border-radius: 50% / 25%; border: 2px solid #475b7a; z-index: 4; box-shadow: 0 20px 35px rgba(0,0,0,0.8); }
        .volumetric-beam { position: absolute; top: 150px; width: 140px; height: 0; background: linear-gradient(to bottom, #ffffff 0%, var(--lamp-color) 20%, rgba(255, 255, 255, 0.2) 50%, transparent 100%); clip-path: polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%); z-index: 2; pointer-events: none; opacity: 0; transition: height 0.9s ease, width 0.9s ease, opacity 0.3s; }
        .cinema-stage.activated .volumetric-beam { opacity: 0.75; height: 600px; width: 900px; filter: drop-shadow(0 0 40px var(--lamp-shadow)); }

        .quantum-cord { position: absolute; top: 180px; left: 240px; z-index: 10000; cursor: grab; transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); padding: 60px 40px; margin-left: -40px; margin-top: -40px; pointer-events: all; display: flex; flex-direction: column; align-items: center; }
        .quantum-cord:active { cursor: grabbing; transform: translateY(80px) scale(0.95); transition: transform 0.1s linear; }
        .beaded-wire { width: 6px; height: 180px; background: repeating-linear-gradient(to bottom, #f1c40f, #f1c40f 6px, #0f172a 6px, #0f172a 12px); box-shadow: 0 0 15px rgba(241,196,15,0.8); }
        .luminescent-node { width: 38px; height: 38px; background: radial-gradient(circle, #fff, #f1c40f); border-radius: 50%; box-shadow: 0 0 45px #f1c40f; border: 2px solid #000; transition: 0.3s; margin-top: -5px;}

        .hud-glass-terminal { position: absolute; left: 50%; transform: translate3d(-50%, 0, 0) scale(0.9); width: 95%; max-width: 460px; background: var(--panel-glass); border: 3px solid var(--border-glass); border-left: 6px solid #f1c40f; padding: 35px 25px; border-radius: 24px; backdrop-filter: blur(40px); box-shadow: var(--matrix-3d-shadow-cyan); opacity: 0; transition: all 1s cubic-bezier(0.19, 1, 0.22, 1); z-index: 20; pointer-events: none; }
        .cinema-stage.activated .hud-glass-terminal { transform: translate3d(-50%, 0, 0) scale(1); opacity: 1; pointer-events: all; }
        
        .portal-matrix-tabs { display: flex; background: rgba(0,0,0,0.5); padding: 6px; border-radius: 12px; margin-bottom: 25px; gap: 4px; box-shadow: inset 0 3px 10px rgba(0,0,0,0.5); }
        .hud-tab { flex: 1; padding: 14px; background: transparent; border: none; color: var(--text-sub); font-size: 1rem; font-weight: 700; cursor: pointer; border-radius: 8px; transition: 0.3s; white-space: nowrap; }
        .hud-tab.active { background: rgba(241,196,15,0.25); color: #f1c40f; border: 2px solid rgba(241,196,15,0.5); font-family: 'Orbitron', sans-serif; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        .hud-input-cluster { position: relative; margin-bottom: 28px; width: 100%; }
        .hud-input-cluster input, .hud-input-cluster textarea, .hud-input-cluster select { width: 100%; padding: 18px 16px; background: var(--input-bg); border: 2px solid var(--border-glass); border-radius: 10px; color: var(--text-main); font-size: 1.1rem; outline: none; transition: 0.3s; font-weight: 700; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hud-input-cluster label { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-sub); pointer-events: none; transition: 0.3s; font-size: 1rem; font-weight: 700; }
        .hud-input-cluster input:focus ~ label, .hud-input-cluster input:not(:placeholder-shown) ~ label,
        .hud-input-cluster textarea:focus ~ label, .hud-input-cluster textarea:not(:placeholder-shown) ~ label { top: -14px; left: 10px; background: var(--bg-prime); padding: 2px 8px; font-size: 0.85rem; color: #00f2fe; font-family: 'Orbitron', sans-serif; font-weight: 900; border-radius:4px;}
        .hud-engage-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #f1c40f, #d4ac0d); color: #000000; border: none; border-radius: 10px; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.1rem; cursor: pointer; letter-spacing: 2px; transition: 0.3s; box-shadow: 0 6px 20px rgba(241,196,15,0.4); }
        .hud-engage-btn:hover { box-shadow: 0 0 45px rgba(241, 196, 15, 0.9); transform: scale(1.02); }

        .dashboard-panel-core { position: fixed; inset: 0; display: flex; justify-content: center; align-items: flex-start; background: var(--bg-prime); z-index: 100; padding: 20px; overflow-y: auto; overflow-x: hidden; transition: background 0.4s ease; padding-bottom: 60px; padding-top: 100px; }
        .hud-container-panel { background: var(--panel-glass); border: 1px solid var(--border-glass); border-top: 6px solid var(--neon-cyan); padding: 35px 25px; border-radius: 16px; width: 100%; max-width: 1400px; box-shadow: var(--matrix-3d-shadow-cyan); backdrop-filter: blur(40px); margin-top: 10px; margin-bottom: 20px; transition: transform 0.5s ease; }
        
        .workspace-channel-selector, .admin-category-navbar { display: flex; gap: 14px; margin-bottom: 25px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 16px; border: 1px solid var(--border-glass); flex-wrap: wrap; }
        body.light-theme-active .workspace-channel-selector, body.light-theme-active .admin-category-navbar { background: rgba(0,0,0,0.05); }
        .channel-tab-btn, .admin-nav-tab { flex: 1; min-width: 140px; padding: 16px 14px; background: transparent; border: none; color: var(--text-sub); font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: bold; cursor: pointer; border-radius: 12px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .channel-tab-btn:hover, .admin-nav-tab:hover { background: rgba(0, 242, 254, 0.1); }
        .channel-tab-btn.active, .admin-nav-tab.active { background: linear-gradient(135deg, rgba(0, 242, 254, 0.3), rgba(0, 242, 254, 0.1)); color: #00f2fe; border: 1px solid rgba(0, 242, 254, 0.8); box-shadow: 0 8px 20px rgba(0,242,254,0.3); transform: translateY(-4px); }
        .admin-nav-tab.active { background: linear-gradient(135deg, rgba(46, 204, 113, 0.3), rgba(46, 204, 113, 0.1)); color: #2ecc71; border-color: rgba(46, 204, 113, 0.8); box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3); }

        .form-grid-layout, .giant-compiler-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .full-width-field { grid-column: span 2; }
        .abort-btn { padding: 12px 24px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.3s; box-shadow: 0 6px 15px rgba(231,76,60,0.4); letter-spacing: 1px; }
        .abort-btn:hover { background: #c0392b; box-shadow: 0 0 25px rgba(231,76,60,0.8); transform: scale(1.05); }

        .hyper-clock-ticker { font-family: 'Orbitron', monospace; font-size: 1.8rem; font-weight: 900; color: #f1c40f; background: rgba(0,0,0,0.85); border: 2px solid #00f2fe; padding: 14px 30px; border-radius: 12px; display: inline-block; box-shadow: 0 0 25px rgba(0,242,254,0.5), inset 0 0 10px rgba(0,242,254,0.3); margin-bottom: 20px; text-align: center; text-shadow: 0 0 10px #f1c40f; }

        .search-terminal-input, .giant-compiler-input { width: 100%; padding: 18px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-glass); border-radius: 10px; color: var(--text-main); font-size: 1.1rem; font-family: 'Orbitron'; outline: none; font-weight: bold; transition: 0.3s; }
        body.light-theme-active .search-terminal-input, body.light-theme-active .giant-compiler-input { background: #ffffff; }
        .giant-compiler-input:focus, .search-terminal-input:focus { border-color: #1abc9c; box-shadow: 0 0 12px rgba(26,188,156,0.3); }

        #policyCardsStack { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; width: 100%; }
        .hud-data-card { background: var(--card-node-bg, rgba(4, 14, 33, 0.85)); border: 1px solid var(--border-glass); border-left: 6px solid #00f2fe; padding: 25px; border-radius: 16px; display: flex; flex-direction: column; gap: 14px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: transform 0.3s ease; }
        .hud-data-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0, 242, 254, 0.2); }
        .hud-data-card p { color: var(--text-sub); font-size: 1.05rem; display: flex; flex-flow: row wrap; gap: 8px; font-weight: 600; line-height: 1.5; }
        .hud-data-card b { color: var(--text-main); display: inline-block; width: 110px; font-family: 'Orbitron', sans-serif; font-size: 0.85rem; }
        
        .copy-data-btn { position:absolute; top:20px; right:20px; background:linear-gradient(135deg, #00f2fe, #4facfe); color:#000; border:none; padding:8px 14px; font-weight:bold; font-family:'Orbitron'; border-radius:6px; cursor:pointer; box-shadow:0 4px 10px rgba(0,242,254,0.3); transition:0.2s;}
        .copy-data-btn:hover { transform: scale(1.05); box-shadow:0 6px 15px rgba(0,242,254,0.5); }

        /* ADVANCED PROFESSIONAL NOTEPAD STYLING */
        .notes-engine-card-surface { background: var(--chat-bg); border: 1px solid var(--border-glass); border-radius: 16px; padding: 25px; margin-bottom: 25px; }
        .notes-editor-container-shell { background: var(--input-bg); border-radius: 8px; border: 1px solid var(--border-glass); overflow: hidden; margin-top: 15px; }
        .notes-pad-rich-area { width: 100%; min-height: 400px; padding: 20px; color: var(--text-main); font-size: 1.15rem; border: none; outline: none; line-height: 1.8; overflow-y: auto; text-align: left; }
        .notes-toolbar-ribbon { background: rgba(0,0,0,0.3); padding: 12px; border-bottom: 1px solid var(--border-glass); display: flex; gap: 8px; flex-wrap: wrap; align-items:center; }
        body.light-theme-active .notes-toolbar-ribbon { background: rgba(0,0,0,0.05); }
        .note-tool-btn { background: rgba(0,0,0,0.4); border: 1px solid var(--border-glass); color: var(--text-main); padding: 8px 12px; border-radius: 6px; font-family: 'Orbitron'; font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .note-tool-btn:hover { background: #00f2fe; color: #000; box-shadow: 0 0 15px #00f2fe; transform: translateY(-2px); }
        .note-tool-select { background: rgba(0,0,0,0.4); border: 1px solid var(--border-glass); color: var(--text-main); padding: 8px; border-radius: 6px; font-family: 'Rajdhani'; font-weight: bold; outline:none; cursor:pointer;}
        
        /* WHATSAPP WEB CLONE PERFECT STYLING */
        .chat-io-grid-matrix { display: flex; flex-direction: row; height: 100%; min-height: 600px; max-height: calc(100vh - 180px); background: var(--chat-bg); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.5); position: relative; }
        .chat-target-userlist-pane { width: 340px; background: #111b21; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; overflow-y: auto; z-index: 5; flex-shrink: 0; transition: transform 0.3s ease; }
        body.light-theme-active .chat-target-userlist-pane { background: #ffffff; border-right: 1px solid #d1d7db; }
        .whatsapp-search-box { padding: 10px 14px; background: #111b21; border-bottom: 1px solid rgba(255,255,255,0.1); }
        body.light-theme-active .whatsapp-search-box { background: #ffffff; border-bottom: 1px solid #d1d7db;}
        .whatsapp-search-box input { width: 100%; padding: 8px 14px; background: #202c33; border: none; border-radius: 8px; color: #d1d7db; outline: none; font-family: 'Rajdhani', sans-serif;}
        body.light-theme-active .whatsapp-search-box input { background: #f0f2f5; color: #111b21; }
        
        .chat-user-item-node { padding: 12px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #e9edef; cursor: pointer; transition: 0.2s; position: relative; }
        body.light-theme-active .chat-user-item-node { color: #111b21; border-bottom: 1px solid #f0f2f5; }
        .chat-user-item-node:hover { background: #202c33; }
        body.light-theme-active .chat-user-item-node:hover { background: #f5f6f6; }
        .chat-user-item-node.active-chat-target { background: #2a3942 !important; }
        body.light-theme-active .chat-user-item-node.active-chat-target { background: #f0f2f5 !important; }
        
        .whatsapp-avatar { width: 48px; height: 48px; border-radius: 50%; background: #dfe5e7; object-fit: cover; z-index: 5; }
        .whatsapp-user-info { flex: 1; overflow: hidden; text-align: left; display:flex; flex-direction:column; justify-content:center; }
        .whatsapp-user-name { font-weight: bold; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; justify-content: space-between; font-family:'Rajdhani', sans-serif; }
        
        .chat-stream-message-container { flex: 1; display: flex; flex-direction: column; background: var(--chat-wallpaper); position: relative; height: 100%; overflow: hidden; z-index: 1; transition: transform 0.3s ease; }
        .chat-stream-header-bar { background: #202c33; padding: 10px 16px; color: #e9edef; display: flex; align-items: center; justify-content: space-between; gap: 12px; z-index: 2; border-bottom:1px solid rgba(255,255,255,0.1); }
        body.light-theme-active .chat-stream-header-bar { background: #f0f2f5; color: #111b21; border-bottom:1px solid #d1d7db;}
        
        .header-actions-btn { background:none; border:none; color:#aebac1; padding:8px; border-radius:50%; cursor:pointer; font-size:1.2rem; transition: 0.3s; margin-left: 5px; display:flex; align-items:center; justify-content:center;}
        .header-actions-btn:hover { background: rgba(255,255,255,0.1); color:#d1d7db;}
        body.light-theme-active .header-actions-btn { color:#54656f; }
        body.light-theme-active .header-actions-btn:hover { background: rgba(0,0,0,0.05); color:#111b21; }
        .mobile-chat-back-btn { display: none; margin-right: 10px; color: #00a884; font-size: 1.2rem; background:none; border:none; cursor:pointer;}

        .chat-messages-scroll-stack { flex: 1; padding: 20px 6%; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; z-index: 2; scroll-behavior: smooth; }
        .bubble-msg-wrapper { max-width: 65%; padding: 6px 10px; border-radius: 8px; font-size: 0.95rem; line-height: 1.4; position: relative; box-shadow: 0 1px 0.5px rgba(11,20,26,.13); font-family: 'Rajdhani', sans-serif; cursor: pointer; word-wrap: break-word; display:flex; flex-direction:column;}
        
        /* Message Tail Logic */
        .bubble-outgoing { background: #005c4b; color: #e9edef; align-self: flex-end; border-top-right-radius: 0; }
        .bubble-incoming { background: #202c33; color: #e9edef; align-self: flex-start; border-top-left-radius: 0; }
        body.light-theme-active .bubble-incoming { background: #ffffff; color: #111b21; }
        body.light-theme-active .bubble-outgoing { background: #d9fdd3; color: #111b21; }

                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                                <button onclick="document.querySelectorAll('.sig-log-checkbox').forEach(cb => cb.checked = true);" class="abort-btn" style="background:#f1c40f; color:#000; padding:6px 12px;">Select All</button>
                                <button onclick="deleteSelectedSignals()" class="abort-btn" style="padding:6px 12px;">🗑️ Delete Selected</button>
                            </div>
                            <div id="adminStatsForgetSignalsLogsWrapper" style="display:flex; flex-direction:column; gap:10px;"></div>
                        </div>
                    </div>
                </div>`;
            renderPolicyCardsBlock(); switchAdminSubSection(MatrixSystemState.get('activeAdminSubSection'));
        };

        window.renderLiveCreationStatsSummary = function() { document.getElementById('liveCreationStatsMiniNode').innerText = `Registered Signatures: ${MatrixSystemState.get('cachedGlobalUsersArr').length} Compiled Accounts`; };

        window.createNewCustomerNode = function() {
            const clientName = document.getElementById('newClientName').value.trim(); const contact = document.getElementById('newClientContact').value.trim(); const userPass = document.getElementById('newUserPass').value.trim();
            if(!clientName || !contact || !userPass) { alert("Please complete required parameters."); return; }
            const userId = clientName.replace(/\s+/g, '') + contact.slice(-4);
            set(ref(db, 'users/' + userId), { id: userId, pass: userPass, status: 'active', clientName: clientName, contact: contact, avatar: "", isOnlineNode: false, lockoutState: "false" }).then(() => { 
                alert(`✅ User Compiled!\nID: ${userId}\nPass: ${userPass}`);
                ['newClientName','newClientContact','newUserPass'].forEach(id=>document.getElementById(id).value=""); loadAdminSubmissions(); 
            });
        };

        window.renderPolicyCardsBlock = function() {
            const targetStack = document.getElementById('policyCardsStack'); if(!targetStack) return;
            let policyArr = MatrixSystemState.get('cachedGlobalPolicyArr'); if(policyArr.length === 0) { targetStack.innerHTML = "<p>No records mapping.</p>"; return; }
            targetStack.innerHTML = policyArr.map((d) => {
                let docPreviewHTML = d.attachment ? `<img src="${d.attachment}" onclick="triggerEnlargedAttachmentView('${d.attachment}')" style="max-width:100%; max-height:130px; border-radius:6px; cursor:pointer;">` : "<span>None</span>";
                let clientProfileMatch = MatrixSystemState.get('cachedGlobalUsersArr').find(u => u.id === d.ownerNodeID); let ownerNicknameString = clientProfileMatch ? clientProfileMatch.clientName : "Unknown";
                const copyTextData = `Owner ID: ${d.ownerNodeID} | Name: ${ownerNicknameString} | Insurer: ${d.insure} | Policy: ${d.pol} | Reg: ${d.reg} | Phone: ${d.phone} | Email: ${d.email}`;
                return `<div class="hud-data-card" data-policy-key="${d.policyKey}"><button class="copy-data-btn" onclick="executeAdminContextClipboardCopy(this, '${copyTextData}')">📋 COPY CLIENT DATA</button><p style="margin-top:25px;"><b>Owner ID:</b> <span class="admin-clickable-badge">${d.ownerNodeID}</span></p><p><b>Insurer:</b> ${d.insure}</p><p><b>Policy No:</b> ${d.pol}</p><p><b>Reg No:</b> ${d.reg}</p><p><b>Contact:</b> ${d.phone}</p><p><b>Email:</b> ${d.email}</p><p><b>File:</b> ${docPreviewHTML}</p><button class="wipe-card-btn" onclick="if(confirm('Purge record?')) remove(ref(db, 'policies/${d.policyKey}'))">Purge Record</button></div>`;
            }).join("");
        };
        
        window.executeAdminContextClipboardCopy = function(element, extractionValue) { if(!extractionValue) return; navigator.clipboard.writeText(extractionValue).then(() => { const originalText = element.innerText; element.innerText = "COPIED ✔"; setTimeout(() => { element.innerText = originalText; }, 1200); }).catch(() => {}); };
        window.filterCardsEngine = function(){ const searchInputNode = document.getElementById('searchInput'); if(!searchInputNode) return; let q = searchInputNode.value.toLowerCase(); document.querySelectorAll('.hud-data-card').forEach(c => { c.style.display = c.innerText.toLowerCase().includes(q) ? "" : "none"; }); };

        window.renderAdminAiInterceptionSpyBlock = function() {
            const logsWrapper = document.getElementById('adminAiSpyLogsWrapper'); if(!logsWrapper) return; let dataArr = MatrixSystemState.get('cachedGlobalAiCommsArr');
            if(dataArr.length === 0) { logsWrapper.innerHTML = `<div>Repository empty.</div>`; return; }
            logsWrapper.innerHTML = dataArr.slice().reverse().map(comm => `<div style="background:rgba(4,16,40,0.85); border-left:5px solid var(--neon-pink); border-radius:8px; padding:12px; display:flex; gap:10px;"><input type="checkbox" class="cyber-checkbox ai-log-checkbox" value="${comm.dbKey}"><div style="flex:1;"><div style="color:var(--neon-cyan); font-size:0.85rem;">👤 ${comm.customerName || 'User'} [@${comm.customerID}] | ${comm.timestamp}</div><div style="color:#fff; margin-bottom:4px;"><span style="color:var(--neon-pink);">P:</span> ${comm.query}</div><div style="color:#2ecc71;"><span style="color:#2ecc71;">R:</span> ${comm.response}</div></div><button onclick="if(confirm('Erase this log?')) remove(ref(db, 'ai_communications/${comm.dbKey}'))" style="background:#e74c3c; color:#fff; border:none; padding:6px 12px; border-radius:6px; cursor:pointer;">❌</button></div>`).join('');
        };
        window.deleteSelectedAiLogs = function() { const checkboxes = document.querySelectorAll('.ai-log-checkbox:checked'); if(checkboxes.length === 0) { alert("Select at least one log."); return; } if(confirm(`Delete ${checkboxes.length} logs?`)) { checkboxes.forEach(cb => remove(ref(db, `ai_communications/${cb.value}`))); } };

        window.renderDynamicServerDiagnosticsDashboard = function() {
            const totalUsers = MatrixSystemState.get('cachedGlobalUsersArr').length; const totalPolicies = MatrixSystemState.get('cachedGlobalPolicyArr').length;
            const tuNode = document.getElementById('statsTotalUsers'); if(tuNode) tuNode.innerText = `${totalUsers}`;
            const tpNode = document.getElementById('statsTotalPolicies'); if(tpNode) tpNode.innerText = `${totalPolicies}`;
            const maxCap = Math.max(totalUsers, totalPolicies, 10);
            const uBar = document.getElementById('barChartUsers'); if(uBar) { uBar.style.width = `${(totalUsers / maxCap) * 100}%`; uBar.innerText = `${totalUsers} Nodes`; }
            const pBar = document.getElementById('barChartPolicies'); if(pBar) { pBar.style.width = `${(totalPolicies / maxCap) * 100}%`; pBar.innerText = `${totalPolicies} Docs`; }

            const signalsData = MatrixSystemState.get('cachedGlobalForgetSignalsArr'); const signalsWrapper = document.getElementById('adminStatsForgetSignalsLogsWrapper');
            if(signalsWrapper) {
                if(signalsData.length === 0) { signalsWrapper.innerHTML = `<p style="color:var(--text-sub);">No active requests parsed.</p>`; } 
                else { signalsWrapper.innerHTML = signalsData.map(sig => `<div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:6px; border:1px solid rgba(255,0,127,0.3); display:flex; align-items:center;"><input type="checkbox" class="cyber-checkbox sig-log-checkbox" value="${sig.dbKey}"><div style="flex:1;"><span style="color:#ff007f; font-weight:bold;">@${sig.targetUID}</span> (${sig.clientName || 'N/A'}) loss signal. Phone: ${sig.phone}</div><button onclick="if(confirm('Delete signal?')) remove(ref(db, 'password_forget_signals/${sig.dbKey}'))" style="background:#e74c3c; color:#fff; border:none; padding:6px; border-radius:6px; cursor:pointer;">❌</button></div>`).join(''); }
            }
        };
        window.deleteSelectedSignals = function() { const checkboxes = document.querySelectorAll('.sig-log-checkbox:checked'); if(checkboxes.length === 0) { alert("Select at least one signal."); return; } if(confirm(`Delete ${checkboxes.length} signals?`)) { checkboxes.forEach(cb => remove(ref(db, `password_forget_signals/${cb.value}`))); } };

        window.renderAdminSpyUserList = function() {
            const listPane = document.getElementById('adminSpyUsersListWrapper'); if(!listPane) return; let globalUsers = MatrixSystemState.get('cachedGlobalUsersArr');
            listPane.innerHTML = globalUsers.map(user => `<div class="chat-user-item-node ${(MatrixSystemState.get('spyActiveTargetUserContext') === user.id)?'active-chat-target':''}" onclick="setAdminSpyTargetConversationTrack('${user.id}')"><img class="whatsapp-avatar" src="${user.avatar?user.avatar:defaultAvatarSvg}"><div class="whatsapp-user-info"><div class="whatsapp-user-name">${user.clientName}</div><div class="whatsapp-user-id">@${user.id}</div></div></div>`).join('');
            if(!MatrixSystemState.get('spyActiveTargetUserContext') && globalUsers.length > 0 && window.innerWidth > 768) setAdminSpyTargetConversationTrack(globalUsers[0].id);
        };
        window.setAdminSpyTargetConversationTrack = function(userId) { MatrixSystemState.set('spyActiveTargetUserContext', userId); document.getElementById('spyActiveHeaderTitle').innerText = `Spy Pipeline: @${userId}`; renderAdminSpyChatConsoleLogs(); renderAdminSpyUserList(); 
            if(window.innerWidth <= 768) { document.getElementById('adminSpyUsersListWrapper').classList.add('mobile-hidden'); document.getElementById('adminChatStreamContainer').classList.add('mobile-active'); }
        };

        window.renderAdminSpyChatConsoleLogs = function() {
            const stack = document.getElementById('adminSpyChatLogsStack'); const spyContext = MatrixSystemState.get('spyActiveTargetUserContext'); if(!stack || !spyContext) return;
            get(ref(db, 'chats')).then((snapshot) => {
                const data = snapshot.val(); if(!snapshot.exists()) { stack.innerHTML = `<div>🔒 Pipeline Empty.</div>`; return; }
                let htmlCollector = "";
                Object.keys(data).forEach(key => {
                    const m = data[key];
                    if((m.sender === spyContext && m.receiver === "MainframeAdmin") || (m.sender === "MainframeAdmin" && m.receiver === spyContext)) {
                        if(localStorage.getItem(`deleted_chat_node_MainframeAdmin_${m.epochTimeNode}`)) return;
                        const isMyResponse = (m.sender === "MainframeAdmin"); const ticksString = m.read ? `<span class="whatsapp-tick-space double-blue">✔✔</span>` : `<span class="whatsapp-tick-space">✔✔</span>`;
                        let assetHTML = ""; if(m.mediaPayload) { assetHTML = m.mediaPayload.startsWith("data:audio") ? `<audio src="${m.mediaPayload}" controls style="max-width:240px; margin-top:6px; display:block; height:35px;"></audio>` : `<img src="${m.mediaPayload}" onclick="triggerEnlargedAttachmentView('${m.mediaPayload}')" style="max-width:160px; border-radius:8px; margin-top:5px; display:block; cursor:pointer;">`; }
                        htmlCollector += `<div class="bubble-msg-wrapper" style="${isMyResponse ? 'background:#005c4b; color:#e9edef; align-self:flex-end;' : 'background:#202c33; color:#e9edef; align-self:flex-start;'}" onclick="spawnContextDropdownMenuOverlay(event, '${key}', '${m.textBody.replace(/'/g, "\\'")}', '${m.mediaPayload || ''}', ${m.epochTimeNode || 0})"><div>${m.textBody}</div>${assetHTML}<div class="whatsapp-time">${m.timestamp} ${isMyResponse ? ticksString : ''}</div></div>`;
                    }
                });
                stack.innerHTML = htmlCollector || `<div>🔒 Empty</div>`; stack.scrollTop = stack.scrollHeight;
            });
        };
        window.dispatchAdminSpyInterceptionMsg = function() {
            const inputField = document.getElementById('adminSpyResponseInput'); const spyContext = MatrixSystemState.get('spyActiveTargetUserContext'); if(!inputField || !spyContext) return;
            const textBody = inputField.value.trim(); if(!textBody) return;
            set(push(ref(db, 'chats')), { sender: "MainframeAdmin", receiver: spyContext, textBody: textBody, mediaPayload: "", read: false, epochTimeNode: Date.now(), timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }).then(() => { inputField.value = ""; renderAdminSpyChatConsoleLogs(); });
        };

        checkActiveStateSessionRetentionOnLaunch();
    </script>
</body>
</html>
