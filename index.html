<style>
    /* Advanced Holographic Lighting Overlay */
    @keyframes lightning-strike {
        0%, 100% { opacity: 0; filter: brightness(1); }
        5%, 15% { opacity: 0.8; filter: brightness(3); }
        10% { opacity: 0.4; }
    }

    .lightning-overlay {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        pointer-events: none;
        background: radial-gradient(circle, rgba(0, 242, 254, 0.2) 0%, transparent 70%);
        z-index: 9999;
        animation: lightning-strike 2s infinite;
        display: none;
    }

    .cinema-stage.activated .lightning-overlay { display: block; }

    /* Polished 3D Card Glassmorphism */
    .hud-data-card {
        background: rgba(4, 14, 33, 0.6);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(0, 242, 254, 0.3);
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
</style>

<div class="lightning-overlay" id="lightningFX"></div>

<script>
    /**
     * ADVANCED AUDIO ENGINE
     * Fixes: Audio context now initializes on user interaction (Required by browser security)
     */
    let audioCtx = null;
    window.initAudio = function() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    };

    window.playPowerUpSound = function() {
        if (!isSystemAudioEnabled || !audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 1);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 1);
    };

    /**
     * TRIGGER LOGIC
     * Modified to activate sound and lightning on the first click
     */
    document.body.addEventListener('click', () => {
        initAudio();
    }, { once: true });

    // Ensure movement is locked as requested
    function lockMovement() {
        document.getElementById('master3DViewport').style.transform = "rotateX(0deg) rotateY(0deg)";
    }
    // Call this to disable the mouse parallax
</script>
