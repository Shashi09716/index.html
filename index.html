<!DOCTYPE html>																				
<html lang="en">																				
<head>																				
    <meta charset="UTF-8">																				
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">																				
    <title>Made By SHASHI TIWARI - Pikachu Ultimate Nexus Matrix ⚡</title>																				
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap">																				
    <style>																				
        /* --- DYNAMIC BRIGHT CINEMATIC GRAPHICS CSS --- */																				
        :root {
            --lamp-color: #f1c40f;
            --lamp-glow: #f1c40f;
            --lamp-shadow: rgba(241, 196, 15, 0.7);
            --neon-cyan: #00f2fe;
            --whatsapp-green: #00a884;
            --admin-purple: #9b59b6;
            /* Dark Theme Parameters default */
            --bg-prime: #02050e;
            --panel-glass: rgba(4, 9, 22, 0.94);
            --border-glass: rgba(0, 242, 254, 0.25);
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --chat-bg: #0b141a;
            --input-bg: rgba(1, 3, 7, 0.6);
        }

        /* Light Theme Dynamic Modifiers - High Visibility Contrasts */
        body.light-theme-active {
            --bg-prime: #f8fafc;
            --panel-glass: rgba(255, 255, 255, 0.98);
            --border-glass: rgba(15, 23, 42, 0.3);
            --text-main: #0f172a;
            --text-sub: #334155;
            --chat-bg: #efeae2;
            --input-bg: #ffffff;
        }

        * {																				
            margin: 0;																				
            padding: 0;																				
            box-sizing: border-box;																				
        }																				
																				
        body {																				
            background: var(--bg-prime);																				
            height: 100vh;																				
            display: flex;																				
            justify-content: center;																				
            align-items: center;																				
            overflow: hidden;																				
            font-family: 'Rajdhani', sans-serif;																				
            user-select: none;																				
            position: relative;																				
            width: 100vw;
            transition: background 0.4s ease, color 0.4s ease;
        }																				
																				
        .shashi-header-brand-block {
            position: fixed;
            bottom: 85px;
            left: 20px;
            z-index: 9999;
            font-family: 'Orbitron', sans-serif;
            text-align: left;
        }
        .brand-main-title {
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.85);
            transition: color 0.3s;
        }
        .brand-sub-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #00f2fe;
            letter-spacing: 1px;
            margin-top: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.5);
        }
        body.light-theme-active .brand-main-title {
            color: #0f172a;
            text-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        body.light-theme-active .brand-sub-title {
            color: #0f172a;
            text-shadow: none;
        }

        .cosmic-theme-toggle-switch {
            position: fixed;
            top: 58px;
            right: 15px;
            z-index: 9999;
            background: rgba(4, 9, 22, 0.85);
            border: 1px solid rgba(241, 196, 15, 0.5);
            border-radius: 12px;
            padding: 8px 14px;
            color: #f1c40f;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            width: 130px;
            text-align: center;
        }
        body.light-theme-active .cosmic-theme-toggle-switch {
            background: #ffffff;
            color: #0f172a;
            border-color: #0f172a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .smoke-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .smoke-cloud {
            position: absolute;
            top: -50%;
            width: 50vw;
            height: 200vh;
            filter: blur(140px);
            opacity: 0.14;
            border-radius: 50%;
            animation: smokeDrift 22s infinite alternate ease-in-out;
        }

        .smoke-left {
            left: -20vw;
            background: radial-gradient(circle, #ff007f 0%, #7f00ff 50%, transparent 100%);
        }

        .smoke-right {
            right: -20vw;
            background: radial-gradient(circle, #00f2fe 0%, #4facfe 50%, transparent 100%);
            animation-delay: -11s;
        }

        @keyframes smokeDrift {
            0% { transform: translateY(-2%) scale(1) rotate(0deg); }
            100% { transform: translateY(2%) scale(1.06) rotate(8deg); }
        }

        .cinema-stage {																				
            position: relative;																				
            width: 100vw;																				
            height: 100vh;																				
            display: flex;																				
            justify-content: center;																				
            align-items: center;																				
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);																				
            z-index: 2;
            overflow: hidden;
        }																				
																				
        @keyframes dynamicColorCycle {
            0%, 100% { --lamp-color: #f1c40f; --lamp-shadow: rgba(241, 196, 15, 0.7); }
            33% { --lamp-color: #00f2fe; --lamp-shadow: rgba(0, 242, 254, 0.7); }
            66% { --lamp-color: #2ecc71; --lamp-shadow: rgba(46, 204, 113, 0.7); }
        }

        .cinema-stage.activated {
            animation: dynamicColorCycle 7s infinite linear;
        }

        /* --- THE SHUTTER HIGH ULTRA GLOW LAMP --- */																				
        .cyber-lamp-core {																				
            position: relative;																				
            display: flex;																				
            flex-direction: column;																				
            align-items: center;																				
            z-index: 10;																				
            transform: translateX(0) scale(1.05);																				
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1);																				
        }																				
																				
        .cinema-stage.activated .cyber-lamp-core {																				
            transform: translateX(360px) scale(0.9);																				
        }																				
																				
        .metallic-shutter-head {																				
            width: 240px;																				
            height: 150px;																				
            background: linear-gradient(145deg, #182232, #05070a);																				
            border-radius: 100px 100px 40px 40px;																				
            position: relative;																				
            border: 3px solid #00f2fe;																				
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.4);																				
            z-index: 5;																				
            overflow: hidden;																				
        }																				
																				
        .cinema-stage.activated .metallic-shutter-head {																				
            border-color: var(--lamp-color);																				
            box-shadow: 0 0 65px var(--lamp-shadow);																				
        }																				
																				
        .mechanical-gate {																				
            position: absolute;																				
            top: 25px;																				
            width: 60px;																				
            height: 90px;																				
            background: linear-gradient(90deg, #0f141d, #1a2333);																				
            border: 2px solid #2c3b54;																				
            transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s;																				
            z-index: 6;																				
        }																				
																				
        .gate-left { left: 45px; border-radius: 12px 0 0 12px; }																				
        .gate-right { right: 45px; border-radius: 0 12px 12px 0; }																				
																				
        .cinema-stage.activated .gate-left { transform: translateX(-55px); opacity: 0.1; }																				
        .cinema-stage.activated .gate-right { transform: translateX(55px); opacity: 0.1; }																				
																				
        .blinding-core-light {																				
            position: absolute;																				
            width: 80px;																				
            height: 80px;																				
            background: #ffffff;																				
            border-radius: 50%;																				
            left: 50%;																				
            top: 30px;																				
            transform: translateX(-50%);																				
            filter: blur(6px);																				
            opacity: 0;																				
            transition: opacity 0.4s ease;																				
            box-shadow: 0 0 45px #ffffff;
        }																				
        .cinema-stage.activated .blinding-core-light { opacity: 1; }																				
																				
        .hydraulic-stem {																				
            width: 16px;																				
            height: 240px;																				
            background: linear-gradient(90deg, #182232, #0b0f17, #2d3d56);																				
            z-index: 3;																				
            position: relative;																				
        }																				
																				
        .laser-conduit {																				
            position: absolute;																				
            width: 4px;																				
            height: 100%;																				
            background: #18202c;																				
            left: 50%;																				
            transform: translateX(-50%);																				
            transition: background 0.5s;																				
        }																				
																				
        .cinema-stage.activated .laser-conduit {																				
            background: var(--lamp-color);																				
            box-shadow: 0 0 25px var(--lamp-color);																				
        }																				
																				
        .brushed-heavy-base {																				
            width: 200px;																				
            height: 28px;																				
            background: linear-gradient(180deg, #1e293b, #06090f);																				
            border-radius: 50% / 25%;																				
            border: 2px solid #334155;																				
            z-index: 4;																				
        }																				
																				
        .volumetric-beam {																				
            position: absolute;																				
            top: 120px;																				
            width: 100px;																				
            height: 0;																				
            background: linear-gradient(to bottom, var(--lamp-color) 0%, rgba(255, 255, 255, 0.3) 25%, transparent 100%);																				
            clip-path: polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%);																				
            z-index: 2;																				
            pointer-events: none;																				
            opacity: 0;																				
            transition: height 0.9s ease, width 0.9s ease, opacity 0.3s;																				
        }																				
																				
        .cinema-stage.activated .volumetric-beam {																				
            opacity: 0.45; /* Ultimate Brightness Boost */																				
            height: 490px;																				
            width: 760px;																				
        }																				
																				
        .quantum-cord {																				
            position: absolute;																				
            top: 140px;																				
            left: 195px;																				
            z-index: 99;																				
            cursor: pointer;																				
            transition: transform 0.15s linear;
            padding: 20px;
            margin-left: -20px;
        }																				
																				
        .beaded-wire {																				
            width: 4px;																				
            height: 160px;																				
            background: repeating-linear-gradient(to bottom, #f1c40f, #f1c40f 4px, #0f172a 4px, #0f172a 8px);																				
        }																				
																				
        .luminescent-node {																				
            width: 24px;																				
            height: 24px;																				
            background: radial-gradient(circle, #fff, #f1c40f);																				
            border-radius: 50%;																				
            margin-left: -10px;																				
            box-shadow: 0 0 25px #f1c40f;																				
        }																				
																				
        .audio-toggle-switch {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 9999;
            background: rgba(4, 9, 22, 0.85);
            border: 1px solid rgba(241, 196, 15, 0.3);
            border-radius: 12px;
            padding: 8px 14px;
            color: #f1c40f;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.1);
            transition: all 0.3s ease;
            font-weight: bold;
            width: 130px;
            text-align: center;
        }
        body.light-theme-active .audio-toggle-switch {
            background: #ffffff;
            color: #0f172a;
            border-color: #0f172a;
        }

        /* --- HUD TERMINAL PANEL --- */																				
        .hud-glass-terminal {																				
            position: absolute;																				
            left: 50%;
            transform: translateX(-50%) scale(0.9);																				
            width: 90%;
            max-width: 440px;																				
            background: var(--panel-glass);																				
            border: 2px solid var(--border-glass);																				
            border-left: 5px solid #f1c40f;																				
            padding: 35px 25px;																				
            border-radius: 24px;																				
            backdrop-filter: blur(40px);																				
            box-shadow: 0 40px 90px rgba(0,0,0,0.6);																				
            opacity: 0;																				
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);																				
            z-index: 20;																				
        }																				
																				
        .cinema-stage.activated .hud-glass-terminal {																				
            transform: translateX(-50%) scale(1);																				
            opacity: 1;																				
        }																				
																				
        .hud-top-bar { display: flex; justify-content: space-between; margin-bottom: 25px; }																				
        .hud-status-chip { font-family: 'Orbitron', sans-serif; font-size: 0.65rem; color: #f1c40f; background: rgba(241,196,15,0.06); padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(241,196,15,0.25); letter-spacing: 1px; }																				
        .hud-status-chip.cyan-pulse { color: #00f2fe; background: rgba(0,242,254,0.06); border-color: rgba(0,242,254,0.25); }																				
																				
        .hud-logo { font-family: 'Orbitron', sans-serif; color: var(--text-main); font-size: 2.4rem; text-align: center; margin-bottom: 25px; font-weight: 900; letter-spacing: 2px; }																				
																				
        .portal-matrix-tabs { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 12px; margin-bottom: 25px; }																				
        .hud-tab { flex: 1; padding: 12px; background: transparent; border: none; color: var(--text-sub); font-size: 0.9rem; font-weight: 700; cursor: pointer; border-radius: 8px; transition: 0.3s; white-space: nowrap;}																				
        .hud-tab.active { background: rgba(241,196,15,0.15); color: #f1c40f; border: 1px solid rgba(241,196,15,0.25); font-family: 'Orbitron', sans-serif; font-size: 0.8rem; }																				
																				
        .hud-input-cluster { position: relative; margin-bottom: 25px; width: 100%; }																				
        .hud-input-cluster input, .hud-input-cluster textarea, .hud-input-cluster select { width: 100%; padding: 16px 14px; background: var(--input-bg); border: 2px solid var(--border-glass); border-radius: 10px; color: var(--text-main); font-size: 1rem; outline: none; transition: 0.3s; }																				
        .hud-input-cluster textarea { height: 90px; resize: none; }																				
        .hud-input-cluster select { color: #f1c40f; font-weight: bold; background: var(--input-bg); }																				
																				
        .hud-input-cluster label { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-sub); pointer-events: none; transition: 0.3s; font-size: 0.9rem; font-weight: 600; }																				
        .hud-input-cluster textarea ~ label { top: 20px; transform: none; }																				
																				
        .hud-input-cluster input:focus ~ label, .hud-input-cluster input:not(:placeholder-shown) ~ label,																				
        .hud-input-cluster textarea:focus ~ label, .hud-input-cluster textarea:not(:placeholder-shown) ~ label { top: -12px; left: 10px; background: var(--bg-prime); padding: 0 6px; font-size: 0.75rem; color: #f1c40f; font-family: 'Orbitron', sans-serif; }																				
																				
        .neon-glow-underline { position: absolute; bottom: 0; left: 50%; width: 0; height: 2px; background: #f1c40f; transition: 0.4s ease; transform: translateX(-50%); }																				
        .hud-input-cluster input:focus ~ .neon-glow-underline { width: 100%; box-shadow: 0 0 12px #f1c40f; }																				
																				
        .hud-engage-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #f1c40f, #d4ac0d); color: #000; border: none; border-radius: 10px; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 0.95rem; cursor: pointer; letter-spacing: 2px; transition: 0.3s; }																				
        .hud-engage-btn:hover { box-shadow: 0 0 35px rgba(241, 196, 15, 0.7); transform: translateY(-2px); }																				
																				
        /* --- DASHBOARD SYSTEM HOOK --- */																				
        .dashboard-panel-core {																				
            position: fixed;																				
            inset: 0;																				
            display: flex;																				
            justify-content: center;																				
            align-items: flex-start;																				
            background: var(--bg-prime);																				
            z-index: 100;																				
            padding: 20px;																				
            overflow-y: auto;
            overflow-x: hidden;
            transition: background 0.4s ease;
            padding-bottom: 100px;
        }																				
																				
        .hud-container-panel {																				
            background: var(--panel-glass);																				
            border: 2px solid var(--border-glass);																				
            border-top: 5px solid #00f2fe;																				
            padding: 30px 25px;																				
            border-radius: 20px;																				
            width: 100%;																				
            max-width: 1250px;																				
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);																				
            backdrop-filter: blur(40px);
            margin-top: 10px;
            margin-bottom: 20px;																				
        }																				
																				
        .panel-header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid var(--border-glass); padding-bottom: 15px; gap: 10px; }																				
        .neon-cyan-text { font-family: 'Orbitron'; color: #00f2fe; font-size: 1.8rem; text-shadow: 0 0 15px rgba(0,242,254,0.4); }																				
        .neon-green-text { font-family: 'Orbitron'; color: #2ecc71; font-size: 1.8rem; text-shadow: 0 0 15px rgba(46,204,113,0.4); }																				
																				
        .workspace-channel-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            background: rgba(0,0,0,0.3);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid var(--border-glass);
        }
        .channel-tab-btn {
            flex: 1;
            padding: 14px 10px;
            background: transparent;
            border: none;
            color: var(--text-sub);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .channel-tab-btn.active {
            background: rgba(0, 242, 254, 0.18);
            color: #00f2fe;
            border: 1px solid rgba(0, 242, 254, 0.4);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .form-grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }																				
        .full-width-field { grid-column: span 2; }																				
																				
        .abort-btn { padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; font-size: 0.8rem; transition: 0.3s; }																				
         																				
        .ai-helper-banner { padding: 14px; margin-top: 20px; border-radius: 12px; background: rgba(0,242,254,0.04); border: 1px solid rgba(0,242,254,0.15); color: #00f2fe; text-align: center; font-size: 0.9rem; }																				
        
        /* FREEZING HELPLINE NODE STYLES */
        .helpline-trigger-btn { 
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px; 
            padding: 14px; 
            background: linear-gradient(135deg, #e74c3c, #c0392b); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 12px; 
            color: #ffffff; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 0.95rem; 
            font-family: 'Orbitron'; 
            z-index: 10000;
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }																				
        .helpline-trigger-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(231, 76, 60, 0.6);
        }

        .search-terminal-input { width: 100%; padding: 16px; background: rgba(0,0,0,0.2); border: 2px solid var(--border-glass); border-radius: 12px; color: var(--text-main); font-size: 1rem; font-family: 'Orbitron'; outline: none; }																				
																				
        #policyCardsStack { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }																				
         																				
        .hud-data-card { background: rgba(255,255,255,0.02); border: 2px solid var(--border-glass); border-left: 6px solid #f1c40f; padding: 20px; border-radius: 14px; display: flex; flex-direction: column; gap: 10px; word-break: break-all; position: relative;}																				
        .hud-data-card p { color: var(--text-sub); font-size: 0.95rem; display: flex; flex-flow: row wrap; gap: 5px;}																				
        .hud-data-card b { color: var(--text-main); display: inline-block; width: 90px; flex-shrink: 0;}																				
        .hud-data-card span { color: #f1c40f; background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.85rem; }																				
         																				
        /* Right Side Owner Name Integration */
        .hud-data-card .owner-name-tag-right {
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: 'Orbitron', sans-serif;
            color: #00f2fe;
            font-size: 0.85rem;
            font-weight: 900;
            background: rgba(0, 242, 254, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(0, 242, 254, 0.3);
        }

        .status-badge { font-family: 'Orbitron'; font-size: 0.75rem; padding: 4px 10px; border-radius: 6px; font-weight: bold; display: inline-block; }																				
        .wipe-card-btn { width: 100%; padding: 10px; background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; font-family: 'Orbitron'; font-weight: bold; font-size: 0.8rem; border-radius: 8px; cursor: pointer; margin-top: 5px; }																				
																				
        .hidden { display: none !important; }																				
        .text-left { text-align: left; }																				
																				
        .admin-category-navbar { display: flex; gap: 8px; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border-glass); }

            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNmt0ZHp0b2wxaGsyYmI4Y2M1N2FwYW94MnF4NDl0b2R0Z3kwd3Z3byZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3ntq5FxUvS84U/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHcyeHhkbW1oMnd5ZHhtOHc2eHh0YmFsODBhbW8wMXA3Mzd4N2M2byZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Ju7l5y9osyymQ/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3pjdW1oNm84ZHhhdnd2YndpM3hwdmIxNndxOHBwb3p1ZXR6Mnh6dyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/l3q2zVr6cu95nF6O4/giphy.gif"

        const systemEmojisList = ["😀","😂","🤣","😍","👍","🙏","🔥","✨","🎉","👏","💯","💔","✔","❌","🤝","🚨","⏳","🔒"];

        // --- NON-URL ADDRESS OVERLAY POPUP MODAL CONTROL FUNCTIONS ---
        function triggerCustomInlinePopupEngine(titleText, inputPlaceholder, submitCallback) {
            const wrapper = document.getElementById('nexusCustomInlineModalWrapper');
            if(!wrapper) return;
            
            wrapper.innerHTML = `
                <div class="nexus-popup-card-box" onclick="event.stopPropagation()">

                </div>

            wrapper.classList.remove('hidden');
            
            const fieldNode = document.getElementById('nexusPopupInlineInputFieldNode');
            if(fieldNode) fieldNode.focus();

            document.getElementById('nexusPopupSubmitBtnNode').onclick = () => {
                const finalValue = fieldNode.value.trim();
                submitCallback(finalValue);
                closeCustomInlinePopupEngine();

        window.closeCustomInlinePopupEngine = function() {
            const wrapper = document.getElementById('nexusCustomInlineModalWrapper');
            if(wrapper) wrapper.classList.add('hidden');

        window.executeCosmicThemeToggle = function() {
            const bodyNode = document.body;
            const toggleLabel = document.getElementById('themeToggleBtnLabel');
            bodyNode.classList.toggle('light-theme-active');
            
            if(bodyNode.classList.contains('light-theme-active')) {
                toggleLabel.innerText = "🌑 DARK MODE";
                speakNaturalHuman("Light mode active.");
            } else {
                toggleLabel.innerText = "🌓 LIGHT MODE";
                speakNaturalHuman("Dark mode active.");

        // Render GIF Matrix Node Component Elements Loop
        setTimeout(() => {
            const box = document.getElementById('mainframeGifContainerBox');
            if(box) {
                box.innerHTML = structuralGifMatrixList.map(gifUrl => `
                    <img src="${gifUrl}" class="gif-thumb-item" onclick="dispatchDirectGifMatrixMessage('${gifUrl}')">
                `).join('');
            }
        }, 1200);

        window.toggleGifMatrixDropdownPanel = function(event) {
            event.stopPropagation();
            const targetBoxId = (currentMode === 'admin') ? 'mainframeGifContainerBoxAdmin' : 'mainframeGifContainerBox';
            const targetElement = document.getElementById(targetBoxId);
            if(targetElement) targetElement.classList.toggle('hidden');
        };

        window.dispatchDirectGifMatrixMessage = function(url) {
            let userTarget = (currentMode === 'admin') ? spyActiveTargetUserContext : activeSelectedChatTargetUserId;
            let currentSender = (currentMode === 'admin') ? cachedAdminMainframeRoute.masterId : loggedInCustomerID;
            if(!userTarget || !currentSender) return;

            const newChatPacketRef = push(ref(db, 'chats'));
            set(newChatPacketRef, {
                sender: currentSender, receiver: userTarget,
                textBody: "🖼️ Sent a GIF Vector Element", mediaPayload: url, read: false, epochTimeNode: Date.now(),
                timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            }).then(() => {
                const targetBoxId = (currentMode === 'admin') ? 'mainframeGifContainerBoxAdmin' : 'mainframeGifContainerBox';
                const box = document.getElementById(targetBoxId);
                if(box) box.classList.add('hidden');
                if(currentMode === 'admin') renderAdminSpyChatConsoleLogs(); else renderActiveChatConversationLogs();
            });
        };

        setTimeout(() => {
            const box = document.getElementById('systemEmojiMatrixBoxNode');
            if(box) box.innerHTML = systemEmojisList.map(e => `<div class="emoji-node-item" style="cursor:pointer; padding:6px; font-size:1.2rem; display:inline-block;" onclick="insertEmojiIntoChatField('${e}')">${e}</div>`).join('');
        }, 1000);

        window.insertEmojiIntoChatField = function(emoji) {
            const chatInput = document.getElementById('chatCoreMessageTextInput');
            if(chatInput) { chatInput.value += emoji; chatInput.focus(); }
        };

        window.toggleEmojiDrawerOverlayPanel = function(event) {
            event.stopPropagation();
            const box = document.getElementById('systemEmojiMatrixBoxNode');
            if(box) box.classList.toggle('hidden');
        };

        document.addEventListener('click', () => {
            if(document.getElementById('systemEmojiMatrixBoxNode')) document.getElementById('systemEmojiMatrixBoxNode').classList.add('hidden');
            if(document.getElementById('mainframeGifContainerBox')) document.getElementById('mainframeGifContainerBox').classList.add('hidden');
            removeContextDropdownMenuNode();
        });

        // --- EXPLICIT 8-DAYS AUTO MESSAGE DELETION LOGIC ROUTE ---
        function executeAutoPurgeEightDaysOldChats(chatsSnapshotObj) {
            if(!chatsSnapshotObj) return;
            const thresholdLifespanLimit = 8 * 24 * 60 * 60 * 1000; 
            const rightNowTimeEpoch = Date.now();

            Object.keys(chatsSnapshotObj).forEach(key => {
                const packet = chatsSnapshotObj[key];
                if(packet.epochTimeNode) {
                    if((rightNowTimeEpoch - packet.epochTimeNode) > thresholdLifespanLimit) {
                        remove(ref(db, `chats/${key}`));
                    }
                } else if(packet.timestamp && !packet.epochTimeNode) {
                    update(ref(db, `chats/${key}`), { epochTimeNode: Date.now() });
                }
            });
        }

        // Realtime Mainframe Listener Modules
        onValue(ref(db, 'mainframeAdmin'), (snapshot) => {
            const rootData = snapshot.val();
            if(rootData) {
                cachedAdminMainframeRoute.masterId = rootData.id || "Shashi2004";
                cachedAdminMainframeRoute.masterPass = rootData.pass || "Tolu@Molu";
            }
        });

        onValue(ref(db, 'users'), (snapshot) => {
            const data = snapshot.val();
            cachedGlobalUsersArr = data ? Object.values(data) : [];
            if(document.getElementById('adminDashboard') && !document.getElementById('adminDashboard').classList.contains('hidden')) {
                renderUserControlPanel();
                if(activeAdminSubSection === 'spychat') renderAdminSpyUserList();
            }
            if(activeCustomerWorkspaceChannel === 'chat' && loggedInCustomerID) {
                initializeCrossLinkChatPanel();
            }
            if(loggedInCustomerID) {
                const myProfile = cachedGlobalUsersArr.find(u => u.id === loggedInCustomerID);
                if(myProfile && myProfile.avatar) document.getElementById('customerLiveAvatarPreview').src = myProfile.avatar;
            }
        });

        onValue(ref(db, 'policies'), (snapshot) => {
            const data = snapshot.val();
            cachedGlobalPolicyArr = data ? Object.values(data) : [];
            if(document.getElementById('adminDashboard') && !document.getElementById('adminDashboard').classList.contains('hidden')) {
                renderPolicyCardsBlock();
            }
            if(loggedInCustomerID) renderCustomerLiveTracker();
        });

        onValue(ref(db, 'chats'), (snapshot) => {
            const data = snapshot.val();
            const allChats = data ? Object.values(data) : [];
            
            if(data) executeAutoPurgeEightDaysOldChats(data);

            if(previousChatsLength > 0 && allChats.length > previousChatsLength) {
                const latestMsg = allChats[allChats.length - 1];
                if(latestMsg.sender !== cachedAdminMainframeRoute.masterId && latestMsg.sender !== loggedInCustomerID) {
                    playSynthesizedSound(587.33, 'sine', 0.15);
                }
            }
            previousChatsLength = allChats.length;

            if(activeCustomerWorkspaceChannel === 'chat' && loggedInCustomerID) {
                renderActiveChatConversationLogs();
                markIncomingMessagesAsReadSequence(data);
            }
            if(document.getElementById('adminDashboard') && !document.getElementById('adminDashboard').classList.contains('hidden') && activeAdminSubSection === 'spychat') {
                renderAdminSpyChatConsoleLogs();
                renderAdminSpyUserList();
            }
            if(loggedInCustomerID && activeCustomerWorkspaceChannel === 'chat') {
                calculateUnreadBadgeCountersTrack(data);
            }
        });

        function markIncomingMessagesAsReadSequence(chatsSnap) {
            if(!chatsSnap || !loggedInCustomerID || !activeSelectedChatTargetUserId) return;
            Object.keys(chatsSnap).forEach(key => {
                const m = chatsSnap[key];
                if(m.sender === activeSelectedChatTargetUserId && m.receiver === loggedInCustomerID && m.read === false) {
                    update(ref(db, `chats/${key}`), { read: true });
                }
            });
        }

        function calculateUnreadBadgeCountersTrack(chatsSnap) {
            if(!chatsSnap || !loggedInCustomerID) return;
            const targetNodesArr = cachedGlobalUsersArr.filter(u => u.id !== loggedInCustomerID);
            
            targetNodesArr.forEach(user => {
                let unreadCount = 0;
                Object.values(chatsSnap).forEach(msg => {
                    if(msg.sender === user.id && msg.receiver === loggedInCustomerID && msg.read === false) {
                        // Safe evaluation ensuring local deletions aren't included
                        const targetIdentityMap = loggedInCustomerID;
                        const localStorageFlag = localStorage.getItem(`deleted_chat_node_${targetIdentityMap}_${msg.epochTimeNode}`);
                        if(!localStorageFlag) unreadCount++;
                    }
                });
                const elementBadgeNode = document.getElementById(`unreadCounterBadge_${user.id}`);
                if(elementBadgeNode) {
                    if(unreadCount > 0) {
                        elementBadgeNode.innerText = unreadCount;
                        elementBadgeNode.classList.remove('hidden');
                    } else {
                        elementBadgeNode.classList.add('hidden');
                    }
                }
            });
        }

        window.uploadUserProfileAvatarEngine = function(event) {
            const file = event.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Avatar = e.target.result;
                    set(ref(db, `users/${loggedInCustomerID}/avatar`), base64Avatar).then(() => {
                        document.getElementById('customerLiveAvatarPreview').src = base64Avatar;
                    });
                };
                reader.readAsDataURL(file);
            }
        };

        window.triggerLampActivationOverride = function() {
            const mainStage = document.getElementById('mainStage');
            const loginTerminal = document.getElementById('loginTerminal');
            if(mainStage && loginTerminal && !mainStage.classList.contains('activated')) {
                playSynthesizedSound(520, 'sine', 0.3);
                mainStage.classList.add('activated');
                loginTerminal.classList.remove('hidden');
                speakNaturalHuman("Portal active.");
            }
        };

        window.toggleGlobalSystemAudio = function() {
            isSystemAudioEnabled = !isSystemAudioEnabled;
            const audioBtn = document.getElementById('systemAudioToggleBtn');
            if(isSystemAudioEnabled) {
                audioBtn.innerHTML = `<span>🔊 SOUND: ON</span>`;
            } else {
                audioBtn.innerHTML = `<span>🔇 SOUND: OFF</span>`;
                if('speechSynthesis' in window) window.speechSynthesis.cancel();
            }
        };

        window.speakNaturalHuman = function(textMessage) {																				
            if (!isSystemAudioEnabled) return;
            if ('speechSynthesis' in window) {																				
                window.speechSynthesis.cancel(); 																				
                const syntax = new SpeechSynthesisUtterance(textMessage);																				
                syntax.pitch = 1.05; syntax.rate = 0.95; 																				
                window.speechSynthesis.speak(syntax);																				
            }																				
        };																				
																				
        window.playSynthesizedSound = function(frequency, type, duration) {																				
            if (!isSystemAudioEnabled) return;
            try {																				
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();																				
                const oscillator = audioCtx.createOscillator();																				
                const gainNode = audioCtx.createGain();																				
                oscillator.type = type; oscillator.frequency.value = frequency;																				
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);																				
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);																				
                oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);																				
                oscillator.start(); oscillator.stop(audioCtx.currentTime + duration);																				
            } catch(e) {}																				
        };

        window.changeWorkspaceMode = function(mode) {																				
            currentMode = mode;																				
            const inputLabel = document.getElementById('hudInputLabel');																				
            
            document.getElementById('tabModeUser').classList.remove('active');
            document.getElementById('tabModeAdmin').classList.remove('active');

            if (mode === 'admin') {																				
                document.getElementById('tabModeAdmin').classList.add('active');																				
                if(inputLabel) inputLabel.innerText = "Confirm Admin Vector";																				
            } else {																				
                document.getElementById('tabModeUser').classList.add('active');																				
                if(inputLabel) inputLabel.innerText = "System ID / Customer ID";																				
            }																				
            document.getElementById('accessNodeUser').value = "";																				
            document.getElementById('accessNodePass').value = ""; 																				
        };

        window.verifyInputIdentityProgress = function() {
            const u = document.getElementById('accessNodeUser').value.trim();
            if(!u) return;
            if(currentMode === 'admin') {
                if(u === cachedAdminMainframeRoute.masterId) document.getElementById('accessNodePass').focus();
            } else {
                let userMatch = cachedGlobalUsersArr.find(user => user.id.toLowerCase() === u.toLowerCase());
                if(userMatch) document.getElementById('accessNodePass').focus();
            }
        };

        window.checkAutoLogin = function() {																				
            const u = document.getElementById('accessNodeUser').value.trim();																				
            const p = document.getElementById('accessNodePass').value.trim();																				
            if(!u || !p) return;																				
																				
            if(currentMode === 'admin') {																				
                if(u === cachedAdminMainframeRoute.masterId && p === cachedAdminMainframeRoute.masterPass) executeClusterLogin(null);																				
            } else {																				
                let userMatch = cachedGlobalUsersArr.find(user => user.id.toLowerCase() === u.toLowerCase());																				
                if(userMatch && String(userMatch.pass) === String(p)) executeClusterLogin(null);																				
            }																				
        };

        window.executeClusterLogin = function(event) {																				
            if(event) event.preventDefault();																				
            const u = document.getElementById('accessNodeUser').value.trim();																				
            const p = document.getElementById('accessNodePass').value.trim();																				
																				
            if (currentMode === 'admin') {																				
                if (u !== cachedAdminMainframeRoute.masterId || p !== cachedAdminMainframeRoute.masterPass) {
                    return;
                }
                failedAttemptsCount = 0;																				
                document.getElementById('mainStage').style.display = 'none';																				
                document.getElementById('adminDashboard').classList.remove('hidden');																				
                loadAdminSubmissions();																				
            } else {																				
                const userIdx = cachedGlobalUsersArr.findIndex(user => user.id.toLowerCase() === u.toLowerCase());																				
                const userMatch = userIdx !== -1 ? cachedGlobalUsersArr[userIdx] : null;																				
																				
                if (!userMatch) {
                    return;
                }

                if (String(userMatch.pass) === String(p)) {																				
                    if (userMatch.status === 'deactivated' || userMatch.status === 'attack_locked') {																				
                        return;																				
                    }																				
                    failedAttemptsCount = 0;																				
                    loggedInCustomerID = userMatch.id;																				
                    
                    update(ref(db, `users/${userMatch.id}`), { isOnlineNode: true });

                    document.getElementById('mainStage').style.display = 'none';																				
                    document.getElementById('customerDashboard').classList.remove('hidden');																				
                    switchCustomerChannel('upload');
                } else {																				
                    failedAttemptsCount++;																				
                    if (failedAttemptsCount >= 3) {																				
                        userMatch.status = 'attack_locked';																				
                        set(ref(db, 'users/' + userMatch.id), userMatch);																				
                    }																				
                }																				
            }																				
        };

        window.processBinaryAttachment = function(event, type) {
            const fileInput = event.target;
            if(fileInput && fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    if (type === 'policy') {
                        loadedAttachmentB64 = e.target.result;
                    } else if (type === 'chat') {
                        globalLiveChatBinaryStreamBase64 = e.target.result;
                        document.getElementById('chatAttachmentStatusFeedback').innerText = `📎 Attached asset stream resource`;
                    }
                };
                reader.readAsDataURL(fileInput.files[0]);
            }
        };

        window.submitPolicyForm = function(){																				
            let reg = document.getElementById('regNo').value.trim();																				
            let ins = document.getElementById('insurerName').value.trim();																				
            let pol = document.getElementById('policyNo').value.trim();																				
            let contact = document.getElementById('contactNo').value.trim();																				
            let emailVal = document.getElementById('email').value.trim();																				
            let noteVal = document.getElementById('notesReal').value.trim();																				
            																				
            if(!ins || !contact){ return; }																				
            																				
            const generatedPolicyId = "POL_" + Date.now();
            set(ref(db, 'policies/' + generatedPolicyId), {
                id: generatedPolicyId, ownerNodeID: loggedInCustomerID, 
                reg, insure: ins, pol, phone: contact, email: emailVal, notes: noteVal, 
                attachment: loadedAttachmentB64, customerComments: [], status: 'pending', 
                adminComment: "Awaiting overview verification logic.", time: new Date().toLocaleString()
            }).then(() => {
                document.getElementById('regNo').value = "";																				
                document.getElementById('insurerName').value = "";																				
                document.getElementById('policyNo').value = "";																				
                document.getElementById('contactNo').value = "";																				
                document.getElementById('email').value = "";																				
                document.getElementById('notesReal').value = "";																				
                loadedAttachmentB64 = "";
                renderCustomerLiveTracker();
            });
        };

        window.renderCustomerLiveTracker = function() {																				
            const trackerBox = document.getElementById('customerLiveTrackerSection'); if(!trackerBox) return;																				
            let userCases = cachedGlobalPolicyArr.filter(item => item.ownerNodeID === loggedInCustomerID);																				
            if (userCases.length === 0) { trackerBox.innerHTML = `<h4 style="color:#00f2fe; font-family:'Orbitron';">📊 LIVE TRACKER MODULE</h4><p style="color:var(--text-sub); font-size:0.85rem;">No frames recorded.</p>`; return; }																				
            																				
            let casesHtml = userCases.map((item) => {																				
                let badgeClass = item.status === 'uploaded' ? 'status-uploaded' : item.status === 'error' ? 'status-error' : item.status === 'closed' ? 'status-closed' : item.status === 'waiting' ? 'status-waiting' : 'status-pending';																				
                let commentStack = item.customerComments ? Object.values(item.customerComments) : [];
                let commentLogHTML = commentStack.map(c => `<div style="font-size:0.8rem; padding:4px; margin-top:3px; border-radius:4px;"><b>Customer:</b> ${c.text}</div>`).join('');

                return `																				
                    <div style="background: rgba(255,255,255,0.02); padding: 18px; border-radius: 12px; border: 1px solid var(--border-glass); display: flex; flex-direction:column; margin-top: 10px; text-align: left; gap: 12px;">																				
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div><strong style="color: var(--text-main); font-size: 0.95rem;">Insurer: <span style="color: #00f2fe;">${item.insure}</span></strong></div>
                            <div><span class="status-badge ${badgeClass}">${item.status.toUpperCase()}</span></div>
                        </div>
                        <div style="font-size: 0.85rem; color: var(--text-sub); background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 6px; border-left: 3px solid #f1c40f;">
                            <b>Feedback:</b> ${item.adminComment}
                        </div>																				
                        <div style="background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px;">
                            <div id="commentHistoryStack_${item.id}">${commentLogHTML}</div>
                            <div style="display:flex; gap:6px; margin-top:6px;">
                                <input type="text" id="trackerCommentInput_${item.id}" placeholder="Type string..." style="flex:1; padding:8px; background:rgba(0,0,0,0.4); border:1px solid var(--border-glass); color:var(--text-main); border-radius:6px;">
                                <button onclick="postTrackerComment('${item.id}')" style="padding:8px 12px; background:#00f2fe; color:#000; border:none; font-family:'Orbitron'; font-weight:bold; border-radius:6px;">SEND</button>
                            </div>
                        </div>
                    </div>																				
                `;																				
            }).join('');																				
            trackerBox.innerHTML = `<h4 style="color: #00f2fe; font-family:'Orbitron'; font-size:0.95rem; margin-bottom:8px;">📊 LIVE STATUS TRACKER</h4><div style="display:flex; flex-direction:column; gap:8px; max-height:260px; overflow-y:auto;">${casesHtml}</div>`;																				
        };

        window.postTrackerComment = function(policyId) {
            const txtNode = document.getElementById(`trackerCommentInput_${policyId}`);
            if(!txtNode || !txtNode.value.trim()) return;
            const targetCommentRef = push(ref(db, `policies/${policyId}/customerComments`));
            set(targetCommentRef, {
                text: txtNode.value.trim(), timestamp: new Date().toLocaleTimeString()
            }).then(() => { txtNode.value = ""; renderCustomerLiveTracker(); });
        };

        window.switchCustomerChannel = function(channelId) {
            activeCustomerWorkspaceChannel = channelId;
            const btnUpload = document.getElementById('btnChannelUpload');
            const btnChat = document.getElementById('btnChannelChat');
            const viewUpload = document.getElementById('customerUploadInterfaceBlock');
            const viewChat = document.getElementById('customerChatInterfaceBlock');
            
            if(channelId === 'upload') {
                btnUpload.classList.add('active'); btnChat.classList.remove('active');
                viewUpload.classList.remove('hidden'); viewChat.classList.add('hidden');
                renderCustomerLiveTracker();
            } else {
                btnUpload.classList.remove('active'); btnChat.classList.add('active');
                viewUpload.classList.add('hidden'); viewChat.classList.remove('hidden');
                initializeCrossLinkChatPanel();

        window.toggleVoiceAudioRecordingEngine = function() {
            const recordBtn = document.getElementById('voiceRecordingCoreTriggerBtn');
            if(!nativeAudioMediaRecorderInstance || nativeAudioMediaRecorderInstance.state === "inactive") {
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    nativeAudioMediaRecorderInstance = new MediaRecorder(stream);
                    compiledAudioChunksCollectorArr = [];
                    
                    nativeAudioMediaRecorderInstance.ondataavailable = (e) => {
                        if(e.data.size > 0) compiledAudioChunksCollectorArr.push(e.data);
                    };

                    nativeAudioMediaRecorderInstance.onstop = () => {
                        const audioRawBlob = new Blob(compiledAudioChunksCollectorArr, { type: 'audio/webm' });
                        const baseConverterReader = new FileReader();
                        baseConverterReader.onloadend = () => {
                            globalLiveChatBinaryStreamBase64 = baseConverterReader.result;
                            document.getElementById('chatAttachmentStatusFeedback').innerText = "🎙️ Voice Audio recording synchronized stream map ready. Press send.";
                        };
                        baseConverterReader.readAsDataURL(audioRawBlob);
                        stream.getTracks().forEach(track => track.stop());
                    };

                    nativeAudioMediaRecorderInstance.start();
                    recordBtn.classList.add('recording-active-pulse');
                    document.getElementById('chatAttachmentStatusFeedback').innerText = "🎙️ Broadcasting audio recording tracking loop core...";
                }).catch(() => {});
            } else {
                nativeAudioMediaRecorderInstance.stop();
                recordBtn.classList.remove('recording-active-pulse');
            }
        };

        window.renderActiveChatConversationLogs = function() {

                if(!data) {
                    wrapper.innerHTML = `<div style="color:#8696a0; font-size:0.85rem; margin:auto;">🔒 Encryption active. Pipeline Empty.</div>`;
                    return;
                }
                const masterKeys = Object.keys(data);
                const masterLogs = Object.values(data);
                
                let combinedHTML = "";
                let count = 0;

                masterLogs.forEach((msg, idx) => {
                    if((msg.sender === loggedInCustomerID && msg.receiver === activeSelectedChatTargetUserId) ||
                       (msg.sender === activeSelectedChatTargetUserId && msg.receiver === loggedInCustomerID)) {
                        
                        // Local storage "Delete for Me" check validation pass

                        if(localStorage.getItem(clientPurgeVerificationKey)) {
                            return; 
                        }

                        count++;
                        const key = masterKeys[idx];
                        const isMyMessage = (msg.sender === loggedInCustomerID);
                        const directionalCss = isMyMessage ? 'bubble-outgoing' : 'bubble-incoming';
                        
                        let assetElementHTML = "";
                        if(msg.mediaPayload) {
                            if(msg.mediaPayload.startsWith("data:audio")) {
                                assetElementHTML = `<br><audio controls src="${msg.mediaPayload}" style="max-width:220px; height:40px; margin-top:5px;"></audio>`;
                            } else if(msg.mediaPayload.startsWith("http") || msg.mediaPayload.startsWith("data:image")) {
                                assetElementHTML = `<br><img src="${msg.mediaPayload}" style="max-width:180px; border-radius:8px; margin-top:5px; display:block;">`;
                            }
                        }
                        
                        combinedHTML += `
                            <div class="bubble-msg-wrapper ${directionalCss}" onclick="spawnContextDropdownMenuOverlay(event, '${key}', '${msg.textBody}', '${msg.mediaPayload || ''}', ${msg.epochTimeNode || 0})">

                                ${assetElementHTML}
                                <div class="whatsapp-time">${msg.timestamp}</div>
                            </div>`;
                    }
                });

                if(!data) {
                    stack.innerHTML = `<div style="color:var(--text-sub); font-size:0.85rem; margin:auto;">🔒 Chat string stack clear.</div>`;
                    return;
                }
                const masterKeys = Object.keys(data);
                const chats = Object.values(data);
                
                let htmlCollector = "";
                chats.forEach((m, idx) => {
                    if((m.sender === spyActiveTargetUserContext && m.receiver === cachedAdminMainframeRoute.masterId) ||
                       (m.sender === cachedAdminMainframeRoute.masterId && m.receiver === spyActiveTargetUserContext)) {
                        
                        const key = masterKeys[idx];
                        const isMyResponse = (m.sender === cachedAdminMainframeRoute.masterId);
                        let customStyle = isMyResponse ? "background:#005c4b; color:#fff; align-self:flex-end; border-top-right-radius:0;" : "background:#202c33; color:#fff; align-self:flex-start; border-top-left-radius:0;";
                        
                        let assetHTML = "";
                        if(m.mediaPayload) {
                            if(m.mediaPayload.startsWith("data:audio")) {
                                assetHTML = `<br><audio controls src="${m.mediaPayload}" style="max-width:220px; height:40px; margin-top:5px;"></audio>`;
                            } else {
                                assetHTML = `<br><img src="${m.mediaPayload}" style="max-width:160px; border-radius:8px; margin-top:5px; display:block;">`;
                            }
                        }
                        
                        htmlCollector += `
                            <div class="bubble-msg-wrapper" style="${customStyle}" onclick="spawnContextDropdownMenuOverlay(event, '${key}', '${m.textBody}', '${m.mediaPayload || ''}', ${m.epochTimeNode || 0})">
                                ${m.textBody}
                                ${assetHTML}
                                <div class="whatsapp-time">${m.timestamp}</div>
                            </div>`;
                    }
                });
                
                stack.innerHTML = htmlCollector || `<div style="color:var(--text-sub); font-size:0.85rem; margin:auto;">🔒 Secure Normal WhatsApp space verified.</div>`;
                stack.scrollTop = stack.scrollHeight;
            });
        };

        window.dispatchAdminSpyInterceptionMsg = function() {
            const input = document.getElementById('adminSpyResponseInput'); if(!input || !input.value.trim() || !spyActiveTargetUserContext) return;
            const newChatRef = push(ref(db, 'chats'));
            set(newChatRef, {
                sender: cachedAdminMainframeRoute.masterId, receiver: spyActiveTargetUserContext,
                textBody: input.value.trim(), mediaPayload: "", read: false, epochTimeNode: Date.now(),
                timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            }).then(() => { input.value = ""; renderAdminSpyChatConsoleLogs(); });
        };

        window.renderPolicyCardsBlock = function() {																				
            const targetStack = document.getElementById('policyCardsStack'); if(!targetStack) return;																				
            if(cachedGlobalPolicyArr.length === 0) { targetStack.innerHTML = "<p>No files loaded.</p>"; return; }																				
            																				
            targetStack.innerHTML = cachedGlobalPolicyArr.map((d, i) => {
                let docPreviewHTML = d.attachment ? `<br><img src="${d.attachment}" style="max-width:100%; max-height:100px; border-radius:6px; margin-top:4px;">` : "<span>None</span>";
                
                let clientProfileMatch = cachedGlobalUsersArr.find(u => u.id === d.ownerNodeID);
                let ownerNicknameString = clientProfileMatch ? clientProfileMatch.clientName : "Unknown Profile";

                return `																				
                    <div class="hud-data-card">																				
                      <div class="owner-name-tag-right">👤 Name: ${ownerNicknameString}</div>
                      <p style="margin-top:20px;"><b>User ID:</b> <span>${d.ownerNodeID}</span></p>																				
                      <p><b>Insurer:</b> <span>${d.insure}</span></p>																				
                      <p><b>Contact:</b> <span>${d.phone}</span></p>																				
                      <p><b>File:</b> ${docPreviewHTML}</p>
                      <div style="margin-top: 10px; padding: 8px; background: rgba(0,0,0,0.4); border-radius: 6px;">																				
                         <select id="updateStatusSelect_${i}" style="padding:6px; font-size:0.75rem; width:100%; margin-bottom:8px;">																				
                               <option value="pending" ${d.status === 'pending' ? 'selected' : ''}>⏳ Pending</option>																				
                               <option value="uploaded" ${d.status === 'uploaded' ? 'selected' : ''}>✅ Uploaded</option>																				
                               <option value="error" ${d.status === 'error' ? 'selected' : ''}>❌ Error</option>																				
                               <option value="closed" ${d.status === 'closed' ? 'selected' : ''}>🔒 Closed</option>																				
                         </select>																				
                         <input type="text" id="adminCommentInput_${i}" value="${d.adminComment || ''}" placeholder="Feedback..." style="padding:6px; font-size:0.8rem; background:#020408; width:100%; margin-bottom:8px; color:#fff;">																				
                         <button onclick="transmitAdminResponse(${i})" style="padding:6px; background:#f1c40f; color:black; border:none; width:100%; font-weight:bold;">TRANSMIT</button>																				
                      </div>																				
                      <button class="wipe-card-btn" onclick="purgeRegistryLog(${i})">Purge Record</button>																				
                    </div>																				
                `;
            }).join("");																				
        };

        window.transmitAdminResponse = function(index) {																				
            const statusSelect = document.getElementById(`updateStatusSelect_${index}`); 
            const commentInput = document.getElementById(`adminCommentInput_${index}`);																				
            let targetPol = cachedGlobalPolicyArr[index];
            set(ref(db, `policies/${targetPol.id}/status`), statusSelect.value);
            set(ref(db, `policies/${targetPol.id}/adminComment`), commentInput.value.trim() || "Status saved.");
        };																				
																				
        window.toggleUserNodeSwitch = function(index) {																				
            let userObj = cachedGlobalUsersArr[index];
            const nextStatus = userObj.status === 'active' ? 'deactivated' : 'active';
            set(ref(db, `users/${userObj.id}/status`), nextStatus);
        };																				
																				
        window.wipeUserPermanently = function(index) {																				
            let userObj = cachedGlobalUsersArr[index];
            remove(ref(db, 'users/' + userObj.id));
        };

        window.purgeRegistryLog = function(index){ 
            let targetPol = cachedGlobalPolicyArr[index];
            remove(ref(db, 'policies/' + targetPol.id));
        };

        window.filterCardsEngine = function(){ 
            const searchInputNode = document.getElementById('searchInput'); if(!searchInputNode) return; 
            let q = searchInputNode.value.toLowerCase(); 
            document.querySelectorAll('.hud-data-card').forEach(c => { c.style.display = c.innerText.toLowerCase().includes(q) ? "" : "none"; }); 
        };																				
																				
        window.logoutEngine = function() {																				
            if(loggedInCustomerID) {
                update(ref(db, `users/${loggedInCustomerID}`), { isOnlineNode: false });
            }
            document.getElementById('accessNodeUser').value = "";
            document.getElementById('accessNodePass').value = "";
            
            document.getElementById('customerDashboard').classList.add('hidden'); 
            document.getElementById('adminDashboard').classList.add('hidden');																				
            loggedInCustomerID = ""; failedAttemptsCount = 0;
            const stage = document.getElementById('mainStage'); if(stage) { stage.style.display = 'flex'; stage.classList.remove('activated'); }																				
            if(document.getElementById('loginTerminal')) document.getElementById('loginTerminal').classList.add('hidden');																				
        };
    </script>																				
</body>																				
</html>
