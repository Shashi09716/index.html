<!DOCTYPE html>																				
<html lang="en">																				
<head>																				
    <meta charset="UTF-8">																				
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">																				
    <title>Made By SHASHI TIWARI - Pikachu Ultimate Nexus Matrix ⚡</title>																				
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap">																				
    <style>																				
        /* --- DYNAMIC BRIGHT CINEMATIC GRAPHICS CSS --- */																				
        :root {
            --lamp-color: #f1c40f;
            --lamp-glow: rgba(241, 196, 15, 0.8);
            --lamp-shadow: rgba(241, 196, 15, 0.3);
            --neon-cyan: #00f2fe;
            --whatsapp-green: #00a884;
            --admin-purple: #9b59b6;
            /* Dark Theme Parameters default */
            --bg-prime: #02050e;
            --panel-glass: rgba(4, 9, 22, 0.85);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --chat-bg: #222e35;
        }

        /* Light Theme Dynamic Modifiers */
        body.light-theme-active {
            --bg-prime: #e2e8f0;
            --panel-glass: rgba(255, 255, 255, 0.9);
            --border-glass: rgba(15, 23, 42, 0.15);
            --text-main: #0f172a;
            --text-sub: #475569;
            --chat-bg: #efeae2;
        }

        * {																				
            margin: 0;																				
            padding: 0;																				
            box-sizing: border-box;																				
        }																				
																				
        body {																				
            background: var(--bg-prime);																				
            height: 100vh;																				
            display: flex;																				
            justify-content: center;																				
            align-items: center;																				
            overflow: hidden;																				
            font-family: 'Rajdhani', sans-serif;																				
            user-select: none;																				
            position: relative;																				
            width: 100vw;
            transition: background 0.4s ease, color 0.4s ease;
        }																				
																				
        /* --- STATIC BRANDING INTEGRATION BLOCK (TOP LEFT) --- */
        .shashi-header-brand-block {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.6);
            pointer-events: none;
            transition: color 0.3s;
        }
        body.light-theme-active .shashi-header-brand-block {
            color: #0f172a;
            text-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        /* --- COSMIC DYNAMIC LIGHT CONFIG DRAWER SWITCH --- */
        .cosmic-theme-toggle-switch {
            position: fixed;
            top: 15px;
            right: 140px;
            z-index: 9999;
            background: rgba(4, 9, 22, 0.85);
            border: 1px solid rgba(241, 196, 15, 0.3);
            border-radius: 12px;
            padding: 8px 14px;
            color: #f1c40f;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.1);
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        body.light-theme-active .cosmic-theme-toggle-switch {
            background: #ffffff;
            color: #0f172a;
            border-color: #0f172a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* --- SIDE COLORFUL SMOKE EFFECT --- */
        .smoke-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .smoke-cloud {
            position: absolute;
            top: -50%;
            width: 50vw;
            height: 200vh;
            filter: blur(140px);
            opacity: 0.16;
            border-radius: 50%;
            animation: smokeDrift 15s infinite alternate ease-in-out;
        }

        .smoke-left {
            left: -20vw;
            background: radial-gradient(circle, #ff007f 0%, #7f00ff 50%, transparent 100%);
        }

        .smoke-right {
            right: -20vw;
            background: radial-gradient(circle, #00f2fe 0%, #4facfe 50%, transparent 100%);
            animation-delay: -7.5s;
        }

        @keyframes smokeDrift {
            0% { transform: translateY(-5%) scale(1) rotate(0deg); }
            100% { transform: translateY(5%) scale(1.1) rotate(15deg); }
        }

        .cinema-stage {																				
            position: relative;																				
            width: 100vw;																				
            height: 100vh;																				
            display: flex;																				
            justify-content: center;																				
            align-items: center;																				
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);																				
            z-index: 2;
            overflow: hidden;
        }																				
																				
        @keyframes dynamicColorCycle {
            0%, 100% { --lamp-color: #f1c40f; --lamp-glow: rgba(241, 196, 15, 0.8); --lamp-shadow: rgba(241, 196, 15, 0.3); }
            33% { --lamp-color: #00f2fe; --lamp-glow: rgba(0, 242, 254, 0.8); --lamp-shadow: rgba(0, 242, 254, 0.3); }
            66% { --lamp-color: #2ecc71; --lamp-glow: rgba(46, 204, 113, 0.8); --lamp-shadow: rgba(46, 204, 113, 0.3); }
        }

        .cinema-stage.activated {
            animation: dynamicColorCycle 4s infinite linear;
        }

        /* --- THE SHUTTER ROBOTIC LAMP --- */																				
        .cyber-lamp-core {																				
            position: relative;																				
            display: flex;																				
            flex-direction: column;																				
            align-items: center;																				
            z-index: 10;																				
            transform: translateX(0) scale(1.05);																				
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1);																				
        }																				
																				
        .cinema-stage.activated .cyber-lamp-core {																				
            transform: translateX(360px) scale(0.9);																				
        }																				
																				
        .metallic-shutter-head {																				
            width: 240px;																				
            height: 150px;																				
            background: linear-gradient(145deg, #141a24, #080b10);																				
            border-radius: 100px 100px 40px 40px;																				
            position: relative;																				
            border: 3px solid #243147;																				
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);																				
            z-index: 5;																				
            overflow: hidden;																				
        }																				
																				
        .cinema-stage.activated .metallic-shutter-head {																				
            border-color: var(--lamp-color);																				
            box-shadow: 0 0 40px var(--lamp-shadow);																				
        }																				
																				
        .mechanical-gate {																				
            position: absolute;																				
            top: 25px;																				
            width: 60px;																				
            height: 90px;																				
            background: linear-gradient(90deg, #0f141d, #1a2333);																				
            border: 2px solid #2c3b54;																				
            transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s;																				
            z-index: 6;																				
        }																				
																				
        .gate-left { left: 45px; border-radius: 12px 0 0 12px; }																				
        .gate-right { right: 45px; border-radius: 0 12px 12px 0; }																				
																				
        .cinema-stage.activated .gate-left { transform: translateX(-55px); opacity: 0.1; }																				
        .cinema-stage.activated .gate-right { transform: translateX(55px); opacity: 0.1; }																				
																				
        .blinding-core-light {																				
            position: absolute;																				
            width: 70px;																				
            height: 70px;																				
            background: #ffffff;																				
            border-radius: 50%;																				
            left: 50%;																				
            top: 35px;																				
            transform: translateX(-50%);																				
            filter: blur(12px);																				
            opacity: 0;																				
            transition: opacity 0.4s ease;																				
        }																				
        .cinema-stage.activated .blinding-core-light { opacity: 1; }																				
																				
        .hydraulic-stem {																				
            width: 16px;																				
            height: 240px;																				
            background: linear-gradient(90deg, #182232, #0b0f17, #2d3d56);																				
            z-index: 3;																				
            position: relative;																				
        }																				
																				
        .laser-conduit {																				
            position: absolute;																				
            width: 4px;																				
            height: 100%;																				
            background: #18202c;																				
            left: 50%;																				
            transform: translateX(-50%);																				
            transition: background 0.5s;																				
        }																				
																				
        .cinema-stage.activated .laser-conduit {																				
            background: var(--lamp-color);																				
            box-shadow: 0 0 15px var(--lamp-color);																				
        }																				
																				
        .brushed-heavy-base {																				
            width: 200px;																				
            height: 28px;																				
            background: linear-gradient(180deg, #1e293b, #06090f);																				
            border-radius: 50% / 25%;																				
            border: 2px solid #334155;																				
            z-index: 4;																				
        }																				
																				
        .volumetric-beam {																				
            position: absolute;																				
            top: 120px;																				
            width: 100px;																				
            height: 0;																				
            background: linear-gradient(to bottom, var(--lamp-color) 0%, rgba(255, 255, 255, 0.1) 45%, transparent 100%);																				
            clip-path: polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%);																				
            z-index: 2;																				
            pointer-events: none;																				
            opacity: 0;																				
            transition: height 0.9s ease, width 0.9s ease, opacity 0.3s;																				
        }																				
																				
        .cinema-stage.activated .volumetric-beam {																				
            opacity: 0.22;																				
            height: 450px;																				
            width: 700px;																				
        }																				
																				
        .quantum-cord {																				
            position: absolute;																				
            top: 140px;																				
            left: 195px;																				
            z-index: 99;																				
            cursor: pointer;																				
            transition: transform 0.15s linear;
            padding: 20px;
            margin-left: -20px;
        }																				
																				
        .beaded-wire {																				
            width: 4px;																				
            height: 160px;																				
            background: repeating-linear-gradient(to bottom, #f1c40f, #f1c40f 4px, #0f172a 4px, #0f172a 8px);																				
        }																				
																				
        .luminescent-node {																				
            width: 24px;																				
            height: 24px;																				
            background: radial-gradient(circle, #fff, #f1c40f);																				
            border-radius: 50%;																				
            margin-left: -10px;																				
            box-shadow: 0 0 15px #f1c40f;																				
        }																				
																				
        /* --- AUDIO ACCESSIBILITY INTERFACE --- */
        .audio-toggle-switch {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 9999;
            background: rgba(4, 9, 22, 0.85);
            border: 1px solid rgba(241, 196, 15, 0.3);
            border-radius: 12px;
            padding: 8px 14px;
            color: #f1c40f;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.1);
            transition: all 0.3s ease;
            font-weight: bold;
        }
        body.light-theme-active .audio-toggle-switch {
            background: #ffffff;
            color: #0f172a;
            border-color: #0f172a;
        }
        .audio-toggle-switch.audio-disabled { color: #64748b; border-color: rgba(255,255,255,0.08); box-shadow: none; }

        /* --- HUD GLASS TERMINAL BOX --- */																				
        .hud-glass-terminal {																				
            position: absolute;																				
            left: 50%;
            transform: translateX(-50%) scale(0.9);																				
            width: 90%;
            max-width: 440px;																				
            background: var(--panel-glass);																				
            border: 1px solid var(--border-glass);																				
            border-left: 5px solid #f1c40f;																				
            padding: 35px 25px;																				
            border-radius: 24px;																				
            backdrop-filter: blur(40px);																				
            box-shadow: 0 40px 90px rgba(0,0,0,0.6);																				
            opacity: 0;																				
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);																				
            z-index: 20;																				
        }																				
																				
        .cinema-stage.activated .hud-glass-terminal {																				
            transform: translateX(-50%) scale(1);																				
            opacity: 1;																				
        }																				
																				
        .hud-top-bar { display: flex; justify-content: space-between; margin-bottom: 25px; }																				
        .hud-status-chip { font-family: 'Orbitron', sans-serif; font-size: 0.65rem; color: #f1c40f; background: rgba(241,196,15,0.06); padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(241,196,15,0.25); letter-spacing: 1px; }																				
        .hud-status-chip.cyan-pulse { color: #00f2fe; background: rgba(0,242,254,0.06); border-color: rgba(0,242,254,0.25); }																				
																				
        .hud-logo { font-family: 'Orbitron', sans-serif; color: var(--text-main); font-size: 2.4rem; text-align: center; margin-bottom: 25px; font-weight: 900; letter-spacing: 2px; }																				
																				
        .portal-matrix-tabs { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 12px; margin-bottom: 25px; }																				
        .hud-tab { flex: 1; padding: 12px; background: transparent; border: none; color: var(--text-sub); font-size: 0.9rem; font-weight: 700; cursor: pointer; border-radius: 8px; transition: 0.3s; white-space: nowrap;}																				
        .hud-tab.active { background: rgba(241,196,15,0.15); color: #f1c40f; border: 1px solid rgba(241,196,15,0.25); font-family: 'Orbitron', sans-serif; font-size: 0.8rem; }																				
																				
        .hud-input-cluster { position: relative; margin-bottom: 25px; width: 100%; }																				
        .hud-input-cluster input, .hud-input-cluster textarea, .hud-input-cluster select { width: 100%; padding: 16px 14px; background: rgba(1,3,7,0.3); border: 1px solid var(--border-glass); border-radius: 10px; color: var(--text-main); font-size: 1rem; outline: none; transition: 0.3s; }																				
        .hud-input-cluster textarea { height: 90px; resize: none; }																				
        .hud-input-cluster select { color: #f1c40f; font-weight: bold; background: rgba(1,3,7,0.8); border: 1px solid rgba(241,196,15,0.2); }																				
																				
        .hud-input-cluster label { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-sub); pointer-events: none; transition: 0.3s; font-size: 0.9rem; }																				
        .hud-input-cluster textarea ~ label { top: 20px; transform: none; }																				
																				
        .hud-input-cluster input:focus ~ label, .hud-input-cluster input:not(:placeholder-shown) ~ label,																				
        .hud-input-cluster textarea:focus ~ label, .hud-input-cluster textarea:not(:placeholder-shown) ~ label { top: -12px; left: 10px; background: var(--bg-prime); padding: 0 6px; font-size: 0.75rem; color: #f1c40f; font-family: 'Orbitron', sans-serif; }																				
																				
        .neon-glow-underline { position: absolute; bottom: 0; left: 50%; width: 0; height: 2px; background: #f1c40f; transition: 0.4s ease; transform: translateX(-50%); }																				
        .hud-input-cluster input:focus ~ .neon-glow-underline { width: 100%; box-shadow: 0 0 12px #f1c40f; }																				
																				
        .hud-engage-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #f1c40f, #d4ac0d); color: #000; border: none; border-radius: 10px; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 0.95rem; cursor: pointer; letter-spacing: 2px; transition: 0.3s; }																				
        .hud-engage-btn:hover { box-shadow: 0 0 35px rgba(241, 196, 15, 0.7); transform: translateY(-2px); }																				
																				
        /* --- DASHBOARDS FULL ARCHITECTURE ENGINE --- */																				
        .dashboard-panel-core {																				
            position: fixed;																				
            inset: 0;																				
            display: flex;																				
            justify-content: center;																				
            align-items: flex-start;																				
            background: var(--bg-prime);																				
            z-index: 100;																				
            padding: 20px;																				
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            transition: background 0.4s ease;
        }																				
																				
        .hud-container-panel {																				
            background: var(--panel-glass);																				
            border: 1px solid var(--border-glass);																				
            border-top: 4px solid #00f2fe;																				
            padding: 30px 25px;																				
            border-radius: 20px;																				
            width: 100%;																				
            max-width: 1100px;																				
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);																				
            backdrop-filter: blur(40px);
            margin-top: 20px;
            margin-bottom: 20px;																				
        }																				
																				
        .panel-header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border-glass); padding-bottom: 15px; gap: 10px; }																				
        .neon-cyan-text { font-family: 'Orbitron'; color: #00f2fe; font-size: 1.6rem; text-shadow: 0 0 15px rgba(0,242,254,0.4); }																				
        .neon-green-text { font-family: 'Orbitron'; color: #2ecc71; font-size: 1.6rem; text-shadow: 0 0 15px rgba(46,204,113,0.4); }																				
																				
        .workspace-channel-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            background: rgba(0,0,0,0.2);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid var(--border-glass);
        }
        .channel-tab-btn {
            flex: 1;
            padding: 14px 10px;
            background: transparent;
            border: none;
            color: var(--text-sub);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .channel-tab-btn.active {
            background: rgba(0, 242, 254, 0.12);
            color: #00f2fe;
            border: 1px solid rgba(0, 242, 254, 0.25);
        }

        .form-grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }																				
        .full-width-field { grid-column: span 2; }																				
																				
        .abort-btn { padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; font-size: 0.8rem; transition: 0.3s; }																				
        
        .ai-helper-banner { padding: 14px; margin-top: 20px; border-radius: 12px; background: rgba(0,242,254,0.04); border: 1px solid rgba(0,242,254,0.15); color: #00f2fe; text-align: center; font-size: 0.9rem; }																				
        .helpline-trigger-btn { width: 100%; padding: 16px; background: rgba(11,21,40,0.6); border: 1px solid rgba(0,242,254,0.3); border-radius: 12px; color: #00f2fe; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 1rem; font-family: 'Orbitron'; }																				

        .search-terminal-input { width: 100%; padding: 16px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-glass); border-radius: 12px; color: var(--text-main); font-size: 1rem; font-family: 'Orbitron'; outline: none; }																				
																				
        #policyCardsStack { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }																				
        
        .hud-data-card { background: rgba(255,255,255,0.01); border: 1px solid rgba(241,196,15,0.15); border-left: 5px solid #f1c40f; padding: 20px; border-radius: 14px; display: flex; flex-direction: column; gap: 10px; text-align: left; overflow: hidden; word-break: break-all;}																				
        .hud-data-card p { color: var(--text-sub); font-size: 0.9rem; display: flex; flex-flow: row wrap; gap: 5px;}																				
        .hud-data-card b { color: var(--text-main); display: inline-block; width: 90px; flex-shrink: 0;}																				
        .hud-data-card span { color: #f1c40f; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.85rem; }																				
																				
        .status-badge { font-family: 'Orbitron'; font-size: 0.75rem; padding: 4px 10px; border-radius: 6px; font-weight: bold; display: inline-block; }																				
        .wipe-card-btn { width: 100%; padding: 10px; background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; font-family: 'Orbitron'; font-weight: bold; font-size: 0.8rem; border-radius: 8px; cursor: pointer; margin-top: 5px; }																				
																				
        .hidden { display: none !important; }																				
        .text-left { text-align: left; }																				
																				
        .admin-category-navbar { display: flex; gap: 8px; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 12px; margin-bottom: 25px; }																				
        .admin-nav-tab { flex: 1; padding: 12px 4px; background: transparent; border: none; color: var(--text-sub); font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; text-align: center; }																				
        .admin-nav-tab.active { background: rgba(241,196,15,0.12); color: #f1c40f; border: 1px solid rgba(241,196,15,0.3); }																				
																				
        .cyber-upload-node { border: 2px dashed rgba(0, 242, 254, 0.3); border-radius: 14px; padding: 20px; background: rgba(0,0,0,0.2); text-align: center; cursor: pointer; }
        .file-preview-anchor { color: #00f2fe; text-decoration: underline; font-weight: bold; font-size: 0.9rem; }

        /* --- WHATSAPP LOGIC ARCHITECTURE MODEL PANEL --- */
        .chat-io-grid-matrix {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 0;
            height: 550px;
            background: rgba(11, 27, 33, 0.7);
            border-radius: 16px;
            border: 1px solid var(--border-glass);
            overflow: hidden;
            backdrop-filter: blur(20px);
        }
        .chat-target-userlist-pane {
            background: rgba(17, 27, 33, 0.95);
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .whatsapp-search-box {
            padding: 10px;
            background: rgba(17, 27, 33, 0.5);
            border-bottom: 1px solid var(--border-glass);
        }
        .whatsapp-search-box input {
            width: 100%;
            padding: 8px 12px;
            background: #202c33;
            border: none;

        window.renderUserControlPanel = function() {																				
            const listWrapper = document.getElementById('adminUserControlList'); if(!listWrapper) return;																				
            if(cachedGlobalUsersArr.length === 0) { listWrapper.innerHTML = `<p style="color: #475569; font-size: 0.85rem;">No identity blocks discovered.</p>`; return; }																				
            
            listWrapper.innerHTML = cachedGlobalUsersArr.map((user, index) => {																				
                const live = user.status === 'active';																				
                return `																				
                    <div style="background: rgba(255,255,255,0.01); padding: 15px; border-radius: 10px; display: flex; flex-direction: column; border-left: 4px solid ${live ? '#1abc9c' : '#7f8c8d'}; border: 1px solid var(--border-glass); gap:10px; overflow:hidden;">																				
                        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:5px;">																				
                            <div style="display:flex; gap:10px; align-items:center;">
                                <span style="color:var(--text-sub); font-size:0.85rem;">System ID:</span>
                                <input type="text" id="userInlineIdInput_${index}" value="${user.id}" style="background:rgba(0,0,0,0.3); border:1px solid var(--border-glass); color:var(--text-main); padding:4px 8px; border-radius:4px; font-size:0.85rem; width:140px; font-weight:bold;">
                            </div>																				
                            <div style="display: flex; gap: 8px;">																				
                                <button onclick="toggleUserNodeSwitch(${index})" style="padding: 6px 12px; background: ${live ? '#e74c3c' : '#1abc9c'}; color: white; border: none; border-radius: 6px; font-size: 0.75rem; cursor:pointer;">${live ? 'LOCK' : 'OPEN'}</button>																				
                                <button onclick="wipeUserPermanently(${index})" style="color: #475569; background:none; border:none; text-decoration: underline; font-size: 0.8rem; cursor:pointer;">Wipe</button>																				
                            </div>																				
                        </div>																				
                        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">																				
                            <span style="color:var(--text-sub); font-size:0.85rem;">Passkey:</span>
                            <input type="text" id="userPasswordInputInline_${index}" value="${user.pass}" style="background:rgba(0,0,0,0.3); border:1px solid #334155; color:#00f2fe; padding:6px 10px; border-radius:6px; font-size:0.85rem; width:120px;">																				
                            <button onclick="alterClientCredentialsOverrideData('${user.id}', ${index})" style="padding:6px 12px; background:rgba(46,204,113,0.2); border:1px solid #2ecc71; color:#2ecc71; border-radius:6px; font-size:0.75rem; cursor:pointer; font-weight:bold;">APPLY ENFORCED CHANGE</button>																				
                        </div>																				
                    </div>																				
                `;																				
            }).join('');																				
        };

        // SPY INTERCEPT USER PROFILE LIST GENERATION LOGIC WITH "NEW" NOTIFICATION LABEL
        window.renderAdminSpyUserList = function() {
            const listPane = document.getElementById('adminSpyUsersListWrapper'); if(!listPane) return;
            if(cachedGlobalUsersArr.length === 0) { listPane.innerHTML = `<div style="color:var(--text-sub); padding:15px; font-size:0.8rem;">No active user signatures.</div>`; return; }
            
            get(ref(db, 'chats')).then((snapshot) => {
                const data = snapshot.val();
                const chats = data ? Object.values(data) : [];

                listPane.innerHTML = cachedGlobalUsersArr.map(user => {
                    const isSelected = (spyActiveTargetUserContext === user.id);
                    
                    // Check if latest message in database from this user is unread by admin
                    const userMessages = chats.filter(m => m.sender === user.id);
                    const hasNewMessage = userMessages.length > 0;
                    const notificationBadge = (hasNewMessage && !isSelected) ? `<span style="background:#00a884; color:#fff; font-size:0.7rem; padding:2px 6px; border-radius:20px; font-family:'Orbitron'; font-weight:bold; margin-left:auto;">NEW</span>` : "";

                    return `
                        <div class="chat-user-item-node ${isSelected?'active-chat-target':''}" onclick="setAdminSpyTargetConversationTrack('${user.id}')">
                            <img class="whatsapp-avatar" src="${user.avatar?user.avatar:defaultAvatarSvg}">
                            <div class="whatsapp-user-info" style="display:flex; align-items:center; width:100%;">
                                <div>
                                    <div class="whatsapp-user-name">${user.clientName}</div>
                                    <div class="whatsapp-user-id">@${user.id}</div>
                                </div>
                                ${notificationBadge}
                            </div>
                        </div>
                    `;
                }).join('');
            });
        };

        window.setAdminSpyTargetConversationTrack = function(userId) {
            spyActiveTargetUserContext = userId;
            const headerTitle = document.getElementById('spyActiveHeaderTitle');
            const spyHeaderAvatar = document.getElementById('spyActiveHeaderAvatarNode');
            
            if(headerTitle) headerTitle.innerText = userId;
            const matchingProfile = cachedGlobalUsersArr.find(u => u.id === userId);
            if(spyHeaderAvatar) spyHeaderAvatar.src = (matchingProfile && matchingProfile.avatar) ? matchingProfile.avatar : defaultAvatarSvg;
            
            renderAdminSpyChatConsoleLogs();
            renderAdminSpyUserList();
        };

        window.renderAdminSpyChatConsoleLogs = function() {
            const stack = document.getElementById('adminSpyChatLogsStack'); if(!stack || !spyActiveTargetUserContext) return;
            get(ref(db, 'chats')).then((snapshot) => {
                const data = snapshot.val();
                const chats = data ? Object.values(data) : [];
                
                // Intercept all tracking messages involving this targeted user
                const trackingConvo = chats.filter(m => 
                    (m.sender === spyActiveTargetUserContext && m.receiver === "Shashi2004") || 
                    (m.sender === "Shashi2004" && m.receiver === spyActiveTargetUserContext) ||
                    (m.sender === spyActiveTargetUserContext) || (m.receiver === spyActiveTargetUserContext)
                );
                
                if(trackingConvo.length === 0) {
                    stack.innerHTML = `<div style="color:var(--text-sub); font-size:0.85rem; margin:auto; background:rgba(0,0,0,0.3); padding:6px 12px; border-radius:6px;">🔒 No dynamic chat strings intercepted.</div>`;
                    return;
                }
                stack.innerHTML = trackingConvo.map(m => {
                    const isMyResponse = (m.sender === "Shashi2004");
                    const directionalCss = isMyResponse ? 'bubble-outgoing' : 'bubble-incoming';
                    
                    // Style optimization to make it look exactly like customer's WhatsApp interface
                    let customStyle = "";
                    if(isMyMessageFromAdminGlobal(m.sender)) {
                        customStyle = "background: #005c4b; color: #e9edef; align-self: flex-end; border-top-right-radius: 0;";
                    } else {
                        customStyle = "background: #202c33; color: #e9edef; align-self: flex-start; border-top-left-radius: 0;";
                    }

                    let mediaElementHTML = m.mediaPayload ? (m.mediaPayload.startsWith("data:image") ? `<img src="${m.mediaPayload}" class="chat-media-attachment-box" onclick="window.open(this.src)">` : `<div style="margin-top:6px;"><a href="${m.mediaPayload}" download="AssetData" class="file-preview-anchor" style="color:#00f2fe;">📥 Download Data Asset</a></div>`) : "";
                    
                    return `
                        <div class="bubble-msg-wrapper" style="${customStyle}">
                            <div>
                                <small style="color:#00f2fe; display:block; font-size:0.65rem; font-family:monospace; margin-bottom:2px;">From: ${m.sender}</small>
                                ${m.textBody}
                            </div>
                            ${mediaElementHTML}
                            <div class="whatsapp-time">${m.timestamp}</div>
                        </div>`;
                }).join('');
                stack.scrollTop = stack.scrollHeight;
            });
        };

        function isMyMessageFromAdminGlobal(senderId) {
            return senderId.toLowerCase() === "shashi2004";
        }

        window.dispatchAdminSpyInterceptionMsg = function() {
            const input = document.getElementById('adminSpyResponseInput'); if(!input || !input.value.trim() || !spyActiveTargetUserContext) return;
            const newChatRef = push(ref(db, 'chats'));
            set(newChatRef, {
                sender: "Shashi2004", receiver: spyActiveTargetUserContext,
                textBody: input.value.trim(), mediaPayload: "",
                timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            }).then(() => { input.value = ""; playSynthesizedSound(900, 'sine', 0.04); renderAdminSpyChatConsoleLogs(); });
        };

        window.renderPolicyCardsBlock = function() {																				
            const targetStack = document.getElementById('policyCardsStack'); if(!targetStack) return;																				
            if(cachedGlobalPolicyArr.length === 0) { targetStack.innerHTML = "<p style='text-align:center; color:#475569; padding: 20px 0;'>No structural profiles recorded.</p>"; return; }																				
            
            targetStack.innerHTML = cachedGlobalPolicyArr.map((d, i) => {
                let docPreviewHTML = d.attachment ? (d.attachment.startsWith("data:image") ? `<br><img src="${d.attachment}" style="max-width:100%; max-height:100px; border-radius:6px; margin-top:4px; display:block;">` : `<a href="${d.attachment}" download="File" class="file-preview-anchor">📥 Asset File</a>`) : "<span>None</span>";
                let clientNotesArray = d.customerComments ? Object.values(d.customerComments) : [];
                let clientNotesHTML = clientNotesArray.map(c => `<div style="font-size:0.75rem; color:#00f2fe; background:#020408; padding:2px 4px; margin-top:2px; border-radius:4px;">${c.text}</div>`).join('');

                return `																				
                    <div class="hud-data-card">																				
                      <p><b>User ID:</b> <span>${d.ownerNodeID}</span></p>																				
                      <p><b>Insurer:</b> <span>${d.insure}</span></p>																				
                      <p><b>Contact:</b> <span>${d.phone}</span></p>																				
                      <p><b>File:</b> ${docPreviewHTML}</p>
                      <div style="background:rgba(0,0,0,0.3); padding:6px; border-radius:6px;">${clientNotesHTML ? clientNotesHTML : '<div style="font-size:0.75rem; color:#475569;">No timeline responses.</div>'}</div>
                      <div style="margin-top: 10px; padding: 8px; background: rgba(0,0,0,0.4); border-radius: 6px;">																				
                         <select id="updateStatusSelect_${i}" onchange="transmitAdminResponse(${i})" style="padding:6px; font-size:0.75rem; width:100%; margin-bottom:8px;">																				
                               <option value="pending" ${d.status === 'pending' ? 'selected' : ''}>⏳ Pending</option>																				
                               <option value="uploaded" ${d.status === 'uploaded' ? 'selected' : ''}>✅ Uploaded</option>																				
                               <option value="error" ${d.status === 'error' ? 'selected' : ''}>❌ Error</option>																				
                               <option value="closed" ${d.status === 'closed' ? 'selected' : ''}>🔒 Closed</option>																				
                               <option value="waiting" ${d.status === 'waiting' ? 'selected' : ''}>⏸ Waiting</option>																				
                         </select>																				
                         <input type="text" id="adminCommentInput_${i}" value="${d.adminComment || ''}" placeholder="Feedback..." style="padding:6px; font-size:0.8rem; background:#020408; width:100%; margin-bottom:8px; color:#fff; border:1px solid #334155; border-radius:4px; outline:none;">																				
                         <button onclick="transmitAdminResponse(${i})" style="padding:6px; background:#f1c40f; color:black; border:none; width:100%; font-weight:bold; font-size:0.75rem; cursor:pointer;">TRANSMIT</button>																				
                      </div>																				
                      <button class="wipe-card-btn" onclick="purgeRegistryLog(${i})">Purge</button>																				
                    </div>																				
                `;
            }).join("");																				
        };

        window.transmitAdminResponse = function(index) {																				
            const statusSelect = document.getElementById(`updateStatusSelect_${index}`); 
            const commentInput = document.getElementById(`adminCommentInput_${index}`);																				
            let targetPol = cachedGlobalPolicyArr[index];
            set(ref(db, `policies/${targetPol.id}/status`), statusSelect.value);
            set(ref(db, `policies/${targetPol.id}/adminComment`), commentInput.value.trim() || "Status saved.");
            speakNaturalHuman("Response deployed."); alert("⚡ Feedback Transmitted!");
        };																				
																				
        window.toggleUserNodeSwitch = function(index) {																				
            let userObj = cachedGlobalUsersArr[index];
            const nextStatus = userObj.status === 'active' ? 'deactivated' : 'active';
            set(ref(db, `users/${userObj.id}/status`), nextStatus);
            speakNaturalHuman("Node toggled.");
        };																				
																				
        window.wipeUserPermanently = function(index) {																				
            if(confirm("Purge account entirely?")) { 
                let userObj = cachedGlobalUsersArr[index];
                remove(ref(db, 'users/' + userObj.id));
                speakNaturalHuman("Wiped complete."); 
            }																				
        };

        window.purgeRegistryLog = function(index){ 
            if(confirm("Wipe structure completely?")){ 
                let targetPol = cachedGlobalPolicyArr[index];
                remove(ref(db, 'policies/' + targetPol.id));
                speakNaturalHuman("Log matrix purged."); 
            } 
        };

        window.filterCardsEngine = function(){ 
            const searchInputNode = document.getElementById('searchInput'); if(!searchInputNode) return; 
            let q = searchInputNode.value.toLowerCase(); 
            document.querySelectorAll('.hud-data-card').forEach(c => { c.style.display = c.innerText.toLowerCase().includes(q) ? "" : "none"; }); 
        };																				
																				
        window.logoutEngine = function() {																				
            if(document.getElementById('accessNodeUser')) document.getElementById('accessNodeUser').value = ""; 																				
            if(document.getElementById('accessNodePass')) document.getElementById('accessNodePass').value = "";																				
            document.getElementById('customerDashboard').classList.add('hidden'); document.getElementById('adminDashboard').classList.add('hidden');																				
            loggedInCustomerID = ""; failedAttemptsCount = 0; currentTrackingUserAttempt = ""; activeSelectedChatTargetUserId = ""; globalLiveChatBinaryStreamBase64 = "";
            spyActiveTargetUserContext = "";
            const stage = document.getElementById('mainStage'); if(stage) { stage.style.display = 'flex'; stage.classList.remove('activated'); }																				
            if(document.getElementById('loginTerminal')) document.getElementById('loginTerminal').classList.add('hidden');																				
        };
    </script>																				
</body>																				
</html>
